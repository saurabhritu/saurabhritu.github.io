# Hugo configuration file
baseURL: "https://stacksr.com/"
title: Stacksr

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

enableInlineShortcodes: true

menu:
  main:
    # - name: Docs
    #   pageRef: /docs
    #   weight: 1
    - name: Blog
      pageRef: /blog
      weight: 2
    - name: About
      pageRef: /about
      weight: 3
    # - name: Contact ↗
    #   url: "https://github.com/saurabhritu"
    #   weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitHub
      weight: 6
      url: "https://github.com/saurabhritu"
      params:
        icon: github
    - name: Twitter
      weight: 7
      url: "https://twitter.com/_SaurabhRitu"
      params:
        icon: x-twitter

params:

  description: Stacksr, Blog, Life, STEM.

  page:
  # full (100%), wide (90rem), normal (1280px)
    width: wide

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/branding/stacksr_logo_no_bg-dark.png
      dark: images/branding/stacksr_logo_no_bg.png
      link: /
      width: 150
      height: 150
    # width: normal

  footer:
    displayCopyright: true
    displayPoweredBy: true
    # width: normal

  editURL:
    enable: true
    base: "https://github.com/saurabhritu/saurabhritu.github.io/edit/main"
  
  theme:
    # light | dark | system
    default: system
    displayToggle: true

  #   # Search
  # search:
  #   enable: true
  #   type: flexsearch

  #   flexsearch:
  #     # index page by: content | summary | heading | title
  #     index: content

# services:
#   googleAnalytics:
#     ID: G-MEASUREMENT_ID
