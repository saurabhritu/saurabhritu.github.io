<svg width="100%" viewBox="0 0 620 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root { --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85;
        --green: #E2EFED; --purple: #EBE6F5; --gray: #F0EFEC; --amber: #F5E9D0; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18;
          --green: #1A2E28; --purple: #221E33; --gray: #1A1A19; --amber: #2E2619; }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2; }
      .hair { stroke-width: 1.4; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .soft { opacity: 0.5; }
      .noiseLayer { opacity: var(--noise-opacity); }
      .fill-green { fill: var(--green); }
      .fill-purple { fill: var(--purple); }
      .fill-gray { fill: var(--gray); }
      .fill-amber { fill: var(--amber); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/>
    </marker>
  </defs>
  <rect class="bg" width="620" height="500"/>
  <rect class="noiseLayer" width="620" height="500" filter="url(#paperNoise)"/>

  <!-- ══ COLUMN HEADERS ══ -->
  <rect x="50" y="20" width="200" height="46" rx="8" class="fill-green ink fine"/>
  <text x="150" y="36" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="13" font-weight="500" class="dot">GPS Writer</text>
  <text x="150" y="54" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">5 Hz</text>

  <rect x="370" y="20" width="200" height="46" rx="8" class="fill-purple ink fine"/>
  <text x="470" y="36" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="13" font-weight="500" class="dot">Flight Control</text>
  <text x="470" y="54" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">1 kHz</text>

  <!-- column spines -->
  <line x1="150" y1="66" x2="150" y2="460" class="ink hair soft" stroke-dasharray="5 3"/>
  <line x1="470" y1="66" x2="470" y2="460" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- ══ LEFT: parse NMEA ══ -->
  <rect x="60" y="86" width="180" height="32" rx="6" class="fill-gray ink fine"/>
  <text x="150" y="102" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">parse NMEA → local</text>

  <line x1="150" y1="118" x2="150" y2="140" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- LEFT: take mutex -->
  <rect x="60" y="140" width="180" height="30" rx="6" class="fill-green ink fine"/>
  <text x="150" y="155" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">TAKE mutex</text>

  <line x1="150" y1="170" x2="150" y2="200" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- RIGHT: take mutex (contention) -->
  <rect x="380" y="168" width="180" height="30" rx="6" class="fill-purple ink fine"/>
  <text x="470" y="183" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">TAKE mutex</text>

  <!-- ══ MUTEX LOCKED REGION ══ -->
  <rect x="40" y="200" width="540" height="66" rx="8" fill="none" class="ink hair" stroke-dasharray="5 3"/>
  <text x="56" y="214" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">LOCKED</text>

  <!-- left: write -->
  <rect x="60" y="220" width="180" height="30" rx="6" class="fill-amber ink fine"/>
  <text x="150" y="235" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">g_gps = fresh</text>

  <!-- bridge label -->
  <line x1="248" y1="235" x2="372" y2="235" class="ink hair soft" stroke-dasharray="5 3"/>
  <text x="310" y="226" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">exclusive</text>

  <!-- right: blocked -->
  <rect x="380" y="220" width="180" height="30" rx="6" class="fill-gray ink fine"/>
  <text x="470" y="235" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">waiting…</text>

  <!-- ══ AFTER MUTEX ══ -->
  <line x1="150" y1="266" x2="150" y2="290" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="470" y1="266" x2="470" y2="290" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- give mutex left -->
  <rect x="60" y="290" width="180" height="30" rx="6" class="fill-green ink fine"/>
  <text x="150" y="305" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">GIVE mutex</text>

  <!-- give mutex right -->
  <rect x="380" y="290" width="180" height="30" rx="6" class="fill-purple ink fine"/>
  <text x="470" y="305" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">GIVE mutex</text>

  <line x1="150" y1="320" x2="150" y2="346" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="470" y1="320" x2="470" y2="346" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- delay left -->
  <rect x="60" y="346" width="180" height="30" rx="6" class="fill-gray ink fine"/>
  <text x="150" y="361" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">delay 200 ms</text>

  <!-- PID right -->
  <rect x="380" y="346" width="180" height="30" rx="6" class="fill-purple ink fine"/>
  <text x="470" y="361" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">run PID</text>

  <!-- key callout -->
  <line x1="470" y1="376" x2="470" y2="400" class="ink hair soft" marker-end="url(#arrow)"/>
  <rect x="366" y="400" width="208" height="30" rx="6" fill="none" class="ink hair" stroke-dasharray="5 3"/>
  <text x="470" y="415" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">compute outside lock</text>

  <!-- ══ LEGEND ══ -->
  <line x1="40" y1="444" x2="580" y2="444" class="ink hair soft" stroke-dasharray="5 3"/>
  <rect x="50" y="456" width="12" height="12" rx="2" class="fill-amber ink fine"/>
  <text x="68" y="462" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">mutex-protected</text>
  <rect x="220" y="456" width="12" height="12" rx="2" class="fill-gray ink fine"/>
  <text x="238" y="462" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">waiting / blocked</text>
</svg>
