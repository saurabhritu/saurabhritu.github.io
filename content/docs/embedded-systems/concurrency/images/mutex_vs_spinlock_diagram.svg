<svg width="100%" viewBox="0 0 620 420" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root { --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85;
        --green: #E2EFED; --purple: #EBE6F5; --gray: #F0EFEC; --red: #F2E4DF; --amber: #F5E9D0; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18;
          --green: #1A2E28; --purple: #221E33; --gray: #1A1A19; --red: #2E1E1A; --amber: #2E2619; }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2; } .hair { stroke-width: 1.4; }
      .dot { fill: var(--ink); } .bg { fill: var(--bg); }
      .soft { opacity: 0.5; } .noiseLayer { opacity: var(--noise-opacity); }
      .fill-green { fill: var(--green); } .fill-purple { fill: var(--purple); }
      .fill-gray { fill: var(--gray); } .fill-red { fill: var(--red); }
      .fill-amber { fill: var(--amber); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/>
    </marker>
  </defs>
  <rect class="bg" width="620" height="420"/>
  <rect class="noiseLayer" width="620" height="420" filter="url(#paperNoise)"/>

  <!-- ══ COLUMN HEADERS ══ -->
  <rect x="30" y="18" width="260" height="40" rx="8" class="fill-green ink fine"/>
  <text x="160" y="32" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">Mutex</text>
  <text x="160" y="48" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">task context only</text>

  <rect x="330" y="18" width="260" height="40" rx="8" class="fill-purple ink fine"/>
  <text x="460" y="32" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">Spinlock</text>
  <text x="460" y="48" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">ISR + task context</text>

  <!-- vertical divider -->
  <line x1="310" y1="18" x2="310" y2="340" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- ══ LEFT: MUTEX FLOW ══ -->
  <text x="160" y="76" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">Thread tries to lock</text>
  <line x1="160" y1="86" x2="160" y2="102" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="90" y="102" width="140" height="30" rx="6" class="fill-gray ink fine"/>
  <text x="160" y="117" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">lock taken?</text>

  <!-- NO branch -->
  <text x="82" y="148" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">NO</text>
  <line x1="90" y1="140" x2="72" y2="140" class="ink hair soft"/>
  <line x1="72" y1="140" x2="72" y2="216" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- YES → SLEEP -->
  <text x="240" y="137" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">YES</text>
  <line x1="230" y1="117" x2="250" y2="117" class="ink hair soft"/>
  <line x1="250" y1="117" x2="250" y2="148" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="196" y="148" width="108" height="38" rx="6" class="fill-red ink fine"/>
  <text x="250" y="162" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="12" font-weight="500">SLEEP</text>
  <text x="250" y="176" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="8">removed from run Q</text>

  <line x1="250" y1="186" x2="250" y2="210" class="ink hair soft" marker-end="url(#arrow)"/>
  <rect x="182" y="210" width="136" height="32" rx="6" class="fill-green ink fine"/>
  <text x="250" y="220" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">woken by Give()</text>
  <text x="250" y="234" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">~2–10 µs</text>

  <!-- NO enters -->
  <rect x="50" y="216" width="54" height="26" rx="6" class="fill-green ink fine"/>
  <text x="77" y="229" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">enter</text>

  <!-- LEFT TRAITS -->
  <rect x="36" y="264" width="250" height="66" rx="6" class="ink hair"/>
  <text x="50" y="282" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">✓ sleeps — no CPU waste</text>
  <text x="50" y="298" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">✗ cannot use in ISR</text>
  <text x="50" y="314" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">✗ 2–10 µs overhead</text>

  <!-- ══ RIGHT: SPINLOCK FLOW ══ -->
  <text x="460" y="76" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">ISR tries to lock</text>
  <line x1="460" y1="86" x2="460" y2="102" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="390" y="102" width="140" height="30" rx="6" class="fill-gray ink fine"/>
  <text x="460" y="117" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">lock taken?</text>

  <!-- NO branch -->
  <text x="382" y="148" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">NO</text>
  <line x1="390" y1="140" x2="372" y2="140" class="ink hair soft"/>
  <line x1="372" y1="140" x2="372" y2="216" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- YES → busy-wait -->
  <text x="544" y="137" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">YES</text>
  <line x1="530" y1="117" x2="556" y2="117" class="ink hair soft"/>
  <line x1="556" y1="117" x2="556" y2="174" class="ink hair soft"/>

  <rect x="400" y="148" width="140" height="44" rx="6" class="fill-amber ink fine"/>
  <text x="470" y="164" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="12" font-weight="500">busy-wait</text>
  <text x="470" y="180" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">check… check…</text>

  <!-- loop-back -->
  <line x1="556" y1="174" x2="556" y2="196" class="ink hair soft"/>
  <line x1="556" y1="196" x2="542" y2="196" class="ink hair soft" marker-end="url(#arrow)"/>

  <line x1="470" y1="192" x2="470" y2="216" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="350" y="216" width="54" height="26" rx="6" class="fill-purple ink fine"/>
  <text x="377" y="229" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">enter</text>
  <text x="440" y="229" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">~200 ns</text>

  <!-- RIGHT TRAITS -->
  <rect x="336" y="264" width="250" height="66" rx="6" class="ink hair"/>
  <text x="350" y="282" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">✓ works in ISR</text>
  <text x="350" y="298" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">✓ ~200 ns latency</text>
  <text x="350" y="314" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">✗ burns CPU while spinning</text>

  <!-- BOTTOM -->
  <line x1="36" y1="348" x2="586" y2="348" class="ink hair soft" stroke-dasharray="5 3"/>
  <text x="310" y="368" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">spinlock ≤ few µs · mutex for everything else</text>
</svg>
