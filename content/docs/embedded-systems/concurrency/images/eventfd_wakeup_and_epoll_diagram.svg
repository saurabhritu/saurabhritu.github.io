<svg width="100%" viewBox="0 0 620 480" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root { --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85;
        --green: #E2EFED; --purple: #EBE6F5; --gray: #F0EFEC; --lime: #E2EDE0; --blue: #E3ECF5; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18;
          --green: #1A2E28; --purple: #221E33; --gray: #1A1A19; --lime: #1A2E20; --blue: #1A2533; }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2; } .hair { stroke-width: 1.4; }
      .dot { fill: var(--ink); } .bg { fill: var(--bg); }
      .soft { opacity: 0.5; } .noiseLayer { opacity: var(--noise-opacity); }
      .fill-green { fill: var(--green); } .fill-purple { fill: var(--purple); }
      .fill-gray { fill: var(--gray); } .fill-lime { fill: var(--lime); }
      .fill-blue { fill: var(--blue); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/>
    </marker>
  </defs>
  <rect class="bg" width="620" height="480"/>
  <rect class="noiseLayer" width="620" height="480" filter="url(#paperNoise)"/>

  <!-- SECTION 1 — INTER-THREAD WAKEUP -->
  <rect x="30" y="16" width="220" height="40" rx="8" class="fill-green ink fine"/>
  <text x="140" y="30" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">Producer</text>
  <text x="140" y="46" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">flight math — 2 kHz</text>

  <rect x="370" y="16" width="220" height="40" rx="8" class="fill-purple ink fine"/>
  <text x="480" y="30" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">Consumer</text>
  <text x="480" y="46" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">SD logger — on demand</text>

  <!-- column spines -->
  <line x1="140" y1="56" x2="140" y2="226" class="ink hair soft" stroke-dasharray="5 3"/>
  <line x1="480" y1="56" x2="480" y2="68" class="ink hair soft" stroke-dasharray="5 3"/>
  <line x1="480" y1="142" x2="480" y2="226" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- run EKF -->
  <rect x="42" y="68" width="196" height="26" rx="4" class="fill-gray ink fine"/>
  <text x="140" y="81" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">run EKF estimator</text>

  <line x1="140" y1="94" x2="140" y2="108" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- write signal -->
  <rect x="42" y="108" width="196" height="26" rx="4" class="fill-green ink fine"/>
  <text x="140" y="121" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">write(eventfd, 1)</text>

  <!-- BLOCKING on right -->
  <rect x="388" y="68" width="184" height="56" rx="6" class="fill-purple ink fine"/>
  <text x="480" y="86" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="12" font-weight="500">BLOCKED</text>
  <text x="480" y="102" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">read(eventfd)</text>
  <text x="480" y="116" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">0 CPU</text>

  <!-- signal arrow -->
  <line x1="244" y1="121" x2="382" y2="132" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="314" y="118" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">signal</text>

  <!-- wake -->
  <rect x="388" y="132" width="184" height="26" rx="4" class="fill-lime ink fine"/>
  <text x="480" y="145" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="10">counter > 0 — wake!</text>

  <line x1="480" y1="158" x2="480" y2="172" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- write to SD -->
  <rect x="388" y="172" width="184" height="26" rx="4" class="fill-purple ink fine"/>
  <text x="480" y="185" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">write_to_sd_card()</text>

  <!-- usleep -->
  <line x1="140" y1="134" x2="140" y2="148" class="ink hair soft" marker-end="url(#arrow)"/>
  <rect x="42" y="148" width="196" height="26" rx="4" class="fill-gray ink fine"/>
  <text x="140" y="161" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">usleep(500)</text>

  <!-- ── divider ── -->
  <line x1="26" y1="226" x2="594" y2="226" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- SECTION 2 — EPOLL -->
  <rect x="30" y="240" width="560" height="112" rx="10" class="fill-purple ink fine"/>
  <text x="310" y="258" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">supervisor thread</text>

  <!-- epoll_wait -->
  <rect x="170" y="270" width="280" height="26" rx="6" class="fill-gray ink fine"/>
  <text x="310" y="283" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">epoll_wait() — sleeps until any fires</text>

  <line x1="310" y1="296" x2="310" y2="312" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- three eventfd nodes -->
  <line x1="310" y1="312" x2="120" y2="312" class="ink hair soft"/>
  <line x1="120" y1="312" x2="120" y2="318" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="310" y1="312" x2="310" y2="318" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="310" y1="312" x2="500" y2="312" class="ink hair soft"/>
  <line x1="500" y1="312" x2="500" y2="318" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="60" y="318" width="120" height="26" rx="6" class="fill-green ink fine"/>
  <text x="120" y="331" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">efd_gps</text>

  <rect x="250" y="318" width="120" height="26" rx="6" class="fill-green ink fine"/>
  <text x="310" y="331" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">efd_radio</text>

  <rect x="440" y="318" width="120" height="26" rx="6" class="fill-green ink fine"/>
  <text x="500" y="331" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">efd_baro</text>

  <!-- arrows down to worker tasks -->
  <line x1="120" y1="352" x2="120" y2="380" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="310" y1="352" x2="310" y2="380" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="500" y1="352" x2="500" y2="380" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- worker task boxes -->
  <rect x="54" y="380" width="132" height="44" rx="6" class="fill-blue ink fine"/>
  <text x="120" y="396" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="12" font-weight="500">GPS</text>
  <text x="120" y="412" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">write(efd, 1)</text>

  <rect x="244" y="380" width="132" height="44" rx="6" class="fill-blue ink fine"/>
  <text x="310" y="396" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="12" font-weight="500">Radio</text>
  <text x="310" y="412" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">write(efd, 1)</text>

  <rect x="434" y="380" width="132" height="44" rx="6" class="fill-blue ink fine"/>
  <text x="500" y="396" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="12" font-weight="500">Baro</text>
  <text x="500" y="412" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">write(efd, 1)</text>

  <!-- bottom note -->
  <text x="310" y="450" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">one supervisor · zero busy-waiting · instant wakeup</text>
</svg>
