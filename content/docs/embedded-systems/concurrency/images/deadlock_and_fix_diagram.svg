<svg width="100%" viewBox="0 0 620 520" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root { --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85;
        --green: #E2EFED; --purple: #EBE6F5; --red: #F2E4DF; --gray: #F0EFEC; --lime: #E2EDE0; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18;
          --green: #1A2E28; --purple: #221E33; --red: #2E1E1A; --gray: #1A1A19; --lime: #1A2E20; }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2; } .hair { stroke-width: 1.4; }
      .dot { fill: var(--ink); } .bg { fill: var(--bg); }
      .soft { opacity: 0.5; } .noiseLayer { opacity: var(--noise-opacity); }
      .fill-green { fill: var(--green); } .fill-purple { fill: var(--purple); }
      .fill-red { fill: var(--red); } .fill-gray { fill: var(--gray); }
      .fill-lime { fill: var(--lime); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/>
    </marker>
  </defs>
  <rect class="bg" width="620" height="520"/>
  <rect class="noiseLayer" width="620" height="520" filter="url(#paperNoise)"/>

  <!-- SECTION 1 — DEADLOCK -->
  <rect x="60" y="20" width="170" height="32" rx="6" class="fill-green ink fine"/>
  <text x="145" y="36" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">Thread 1</text>
  <rect x="390" y="20" width="170" height="32" rx="6" class="fill-purple ink fine"/>
  <text x="475" y="36" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">Thread 2</text>

  <line x1="145" y1="52" x2="145" y2="218" class="ink hair soft" stroke-dasharray="4 3"/>
  <line x1="475" y1="52" x2="475" y2="218" class="ink hair soft" stroke-dasharray="4 3"/>

  <rect x="70" y="62" width="150" height="30" rx="6" class="fill-green ink fine"/>
  <text x="145" y="77" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">HOLDS GPS</text>
  <rect x="400" y="62" width="150" height="30" rx="6" class="fill-purple ink fine"/>
  <text x="475" y="77" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">HOLDS Radio</text>

  <line x1="145" y1="92" x2="145" y2="110" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="475" y1="92" x2="475" y2="110" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="70" y="110" width="150" height="30" rx="6" class="fill-red ink fine"/>
  <text x="145" y="125" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">WANTS Radio ✗</text>
  <rect x="400" y="110" width="150" height="30" rx="6" class="fill-red ink fine"/>
  <text x="475" y="125" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">WANTS GPS ✗</text>

  <path d="M 145 140 L 145 168 L 248 168" fill="none" class="ink hair soft" marker-end="url(#arrow)"/>
  <path d="M 475 140 L 475 168 L 372 168" fill="none" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="250" y="152" width="120" height="46" rx="8" class="fill-red ink fine"/>
  <text x="310" y="168" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">DEADLOCK</text>
  <text x="310" y="184" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">frozen forever ☠</text>

  <line x1="40" y1="222" x2="580" y2="222" class="ink hair soft" stroke-dasharray="4 4"/>

  <rect x="150" y="232" width="320" height="24" rx="4" fill="none" class="ink hair" stroke-dasharray="3 3"/>
  <text x="310" y="244" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">Fix: always lock GPS → Radio</text>

  <!-- SECTION 2 — FIX -->
  <rect x="60" y="270" width="170" height="32" rx="6" class="fill-green ink fine"/>
  <text x="145" y="286" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">Thread 1</text>
  <rect x="390" y="270" width="170" height="32" rx="6" class="fill-green ink fine"/>
  <text x="475" y="286" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="13" font-weight="500">Thread 2 ✓</text>

  <line x1="145" y1="302" x2="145" y2="496" class="ink hair soft" stroke-dasharray="4 3"/>
  <line x1="475" y1="302" x2="475" y2="496" class="ink hair soft" stroke-dasharray="4 3"/>

  <rect x="70" y="314" width="150" height="28" rx="6" class="fill-green ink fine"/>
  <text x="145" y="328" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">① TAKE GPS</text>
  <rect x="400" y="314" width="150" height="28" rx="6" class="fill-green ink fine"/>
  <text x="475" y="328" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">① TAKE GPS</text>

  <line x1="226" y1="328" x2="394" y2="328" class="ink hair" stroke-dasharray="4 3"/>
  <text x="310" y="318" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">same order</text>

  <line x1="145" y1="342" x2="145" y2="358" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="475" y1="342" x2="475" y2="358" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="70" y="358" width="150" height="28" rx="6" class="fill-green ink fine"/>
  <text x="145" y="372" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">② TAKE Radio</text>
  <rect x="400" y="358" width="150" height="28" rx="6" class="fill-green ink fine"/>
  <text x="475" y="372" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">② TAKE Radio</text>

  <line x1="226" y1="372" x2="394" y2="372" class="ink hair" stroke-dasharray="4 3"/>
  <text x="310" y="362" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">same order</text>

  <line x1="145" y1="386" x2="145" y2="402" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="475" y1="386" x2="475" y2="402" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="80" y="402" width="130" height="26" rx="6" class="fill-gray ink fine"/>
  <text x="145" y="415" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">work…</text>
  <rect x="410" y="402" width="130" height="26" rx="6" class="fill-gray ink fine"/>
  <text x="475" y="415" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">work…</text>

  <line x1="145" y1="428" x2="145" y2="446" class="ink hair soft" marker-end="url(#arrow)"/>
  <line x1="475" y1="428" x2="475" y2="446" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="70" y="446" width="150" height="34" rx="6" class="fill-lime ink fine"/>
  <text x="145" y="456" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">GIVE Radio</text>
  <text x="145" y="470" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">GIVE GPS</text>
  <rect x="400" y="446" width="150" height="34" rx="6" class="fill-lime ink fine"/>
  <text x="475" y="456" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">GIVE Radio</text>
  <text x="475" y="470" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">GIVE GPS</text>
</svg>
