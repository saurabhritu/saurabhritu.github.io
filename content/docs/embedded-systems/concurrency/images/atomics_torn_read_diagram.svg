<svg width="100%" viewBox="0 0 600 460" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root { --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85;
        --green: #E2EFED; --red: #F2E4DF; --amber: #F5E9D0; --gray: #F0EFEC; --lime: #E2EDE0; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18;
          --green: #1A2E28; --red: #2E1E1A; --amber: #2E2619; --gray: #1A1A19; --lime: #1A2E20; }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2; } .hair { stroke-width: 1.4; }
      .dot { fill: var(--ink); } .bg { fill: var(--bg); }
      .soft { opacity: 0.5; } .noiseLayer { opacity: var(--noise-opacity); }
      .fill-green { fill: var(--green); } .fill-red { fill: var(--red); }
      .fill-amber { fill: var(--amber); } .fill-gray { fill: var(--gray); }
      .fill-lime { fill: var(--lime); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/>
    </marker>
  </defs>
  <rect class="bg" width="600" height="460"/>
  <rect class="noiseLayer" width="600" height="460" filter="url(#paperNoise)"/>

  <!-- SECTION 1 — TORN READ -->
  <rect x="36" y="16" width="528" height="24" rx="6" class="fill-red ink fine"/>
  <text x="300" y="28" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">Without atomics — 32-bit on 16-bit bus</text>

  <!-- Timeline -->
  <line x1="80" y1="62" x2="80" y2="250" class="ink hair soft" stroke-dasharray="5 3"/>
  <text x="80" y="52" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">time ↓</text>

  <!-- Step 1: write upper -->
  <line x1="80" y1="76" x2="100" y2="76" class="ink hair soft"/>
  <rect x="102" y="64" width="200" height="26" rx="4" class="fill-green ink fine"/>
  <text x="202" y="77" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">write upper 16 bits</text>

  <rect x="320" y="64" width="70" height="26" rx="4" class="fill-amber ink fine"/>
  <text x="355" y="77" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">0x0001</text>
  <rect x="394" y="64" width="70" height="26" rx="4" class="fill-gray ink fine"/>
  <text x="429" y="77" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">????</text>
  <text x="480" y="77" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">half</text>

  <!-- Interrupt -->
  <rect x="102" y="96" width="362" height="22" rx="4" class="ink hair" stroke-dasharray="5 3"/>
  <text x="283" y="107" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">⚡ ISR preempts here</text>

  <!-- Step 2: ISR reads torn -->
  <line x1="80" y1="128" x2="100" y2="128" class="ink hair soft"/>
  <rect x="102" y="122" width="200" height="26" rx="4" class="fill-red ink fine"/>
  <text x="202" y="135" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">ISR reads counter</text>

  <rect x="320" y="122" width="70" height="26" rx="4" class="fill-amber ink fine"/>
  <text x="355" y="135" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">0x0001</text>
  <rect x="394" y="122" width="70" height="26" rx="4" class="fill-red ink fine"/>
  <text x="429" y="135" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="10">0x0000</text>
  <text x="480" y="135" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="10">torn!</text>

  <!-- ISR returns -->
  <rect x="102" y="154" width="362" height="22" rx="4" class="ink hair" stroke-dasharray="5 3"/>
  <text x="283" y="165" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">ISR returns — thread resumes</text>

  <!-- Step 3: write lower -->
  <line x1="80" y1="186" x2="100" y2="186" class="ink hair soft"/>
  <rect x="102" y="180" width="200" height="26" rx="4" class="fill-green ink fine"/>
  <text x="202" y="193" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">write lower 16 bits</text>
  <rect x="320" y="180" width="70" height="26" rx="4" class="fill-green ink fine"/>
  <text x="355" y="193" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="10">0x0001</text>
  <rect x="394" y="180" width="70" height="26" rx="4" class="fill-green ink fine"/>
  <text x="429" y="193" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="10">0x0001</text>
  <text x="480" y="193" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">done</text>

  <!-- data race callout -->
  <rect x="102" y="216" width="362" height="22" rx="4" class="ink hair"/>
  <text x="283" y="227" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">ISR saw 0x00010000 — data race!</text>

  <!-- ── divider ── -->
  <line x1="36" y1="252" x2="564" y2="252" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- SECTION 2 — WITH ATOMICS -->
  <rect x="36" y="262" width="528" height="24" rx="6" class="fill-green ink fine"/>
  <text x="300" y="274" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">With _Atomic — atomic_fetch_add()</text>

  <line x1="300" y1="286" x2="300" y2="302" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- Indivisible box -->
  <rect x="60" y="302" width="480" height="90" rx="8" class="ink fine"/>
  <text x="300" y="318" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="11">one indivisible HW instruction</text>

  <!-- read → modify → write -->
  <rect x="100" y="338" width="100" height="30" rx="6" class="fill-green ink fine"/>
  <text x="150" y="353" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">read</text>

  <line x1="204" y1="353" x2="228" y2="353" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="230" y="338" width="100" height="30" rx="6" class="fill-green ink fine"/>
  <text x="280" y="353" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">modify</text>

  <line x1="334" y1="353" x2="358" y2="353" class="ink hair soft" marker-end="url(#arrow)"/>

  <rect x="360" y="338" width="100" height="30" rx="6" class="fill-green ink fine"/>
  <text x="410" y="353" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">write</text>

  <!-- fence lines -->
  <line x1="84" y1="334" x2="84" y2="372" class="ink hair"/>
  <line x1="516" y1="334" x2="516" y2="372" class="ink hair"/>
  <text x="490" y="376" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">no IRQ here</text>

  <line x1="300" y1="392" x2="300" y2="410" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- result -->
  <rect x="120" y="410" width="360" height="32" rx="8" class="fill-lime ink fine"/>
  <text x="300" y="420" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="11">always consistent</text>
  <text x="300" y="434" text-anchor="middle" dominant-baseline="central" class="dot soft" font-family="PT Mono" font-size="10">no torn reads · no locks · 1–2 cycles</text>
</svg>