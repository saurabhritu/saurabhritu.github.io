<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="42" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root { --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18; }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }
    </style>
  </defs>

  <rect class="bg" width="1400" height="800"/>
  <rect class="noiseLayer" width="1400" height="800" filter="url(#paperNoise)"/>

  <text x="700" y="65" font-family="PT Mono" font-size="36" text-anchor="middle" class="dot">GPIO Push-Pull Output Stage</text>

  <!-- VCC -->
  <text x="600" y="155" font-family="PT Mono" font-size="26" text-anchor="middle" class="dot">VCC</text>
  <path class="ink fine soft" d="M420 170 h360" stroke-dasharray="4 4" />
  <line x1="600" y1="170" x2="600" y2="205" class="ink fine" />

  <!-- PMOS -->
  <rect x="470" y="200" width="260" height="100" rx="10" class="ink fine" />
  <text x="600" y="250" font-family="PT Mono" font-size="28" text-anchor="middle" class="dot">PMOS</text>
  <text x="600" y="280" font-family="PT Mono" font-size="18" text-anchor="middle" class="dot soft">Pull-Up</text>

  <!-- Mid node -->
  <line x1="600" y1="300" x2="600" y2="370" class="ink fine" />
  <circle cx="600" cy="370" r="4" class="dot" />

  <!-- GPIO Pin output -->
  <line x1="600" y1="335" x2="860" y2="335" class="ink fine" />
  <path class="ink fill-ink" d="M850 329 l12 6 l-12 6 z" />

  <!-- NMOS -->
  <rect x="470" y="370" width="260" height="100" rx="10" class="ink fine" />
  <text x="600" y="420" font-family="PT Mono" font-size="28" text-anchor="middle" class="dot">NMOS</text>
  <text x="600" y="448" font-family="PT Mono" font-size="18" text-anchor="middle" class="dot soft">Pull-Down</text>

  <!-- GND -->
  <line x1="600" y1="470" x2="600" y2="505" class="ink fine" />
  <path class="ink fine soft" d="M420 505 h360" stroke-dasharray="4 4" />
  <text x="600" y="530" font-family="PT Mono" font-size="26" text-anchor="middle" class="dot">GND</text>

  <!-- Control signal -->
  <line x1="70" y1="335" x2="600" y2="335" class="ink hair soft" stroke-dasharray="6 5" />
  <text x="110" y="325" font-family="PT Mono" font-size="24" class="dot">Internal Logic</text>

  <!-- Gate branches -->
  <line x1="200" y1="370" x2="200" y2="250" class="ink hair soft" stroke-dasharray="4 4" />
  <line x1="200" y1="250" x2="460" y2="250" class="ink hair soft" stroke-dasharray="4 4" />
  <text x="330" y="242" font-family="PT Mono" font-size="16" text-anchor="middle" class="dot soft">Gate</text>

  <line x1="200" y1="370" x2="200" y2="420" class="ink hair soft" stroke-dasharray="4 4" />
  <line x1="200" y1="420" x2="460" y2="420" class="ink hair soft" stroke-dasharray="4 4" />
  <text x="330" y="440" font-family="PT Mono" font-size="16" text-anchor="middle" class="dot soft">Gate</text>

  <!-- Inverter -->
  <circle cx="330" cy="250" r="6" class="ink hair" fill="var(--bg)" />
  <text x="330" y="255" font-family="PT Mono" font-size="13" text-anchor="middle" class="dot">~</text>

  <!-- Load -->
  <g transform="translate(940 335)">
    <line x1="0" y1="0" x2="30" y2="0" class="ink hair soft" />
    <path class="ink fine" d="M30 0 l6 -10 l12 20 l12 -20 l12 20 l6 -10" />
    <line x1="78" y1="0" x2="100" y2="0" class="ink hair soft" />
    <path class="ink fine" d="M100 -14 l22 14 l-22 14 z" />
    <line x1="100" y1="-14" x2="100" y2="14" class="ink fine" />
    <line x1="130" y1="-8" x2="145" y2="-15" class="ink hair soft" />
    <line x1="130" y1="0" x2="148" y2="0" class="ink hair soft" />
    <line x1="130" y1="8" x2="145" y2="15" class="ink hair soft" />
    <line x1="100" y1="14" x2="100" y2="135" class="ink hair soft" stroke-dasharray="4 4" />
  </g>

  <!-- Truth Table -->
  <g transform="translate(100 600)">
    <text x="0" y="0" font-family="PT Mono" font-size="22" class="dot">CMOS Truth Table</text>
    <line x1="-10" y1="18" x2="300" y2="18" class="ink hair soft" />
    <text x="10" y="44" font-family="PT Mono" font-size="17" class="dot">Latch Bit</text>
    <text x="110" y="44" font-family="PT Mono" font-size="17" class="dot">PMOS</text>
    <text x="195" y="44" font-family="PT Mono" font-size="17" class="dot">NMOS</text>
    <text x="280" y="44" font-family="PT Mono" font-size="17" class="dot">Pin</text>
    <line x1="-10" y1="56" x2="300" y2="56" class="ink hair soft" />
    <text x="10" y="80" font-family="PT Mono" font-size="17" class="dot">1</text>
    <text x="110" y="80" font-family="PT Mono" font-size="17" class="dot fade">OFF</text>
    <text x="195" y="80" font-family="PT Mono" font-size="17" class="dot">ON</text>
    <text x="280" y="80" font-family="PT Mono" font-size="17" class="dot">LOW</text>
    <text x="10" y="104" font-family="PT Mono" font-size="17" class="dot">0</text>
    <text x="110" y="104" font-family="PT Mono" font-size="17" class="dot">ON</text>
    <text x="195" y="104" font-family="PT Mono" font-size="17" class="dot fade">OFF</text>
    <text x="280" y="104" font-family="PT Mono" font-size="17" class="dot">HIGH</text>
  </g>
</svg>
