<svg width="100%" viewBox="0 0 680 427.3" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root { 
        --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85;
        --data: #E2EFED; --new: #EBE6F5; --empty: #F0EFEC;
      }
      @media (prefers-color-scheme: dark) {
        :root { 
          --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18;
          --data: #1A2E28; --new: #221E33; --empty: #1A1A19;
        }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2; }
      .hair { stroke-width: 1.4; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.75; }
      .soft { opacity: 0.5; }
      .noiseLayer { opacity: var(--noise-opacity); }
      .fill-data { fill: var(--data); }
      .fill-new { fill: var(--new); }
      .fill-empty { fill: var(--empty); }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/>
    </marker>
  </defs>

  <rect class="bg" width="680" height="427.3"/>
  <rect class="noiseLayer" width="680" height="427.3" filter="url(#paperNoise)"/>

  <!-- ══ SCENE 1: Initial state ══ -->
  <text x="40" y="38" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">Before write — 4 bytes used</text>

  <!-- Array cells: 8 cells, x starts at 40, each cell 72px wide -->
  <!-- [0] tail=read  [1]  [2]  [3]  [4] head=write  [5]  [6]  [7] -->

  <!-- Index labels -->
  <text x="76" y="62" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[0]</text>
  <text x="148" y="62" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[1]</text>
  <text x="220" y="62" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[2]</text>
  <text x="292" y="62" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[3]</text>
  <text x="364" y="62" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[4]</text>
  <text x="436" y="62" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[5]</text>
  <text x="508" y="62" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[6]</text>
  <text x="580" y="62" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[7]</text>

  <!-- Filled cells [0..3] — data present -->
  <rect x="40" y="74" width="72" height="44" rx="4" class="fill-data ink fine"/>
  <rect x="112" y="74" width="72" height="44" rx="4" class="fill-data ink fine"/>
  <rect x="184" y="74" width="72" height="44" rx="4" class="fill-data ink fine"/>
  <rect x="256" y="74" width="72" height="44" rx="4" class="fill-data ink fine"/>
  <text x="76" y="96" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">data</text>
  <text x="148" y="96" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">data</text>
  <text x="220" y="96" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">data</text>
  <text x="292" y="96" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">data</text>

  <!-- Empty cells [4..7] -->
  <rect x="328" y="74" width="72" height="44" rx="4" class="fill-empty ink hair"/>
  <rect x="400" y="74" width="72" height="44" rx="4" class="fill-empty ink hair"/>
  <rect x="472" y="74" width="72" height="44" rx="4" class="fill-empty ink hair"/>
  <rect x="544" y="74" width="72" height="44" rx="4" class="fill-empty ink hair"/>
  <text x="364" y="96" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">—</text>
  <text x="436" y="96" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">—</text>
  <text x="508" y="96" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">—</text>
  <text x="580" y="96" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">—</text>

  <!-- tail pointer arrow at [0] -->
  <line x1="76" y1="142" x2="76" y2="156" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="76" y="172" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">tail</text>
  <text x="76" y="186" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">(read here)</text>

  <!-- head pointer arrow at [4] -->
  <line x1="364" y1="142" x2="364" y2="156" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="364" y="172" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">head</text>
  <text x="364" y="186" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">(write here)</text>

  <!-- ══ Divider ══ -->
  <line x1="40" y1="214" x2="640" y2="214" class="ink hair soft" stroke-dasharray="4 4"/>

  <!-- ══ SCENE 2: After writing 2 bytes and wrapping ══ -->
  <text x="40" y="236" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">After writing 6 bytes — head wrapped to [0]</text>

  <!-- Index labels row 2 -->
  <text x="76" y="260" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[0]</text>
  <text x="148" y="260" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[1]</text>
  <text x="220" y="260" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[2]</text>
  <text x="292" y="260" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[3]</text>
  <text x="364" y="260" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[4]</text>
  <text x="436" y="260" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[5]</text>
  <text x="508" y="260" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[6]</text>
  <text x="580" y="260" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">[7]</text>

  <!-- Newly written cells [4..7] — newest data -->
  <rect x="328" y="272" width="72" height="44" rx="4" class="fill-new ink fine"/>
  <rect x="400" y="272" width="72" height="44" rx="4" class="fill-new ink fine"/>
  <rect x="472" y="272" width="72" height="44" rx="4" class="fill-new ink fine"/>
  <rect x="544" y="272" width="72" height="44" rx="4" class="fill-new ink fine"/>
  <text x="364" y="294" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">new</text>
  <text x="436" y="294" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">new</text>
  <text x="508" y="294" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">new</text>
  <text x="580" y="294" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">new</text>

  <!-- Old filled cells [0..3] still present -->
  <rect x="40" y="272" width="72" height="44" rx="4" class="fill-data ink fine"/>
  <rect x="112" y="272" width="72" height="44" rx="4" class="fill-data ink fine"/>
  <rect x="184" y="272" width="72" height="44" rx="4" class="fill-data ink fine"/>
  <rect x="256" y="272" width="72" height="44" rx="4" class="fill-data ink fine"/>
  <text x="76" y="294" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">data</text>
  <text x="148" y="294" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">data</text>
  <text x="220" y="294" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">data</text>
  <text x="292" y="294" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot">data</text>

  <!-- head wrapped to [0] — shown with curved wrap arrow -->
  <path d="M 616 270 Q 640 240 640 230 Q 640 224 630 222 Q 610 220 56 220 Q 44 222 44 232 Q 44 248 76 270" class="ink hair soft" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- head label at [0] pointing down -->
  <line x1="76" y1="340" x2="76" y2="354" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="76" y="370" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">head</text>
  <text x="76" y="384" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">(wrapped!)</text>

  <!-- tail still at [0] but now points further right — show at [4] -->
  <line x1="364" y1="340" x2="364" y2="354" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="364" y="370" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">tail</text>
  <text x="364" y="384" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot soft">(read here)</text>

  <!-- Legend -->
  <rect x="40" y="404" width="12" height="12" rx="2" class="fill-data ink hair"/>
  <text x="58" y="410" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">Existing data</text>
  <rect x="160" y="404" width="12" height="12" rx="2" class="fill-new ink hair"/>
  <text x="178" y="410" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">Newly written</text>
  <rect x="292" y="404" width="12" height="12" rx="2" class="fill-empty ink hair"/>
  <text x="310" y="410" dominant-baseline="central" font-family="PT Mono" font-size="12" class="dot fade">Empty</text>
</svg>
