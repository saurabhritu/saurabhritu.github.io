<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root { 
        --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85;
        --idle: #F0EFEC; --armed: #E2EFED; --flying: #EBE6F5; --landing: #F5E9D0; --fault: #F2E4DF;
      }
      @media (prefers-color-scheme: dark) {
        :root { 
          --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18;
          --idle: #1A1A19; --armed: #1A2E28; --flying: #221E33; --landing: #2E2619; --fault: #2E1E1A;
        }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2; }
      .hair { stroke-width: 1.4; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.75; }
      .soft { opacity: 0.5; }
      .noiseLayer { opacity: var(--noise-opacity); }
      .fill-idle { fill: var(--idle); }
      .fill-armed { fill: var(--armed); }
      .fill-flying { fill: var(--flying); }
      .fill-landing { fill: var(--landing); }
      .fill-fault { fill: var(--fault); }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/>
    </marker>
  </defs>

  <rect class="bg" width="680" height="560"/>
  <rect class="noiseLayer" width="680" height="560" filter="url(#paperNoise)"/>

  <!-- ── IDLE ── (top-left) -->
  <rect x="60" y="60" width="120" height="44" rx="8" class="fill-idle ink fine"/>
  <text x="120" y="82" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="14" font-weight="500">IDLE</text>

  <!-- ── ARMED ── (top-right) -->
  <rect x="340" y="60" width="120" height="44" rx="8" class="fill-armed ink fine"/>
  <text x="400" y="82" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="14" font-weight="500">ARMED</text>

  <!-- ── FLYING ── (middle) -->
  <rect x="200" y="220" width="120" height="44" rx="8" class="fill-flying ink fine"/>
  <text x="260" y="242" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="14" font-weight="500">FLYING</text>

  <!-- ── LANDING ── (lower-middle) -->
  <rect x="200" y="370" width="120" height="44" rx="8" class="fill-landing ink fine" stroke-dasharray="4 3"/>
  <text x="260" y="392" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="14" font-weight="500">LANDING</text>

  <!-- ── FAULT ── (right) -->
  <rect x="490" y="290" width="120" height="44" rx="8" class="fill-fault ink fine"/>
  <text x="550" y="312" text-anchor="middle" dominant-baseline="central" class="dot" font-family="PT Mono" font-size="14" font-weight="500">FAULT</text>

  <!-- ══ ARROWS ══ -->

  <!-- IDLE → ARMED (CMD_ARM) — top horizontal right -->
  <line x1="180" y1="82" x2="338" y2="82" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="259" y="74" text-anchor="middle" class="dot fade" font-family="PT Mono" font-size="12">CMD_ARM</text>

  <!-- ARMED → FLYING (CMD_TAKEOFF) — diagonal down-left -->
  <path d="M 400 104 L 400 180 L 262 180 L 262 218" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="380" y="174" text-anchor="middle" class="dot fade" font-family="PT Mono" font-size="12">CMD_TAKEOFF</text>

  <!-- FLYING → LANDING (LOW_BATTERY) — straight down -->
  <line x1="260" y1="264" x2="260" y2="368" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="210" y="320" text-anchor="middle" class="dot fade" font-family="PT Mono" font-size="12">LOW_BATTERY</text>

  <!-- LANDING → FLYING (CMD_RESUME) — right curved loop -->
  <path d="M 320 380 L 390 380 L 390 242 L 322 242" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="430" y="316" text-anchor="middle" class="dot fade" font-family="PT Mono" font-size="12">CMD_RESUME</text>
  <text x="430" y="330" text-anchor="middle" class="dot soft" font-family="PT Mono" font-size="12">(if cleared)</text>

  <!-- LANDING → IDLE (LANDED) — left then up -->
  <path d="M 200 392 L 120 392 L 120 106" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="84" y="310" text-anchor="middle" class="dot fade" font-family="PT Mono" font-size="12">LANDED</text>

  <!-- IDLE → FAULT (MOTOR_FAULT) — curved right arc -->
  <path d="M 180 72 Q 340 20 488 298" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="335" y="28" text-anchor="middle" class="dot fade" font-family="PT Mono" font-size="12">MOTOR_FAULT (any state)</text>

  <!-- FLYING → FAULT -->
  <path d="M 320 242 L 488 302" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- LANDING → FAULT -->
  <path d="M 320 392 L 488 320" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- ARMED → FAULT -->
  <path d="M 460 82 Q 520 82 552 288" class="ink hair soft" marker-end="url(#arrow)"/>

  <!-- ── Legend ── -->
  <rect x="40" y="490" width="600" height="60" rx="6" class="ink hair soft"/>
  <rect x="56" y="504" width="16" height="16" rx="3" class="fill-idle ink fine"/>
  <text x="80" y="516" class="dot soft" font-family="PT Mono" font-size="12">IDLE</text>
  <rect x="120" y="504" width="16" height="16" rx="3" class="fill-armed ink fine"/>
  <text x="144" y="516" class="dot soft" font-family="PT Mono" font-size="12">ARMED</text>
  <rect x="200" y="504" width="16" height="16" rx="3" class="fill-flying ink fine"/>
  <text x="224" y="516" class="dot soft" font-family="PT Mono" font-size="12">FLYING</text>
  <rect x="280" y="504" width="16" height="16" rx="3" class="fill-landing ink fine" stroke-dasharray="4 3"/>
  <text x="304" y="516" class="dot soft" font-family="PT Mono" font-size="12">LANDING</text>
  <rect x="370" y="504" width="16" height="16" rx="3" class="fill-fault ink fine"/>
  <text x="394" y="516" class="dot soft" font-family="PT Mono" font-size="12">FAULT (terminal)</text>
  <text x="220" y="540" class="dot soft" font-family="PT Mono" font-size="12">Arrow = valid transition</text>
</svg>
