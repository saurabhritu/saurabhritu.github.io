<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root { --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18; }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2; }
      .hair { stroke-width: 1.4; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.75; }
      .soft { opacity: 0.5; }
      .noiseLayer { opacity: var(--noise-opacity); }
    </style>
  </defs>

  <rect class="bg" width="800" height="520"/>
  <rect class="noiseLayer" width="800" height="520" filter="url(#paperNoise)"/>

  <!-- ════════════════════════════════════════
       WATCHDOG MANAGER outer container
       ════════════════════════════════════════ -->
  <rect x="40" y="30" width="720" height="230" rx="14" class="ink fine" />

  <text x="400" y="60" font-family="PT Mono" font-size="14" font-weight="500" text-anchor="middle" class="dot">Watchdog manager task</text>

  <text x="68" y="88" font-family="PT Mono" font-size="12" class="dot soft">Checks alive_flags every 500 ms:</text>

  <!-- Inner checklist panel -->
  <rect x="68" y="105" width="440" height="96" rx="8" class="ink hair" />

  <!-- Check rows -->
  <circle cx="94" cy="126" r="4" class="dot" />
  <text x="108" y="130" font-family="PT Mono" font-size="12" class="dot">sensor_task alive?</text>
  <text x="476" y="130" font-family="PT Mono" font-size="12" text-anchor="end" class="dot fade">bit 0 set</text>

  <circle cx="94" cy="150" r="4" class="dot" />
  <text x="108" y="154" font-family="PT Mono" font-size="12" class="dot">control_task alive?</text>
  <text x="476" y="154" font-family="PT Mono" font-size="12" text-anchor="end" class="dot fade">bit 1 set</text>

  <circle cx="94" cy="174" r="4" class="dot" />
  <text x="108" y="178" font-family="PT Mono" font-size="12" class="dot">radio_task alive?</text>
  <text x="476" y="178" font-family="PT Mono" font-size="12" text-anchor="end" class="dot fade">bit 2 set</text>

  <!-- Decision outcomes -->
  <rect x="68" y="215" width="310" height="28" rx="6" class="ink fine" />
  <text x="223" y="233" font-family="PT Mono" font-size="12" text-anchor="middle" class="dot">All alive → feed HW watchdog</text>

  <rect x="396" y="215" width="310" height="28" rx="6" class="ink fine" stroke-dasharray="4 3" />
  <text x="551" y="233" font-family="PT Mono" font-size="12" text-anchor="middle" class="dot soft">Any dead → do NOT feed → reboot</text>

  <!-- ════════════════════════════════════════
       THREE WORKER TASKS
       ════════════════════════════════════════ -->

  <!-- sensor_task -->
  <rect x="68" y="345" width="180" height="76" rx="8" class="ink fine" />
  <text x="158" y="374" font-family="PT Mono" font-size="14" font-weight="500" text-anchor="middle" class="dot">sensor_task</text>
  <text x="158" y="394" font-family="PT Mono" font-size="12" text-anchor="middle" class="dot soft">sets bit 0</text>
  <text x="158" y="410" font-family="PT Mono" font-size="12" text-anchor="middle" class="dot soft">every 100 ms</text>

  <!-- control_task -->
  <rect x="310" y="345" width="180" height="76" rx="8" class="ink fine" />
  <text x="400" y="374" font-family="PT Mono" font-size="14" font-weight="500" text-anchor="middle" class="dot">control_task</text>
  <text x="400" y="394" font-family="PT Mono" font-size="12" text-anchor="middle" class="dot soft">sets bit 1</text>
  <text x="400" y="410" font-family="PT Mono" font-size="12" text-anchor="middle" class="dot soft">every 1 ms</text>

  <!-- radio_task -->
  <rect x="552" y="345" width="180" height="76" rx="8" class="ink fine" />
  <text x="642" y="374" font-family="PT Mono" font-size="14" font-weight="500" text-anchor="middle" class="dot">radio_task</text>
  <text x="642" y="394" font-family="PT Mono" font-size="12" text-anchor="middle" class="dot soft">sets bit 2</text>
  <text x="642" y="410" font-family="PT Mono" font-size="12" text-anchor="middle" class="dot soft">every 50 ms</text>

  <!-- ════════════════════════════════════════
       ARROWS from tasks up into manager
       ════════════════════════════════════════ -->
  <line x1="158" y1="345" x2="158" y2="258" class="ink hair soft" marker-end="url(#arrow)" />
  <line x1="400" y1="345" x2="400" y2="258" class="ink hair soft" marker-end="url(#arrow)" />
  <line x1="642" y1="345" x2="642" y2="258" class="ink hair soft" marker-end="url(#arrow)" />

  <!-- Arrow label -->
  <text x="400" y="305" font-family="PT Mono" font-size="12" text-anchor="middle" class="dot soft">sets alive bit each cycle</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" class="ink hair soft" fill="none" />
    </marker>
  </defs>
</svg>
