<svg width="100%" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!-- DEVICES                                 -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Device A -->
  <g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="40" y="30" width="160" height="110" rx="8" stroke-width="0.5" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="120" y="56" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">Device A</text>
    <text x="120" y="74" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">e.g. MCU</text>
  </g>
  <text x="175" y="100" text-anchor="end" dominant-baseline="central" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:end;dominant-baseline:central">TX</text>
  <text x="175" y="122" text-anchor="end" dominant-baseline="central" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:end;dominant-baseline:central">RX</text>

  <!-- Device B -->
  <g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="480" y="30" width="160" height="110" rx="8" stroke-width="0.5" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="560" y="56" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">Device B</text>
    <text x="560" y="74" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">e.g. GPS</text>
  </g>
  <text x="505" y="100" text-anchor="start" dominant-baseline="central" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:central">RX</text>
  <text x="505" y="122" text-anchor="start" dominant-baseline="central" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:central">TX</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- STATIC WIRES                            -->
  <!-- ═══════════════════════════════════════ -->
  <!-- TX→RX wire: dashes march left→right -->
  <line x1="200" y1="100" x2="478" y2="100" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="8 4" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="0;-36" dur="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- RX←TX wire: dashes march right→left -->
  <line x1="480" y1="122" x2="202" y2="122" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="8 4" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="0;36" dur="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- wire labels -->
  <text x="340" y="90" text-anchor="middle" dominant-baseline="central" style="fill:rgb(29, 158, 117);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">TX → RX</text>
  <text x="340" y="134" text-anchor="middle" dominant-baseline="central" style="fill:rgb(83, 74, 183);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">RX ← TX</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- ANIMATED PIN DOTS                       -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Device A TX pin — blinks when sending (teal) -->
  <circle cx="200" cy="100" r="4" fill="#1D9E75" filter="url(#glow)">
    <animate attributeName="r"       values="4;8;4"   dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Device A RX pin — blinks when receiving (purple, offset) -->
  <circle cx="200" cy="122" r="4" fill="#534AB7" filter="url(#glow)">
    <animate attributeName="r"       values="4;8;4"   dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
  </circle>

  <!-- Device B RX pin — blinks when receiving (teal, offset) -->
  <circle cx="480" cy="100" r="4" fill="#1D9E75" filter="url(#glow)">
    <animate attributeName="r"       values="4;8;4"   dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Device B TX pin — blinks when sending (purple) -->
  <circle cx="480" cy="122" r="4" fill="#534AB7" filter="url(#glow)">
    <animate attributeName="r"       values="4;8;4"   dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══════════════════════════════════════ -->
  <!-- TRAVELLING DATA DOTS                    -->
  <!-- ═══════════════════════════════════════ -->

  <!-- teal dot: Device A TX → Device B RX -->
  <circle cy="100" r="5" fill="#1D9E75" filter="url(#glow)">
    <animate attributeName="cx"      values="200;478;478" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0"     keyTimes="0;0.05;0.9;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- purple dot: Device B TX → Device A RX, offset by half cycle -->
  <circle cy="122" r="5" fill="#534AB7" filter="url(#glow)">
    <animate attributeName="cx"      values="480;202;202" keyTimes="0;0.5;1" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0"     keyTimes="0;0.05;0.9;1" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══════════════════════════════════════ -->
  <!-- DATA FRAME — bottom section             -->
  <!-- Matches HTML @keyframes exactly:        -->
  <!-- each cell ramps 0.18→1 over ~4% window, -->
  <!-- holds 1 for its 10% slot, ramps back.   -->
  <!-- animate is on the rect directly, not g. -->
  <!-- ═══════════════════════════════════════ -->

  <text x="340" y="168" text-anchor="middle" dominant-baseline="central" style="fill:rgb(136,135,128);stroke:none;font-family:&quot;Anthropic Sans&quot;,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">UART data frame — one byte (8-bit, no parity)</text>

  <!-- START: bright 0%–9% -->
  <g>
    <rect x="70" y="182" width="52" height="48" rx="4" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(180,178,169)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.00;0.04;0.09;0.13;1"
        values="0.18;1;1;1;0.18;0.18"/>
    </rect>
    <text x="96" y="200" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)" font-family="Anthropic Sans,sans-serif" font-size="12">START</text>
    <text x="96" y="218" text-anchor="middle" dominant-baseline="central" fill="rgb(140,138,130)" font-family="Anthropic Sans,sans-serif" font-size="12">bit</text>
  </g>

  <!-- D0: bright 9%–19% -->
  <g>
    <rect x="124" y="182" width="52" height="48" rx="4" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.09;0.13;0.19;0.23;1"
        values="0.18;0.18;1;1;0.18;0.18"/>
    </rect>
    <text x="150" y="200" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="Anthropic Sans,sans-serif" font-size="12">D0</text>
    <text x="150" y="218" text-anchor="middle" dominant-baseline="central" fill="rgb(70,158,130)" font-family="Anthropic Sans,sans-serif" font-size="12">LSB</text>
  </g>

  <!-- D1: bright 19%–29% -->
  <g>
    <rect x="178" y="182" width="52" height="48" rx="4" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.19;0.23;0.29;0.33;1"
        values="0.18;0.18;1;1;0.18;0.18"/>
    </rect>
    <text x="204" y="206" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="Anthropic Sans,sans-serif" font-size="12">D1</text>
  </g>

  <!-- D2: bright 29%–39% -->
  <g>
    <rect x="232" y="182" width="52" height="48" rx="4" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.29;0.33;0.39;0.43;1"
        values="0.18;0.18;1;1;0.18;0.18"/>
    </rect>
    <text x="258" y="206" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="Anthropic Sans,sans-serif" font-size="12">D2</text>
  </g>

  <!-- D3: bright 39%–49% -->
  <g>
    <rect x="286" y="182" width="52" height="48" rx="4" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.39;0.43;0.49;0.53;1"
        values="0.18;0.18;1;1;0.18;0.18"/>
    </rect>
    <text x="312" y="206" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="Anthropic Sans,sans-serif" font-size="12">D3</text>
  </g>

  <!-- D4: bright 49%–59% -->
  <g>
    <rect x="340" y="182" width="52" height="48" rx="4" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.49;0.53;0.59;0.63;1"
        values="0.18;0.18;1;1;0.18;0.18"/>
    </rect>
    <text x="366" y="206" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="Anthropic Sans,sans-serif" font-size="12">D4</text>
  </g>

  <!-- D5: bright 59%–69% -->
  <g>
    <rect x="394" y="182" width="52" height="48" rx="4" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.59;0.63;0.69;0.73;1"
        values="0.18;0.18;1;1;0.18;0.18"/>
    </rect>
    <text x="420" y="206" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="Anthropic Sans,sans-serif" font-size="12">D5</text>
  </g>

  <!-- D6: bright 69%–79% -->
  <g>
    <rect x="448" y="182" width="52" height="48" rx="4" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.69;0.73;0.79;0.83;1"
        values="0.18;0.18;1;1;0.18;0.18"/>
    </rect>
    <text x="474" y="206" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="Anthropic Sans,sans-serif" font-size="12">D6</text>
  </g>

  <!-- D7: bright 79%–89% -->
  <g>
    <rect x="502" y="182" width="52" height="48" rx="4" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.79;0.83;0.89;0.93;1"
        values="0.18;0.18;1;1;0.18;0.18"/>
    </rect>
    <text x="528" y="200" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="Anthropic Sans,sans-serif" font-size="12">D7</text>
    <text x="528" y="218" text-anchor="middle" dominant-baseline="central" fill="rgb(70,158,130)" font-family="Anthropic Sans,sans-serif" font-size="12">MSB</text>
  </g>

  <!-- STOP: bright 89%–100% -->
  <g>
    <rect x="556" y="182" width="54" height="48" rx="4" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(180,178,169)">
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.89;0.93;1"
        values="0.18;0.18;1;1"/>
    </rect>
    <text x="583" y="200" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)" font-family="Anthropic Sans,sans-serif" font-size="12">STOP</text>
    <text x="583" y="218" text-anchor="middle" dominant-baseline="central" fill="rgb(140,138,130)" font-family="Anthropic Sans,sans-serif" font-size="12">bit</text>
  </g>

  <!-- flow arrow under frame -->
  <line x1="70" y1="248" x2="608" y2="248" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="262" text-anchor="middle" dominant-baseline="central" style="fill:rgb(136, 135, 128);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">time →  bits sent LSB first at fixed baud rate  (e.g. `115200` bps)</text>

  <!-- bottom notes -->
  <text x="96" y="290" text-anchor="middle" dominant-baseline="central" style="fill:rgb(95, 94, 90);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">line LOW</text>
  <text x="96" y="304" text-anchor="middle" dominant-baseline="central" style="fill:rgb(95, 94, 90);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">"get ready"</text>
  <text x="339" y="290" text-anchor="middle" dominant-baseline="central" style="fill:rgb(29, 158, 117);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">8 data bits — actual payload byte</text>
  <text x="583" y="290" text-anchor="middle" dominant-baseline="central" style="fill:rgb(95, 94, 90);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">line HIGH</text>
  <text x="583" y="304" text-anchor="middle" dominant-baseline="central" style="fill:rgb(95, 94, 90);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">"done"</text>

</svg>
