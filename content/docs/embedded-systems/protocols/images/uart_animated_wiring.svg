<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root { --bg: #F7F4EE; --ink: #161616; --noise-opacity: 0.85;
        --green: #E2EFED; --purple: #EBE6F5; --gray: #F0EFEC; --amber: #F5E9D0;
        --red: #F5E0E0; --lime: #E6F0E2; --blue: #E0EAF5;
        --green-accent: #2A7A5A; --purple-accent: #6A4A9A; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #131313; --ink: #F3EFE7; --noise-opacity: 0.18;
          --green: #1A2E28; --purple: #221E33; --gray: #1A1A19; --amber: #2E2619;
          --red: #2E1919; --lime: #1E2E1A; --blue: #192633;
          --green-accent: #7ACAA5; --purple-accent: #B4A0D8; }
      }
      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2; }
      .hair { stroke-width: 1.4; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .soft { opacity: 0.5; }
      .noiseLayer { opacity: var(--noise-opacity); }
      .fill-green { fill: var(--green); }
      .fill-purple { fill: var(--purple); }
      .fill-gray { fill: var(--gray); }
      .fill-amber { fill: var(--amber); }
      .fill-red { fill: var(--red); }
      .fill-lime { fill: var(--lime); }
      .fill-blue { fill: var(--blue); }
      .accent-green { fill: var(--green-accent); stroke: var(--green-accent); }
      .accent-purple { fill: var(--purple-accent); stroke: var(--purple-accent); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/>
    </marker>
  </defs>
  <rect class="bg" width="680" height="340"/>
  <rect class="noiseLayer" width="680" height="340" filter="url(#paperNoise)"/>

  <!-- ══ DEVICE A ══ -->
  <rect x="40" y="30" width="160" height="100" rx="8" class="fill-green ink fine"/>
  <text x="120" y="56" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="14" font-weight="600" class="dot">Device A</text>
  <text x="120" y="76" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">e.g. MCU</text>
  <text x="185" y="96" text-anchor="end" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">TX</text>
  <text x="185" y="116" text-anchor="end" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">RX</text>

  <!-- ══ DEVICE B ══ -->
  <rect x="480" y="30" width="160" height="100" rx="8" class="fill-purple ink fine"/>
  <text x="560" y="56" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="14" font-weight="600" class="dot">Device B</text>
  <text x="560" y="76" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">e.g. GPS</text>
  <text x="495" y="96" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">RX</text>
  <text x="495" y="116" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">TX</text>

  <!-- ══ TX → RX WIRE: dashes flow LEFT→RIGHT (A→B) ══ -->
  <line x1="200" y1="96" x2="478" y2="96" class="ink hair" stroke-dasharray="8 4" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="0;-24" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="340" y="86" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">TX → RX</text>

  <!-- ══ RX ← TX WIRE: dashes flow RIGHT→LEFT (B→A) ══ -->
  <!-- drawn left-to-right so negative offset moves dashes rightward visually;
       to reverse, use positive offset -->
  <line x1="200" y1="116" x2="478" y2="116" class="ink hair" stroke-dasharray="8 4" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="0;24" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <text x="340" y="128" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">RX ← TX</text>

  <!-- ══ CONTINUOUS FLOW DOTS on TX wire (A→B) ══ -->
  <circle cy="96" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="200;478" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cy="96" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="200;478" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>

  <!-- ══ CONTINUOUS FLOW DOTS on RX wire (B→A) ══ -->
  <circle cy="116" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="478;200" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cy="116" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="478;200" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>

  <!-- ══ LABELLED DATA PACKET: A→B sends 0x55 ══ -->
  <rect rx="4" y="87" width="40" height="18" class="fill-amber ink hair" opacity="0">
    <animate attributeName="x" values="200;438;438" keyTimes="0;0.6;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text y="100" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="9" font-weight="600" class="dot" opacity="0">
    0x55
    <animate attributeName="x" values="220;458;458" keyTimes="0;0.6;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- ══ LABELLED RESPONSE PACKET: B→A sends ACK ══ -->
  <rect rx="4" y="107" width="40" height="18" class="fill-purple ink hair" opacity="0">
    <animate attributeName="x" values="438;200;200" keyTimes="0;0.6;1" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="4s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text y="120" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="9" font-weight="600" class="dot" opacity="0">
    ACK
    <animate attributeName="x" values="458;220;220" keyTimes="0;0.6;1" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="4s" begin="2s" repeatCount="indefinite"/>
  </text>

  <!-- ══ DATA FRAME — bottom section ══ -->
  <text x="340" y="158" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot soft">UART data frame — one byte (8N1)</text>

  <!-- START -->
  <rect x="60" y="172" width="52" height="40" rx="5" class="fill-red ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.04;0.09;0.13;1" values="0.25;1;1;1;0.25;0.25"/>
  </rect>
  <text x="86" y="188" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" font-weight="500" class="dot">START</text>
  <text x="86" y="203" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">line LOW</text>

  <!-- D0 -->
  <rect x="114" y="172" width="42" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.09;0.13;0.20;0.24;1" values="0.25;0.25;1;1;0.25;0.25"/>
  </rect>
  <text x="135" y="188" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">D0</text>
  <text x="135" y="203" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">LSB</text>

  <!-- D1–D6 -->
  <rect x="158" y="172" width="42" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.20;0.24;0.30;0.34;1" values="0.25;0.25;1;1;0.25;0.25"/>
  </rect>
  <text x="179" y="194" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">D1</text>

  <rect x="202" y="172" width="42" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.30;0.34;0.40;0.44;1" values="0.25;0.25;1;1;0.25;0.25"/>
  </rect>
  <text x="223" y="194" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">D2</text>

  <rect x="246" y="172" width="42" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.40;0.44;0.50;0.54;1" values="0.25;0.25;1;1;0.25;0.25"/>
  </rect>
  <text x="267" y="194" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">D3</text>

  <rect x="290" y="172" width="42" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.50;0.54;0.60;0.64;1" values="0.25;0.25;1;1;0.25;0.25"/>
  </rect>
  <text x="311" y="194" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">D4</text>

  <rect x="334" y="172" width="42" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.60;0.64;0.70;0.74;1" values="0.25;0.25;1;1;0.25;0.25"/>
  </rect>
  <text x="355" y="194" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">D5</text>

  <rect x="378" y="172" width="42" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.70;0.74;0.80;0.84;1" values="0.25;0.25;1;1;0.25;0.25"/>
  </rect>
  <text x="399" y="194" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">D6</text>

  <!-- D7 -->
  <rect x="422" y="172" width="42" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.80;0.84;0.90;0.94;1" values="0.25;0.25;1;1;0.25;0.25"/>
  </rect>
  <text x="443" y="188" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" class="dot">D7</text>
  <text x="443" y="203" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">MSB</text>

  <!-- STOP -->
  <rect x="466" y="172" width="52" height="40" rx="5" class="fill-red ink hair">
    <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.90;0.94;1" values="0.25;0.25;1;1"/>
  </rect>
  <text x="492" y="188" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="11" font-weight="500" class="dot">STOP</text>
  <text x="492" y="203" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">line HIGH</text>

  <!-- flow arrow -->
  <line x1="60" y1="228" x2="516" y2="228" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="288" y="242" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">time → bits sent LSB first at baud rate</text>

  <!-- bottom notes -->
  <line x1="40" y1="260" x2="640" y2="260" class="ink hair soft" stroke-dasharray="5 3"/>
  <text x="86" y="276" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">line LOW</text>
  <text x="86" y="290" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">"get ready"</text>
  <text x="288" y="276" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot">8 data bits — payload byte</text>
  <text x="492" y="276" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">line HIGH</text>
  <text x="492" y="290" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">"done"</text>

  <!-- baud note -->
  <text x="340" y="316" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">both sides MUST agree on baud rate · no clock · mismatch = garbled data</text>
</svg>
