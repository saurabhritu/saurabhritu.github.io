<svg width="100%" viewBox="0 0 700 310" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/></marker>
  </defs>
  <rect class="bg" width="700" height="310"/>
  <rect class="noiseLayer" width="700" height="310" filter="url(#paperNoise)"/>

  <!-- ══ MCU BOX ══ -->
  <rect x="24" y="40" width="150" height="130" rx="8" class="fill-blue ink fine"/>
  <text x="99" y="66" text-anchor="middle" font-family="PT Mono" font-size="13" font-weight="600" class="dot">MCU</text>
  <text x="99" y="84" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">3.3V / 5V TTL</text>
  <text x="160" y="114" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">TX</text>
  <text x="160" y="128" text-anchor="end" font-family="PT Mono" font-size="9" class="dot soft">(0–3.3V)</text>
  <text x="160" y="148" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">RX</text>
  <text x="160" y="162" text-anchor="end" font-family="PT Mono" font-size="9" class="dot soft">(0–3.3V)</text>

  <!-- ══ MAX232 BOX ══ -->
  <rect x="275" y="30" width="150" height="160" rx="8" class="fill-amber ink fine"/>
  <text x="350" y="56" text-anchor="middle" font-family="PT Mono" font-size="13" font-weight="600" class="dot">MAX232</text>
  <text x="350" y="74" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">"translator" chip</text>

  <rect x="288" y="92" width="124" height="30" rx="4" class="fill-green ink hair"/>
  <text x="350" y="104" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot">step up</text>
  <text x="350" y="116" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">3.3V → ±12V</text>

  <rect x="288" y="136" width="124" height="30" rx="4" class="fill-purple ink hair"/>
  <text x="350" y="148" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot">step down</text>
  <text x="350" y="160" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">±12V → 3.3V</text>

  <!-- ══ RS-232 CABLE BOX ══ -->
  <rect x="526" y="40" width="150" height="130" rx="8" class="fill-purple ink fine"/>
  <text x="601" y="66" text-anchor="middle" font-family="PT Mono" font-size="13" font-weight="600" class="dot">RS-232</text>
  <text x="601" y="84" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">DB9 connector</text>
  <text x="540" y="114" font-family="PT Mono" font-size="10" class="dot soft">TX</text>
  <text x="540" y="128" font-family="PT Mono" font-size="9" class="dot soft">(±12V)</text>
  <text x="540" y="148" font-family="PT Mono" font-size="10" class="dot soft">RX</text>
  <text x="540" y="162" font-family="PT Mono" font-size="9" class="dot soft">(±12V)</text>

  <!-- ══ WIRES — dashed with directional flow animation ══ -->
  <!-- TX: MCU→MAX232 (dashes flow right) -->
  <line x1="174" y1="110" x2="273" y2="107" class="ink hair" stroke-dasharray="6 4" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <text x="223" y="100" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">0–3.3V</text>

  <!-- TX: MAX232→RS232 (dashes flow right) -->
  <line x1="425" y1="107" x2="524" y2="110" class="ink hair" stroke-dasharray="6 4" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <text x="475" y="100" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">±12V</text>

  <!-- RX: RS232→MAX232 (dashes flow left) -->
  <line x1="427" y1="150" x2="526" y2="150" class="ink hair" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" values="0;20" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="526" y1="150" x2="427" y2="150" class="ink hair" marker-end="url(#arrow)" opacity="0.3"/>
  <text x="475" y="166" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">±12V</text>

  <!-- RX: MAX232→MCU (dashes flow left) -->
  <line x1="176" y1="150" x2="275" y2="150" class="ink hair" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" values="0;20" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="275" y1="150" x2="176" y2="150" class="ink hair" marker-end="url(#arrow)" opacity="0.3"/>
  <text x="223" y="166" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">0–3.3V</text>

  <!-- ══ ANIMATED LABELLED PACKETS ══ -->

  <!-- TX PATH: MCU → MAX232 → RS-232 -->
  <!-- Segment 1: MCU→MAX232 (small packet = 3.3V) -->
  <rect rx="3" y="102" width="36" height="16" class="fill-green ink hair" opacity="0">
    <animate attributeName="x" values="174;237;237" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text y="114" text-anchor="middle" font-family="PT Mono" font-size="8" font-weight="600" class="dot" opacity="0">
    3.3V
    <animate attributeName="x" values="192;255;255" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Segment 2: MAX232→RS232 (big packet = ±12V, step up!) -->
  <rect rx="3" y="99" width="44" height="20" class="fill-amber ink hair" opacity="0">
    <animate attributeName="x" values="425;480;480" keyTimes="0;0.6;1" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  <text y="113" text-anchor="middle" font-family="PT Mono" font-size="8" font-weight="700" class="dot" opacity="0">
    ±12V
    <animate attributeName="x" values="447;502;502" keyTimes="0;0.6;1" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </text>

  <!-- RX PATH: RS-232 → MAX232 → MCU -->
  <!-- Segment 1: RS232→MAX232 (big packet = ±12V) -->
  <rect rx="3" y="142" width="44" height="20" class="fill-amber ink hair" opacity="0">
    <animate attributeName="x" values="480;427;427" keyTimes="0;0.6;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <text y="156" text-anchor="middle" font-family="PT Mono" font-size="8" font-weight="700" class="dot" opacity="0">
    ±12V
    <animate attributeName="x" values="502;449;449" keyTimes="0;0.6;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </text>

  <!-- Segment 2: MAX232→MCU (small packet = 3.3V, stepped down!) -->
  <rect rx="3" y="143" width="36" height="16" class="fill-purple ink hair" opacity="0">
    <animate attributeName="x" values="239;176;176" keyTimes="0;0.6;1" dur="3s" begin="2.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="3s" begin="2.1s" repeatCount="indefinite"/>
  </rect>
  <text y="155" text-anchor="middle" font-family="PT Mono" font-size="8" font-weight="600" class="dot" opacity="0">
    3.3V
    <animate attributeName="x" values="257;194;194" keyTimes="0;0.6;1" dur="3s" begin="2.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.56;0.60" dur="3s" begin="2.1s" repeatCount="indefinite"/>
  </text>

  <!-- Continuous flow dots for visual rhythm -->
  <!-- TX path dots -->
  <circle cy="108" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="174;273" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.06;0.88;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cy="108" r="5" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="425;524" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.06;0.88;1" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <!-- RX path dots -->
  <circle cy="150" r="5" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="524;427" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.06;0.88;1" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cy="150" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="275;176" dur="1.2s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.06;0.88;1" dur="1.2s" begin="0.9s" repeatCount="indefinite"/>
  </circle>

  <!-- ══ WARNING ══ -->
  <rect x="24" y="202" width="652" height="36" rx="5" class="fill-red ink fine">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="350" y="216" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">⚠ NEVER connect MCU directly to RS-232</text>
  <text x="350" y="232" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">RS-232's ±12V will destroy the MCU's 3.3V GPIO pins instantly</text>

  <!-- ══ LEGEND ══ -->
  <line x1="24" y1="256" x2="676" y2="256" class="ink hair soft" stroke-dasharray="5 3"/>
  <circle cx="40" cy="272" r="3" fill="var(--ink)"/>
  <text x="50" y="274" font-family="PT Mono" font-size="10" class="dot soft">TX path — small dot = 3.3V, large dot = ±12V after step-up</text>
  <circle cx="40" cy="292" r="5" fill="var(--ink)"/>
  <text x="50" y="294" font-family="PT Mono" font-size="10" class="dot soft">RX path — large dot = ±12V, small dot = 3.3V after step-down</text>
</svg>
