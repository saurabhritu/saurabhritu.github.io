<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="100%" height="100%"
     style="background-color:#0b0c10; font-family:'Courier New', Courier, monospace;">

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#89b4fa"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#fab387"/>
    </marker>
    <marker id="arr-teal-rev" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10 0 L0 5 L10 10 z" fill="#89b4fa"/>
    </marker>
    <marker id="arr-orange-rev" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10 0 L0 5 L10 10 z" fill="#fab387"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════
       MCU BOX  x=30 y=60 w=180 h=160
       ══════════════════════════════════════ -->
  <rect x="30" y="60" width="185" height="160" rx="8"
        fill="#0e1e40" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="122" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#89b4fa">MCU</text>
  <text x="122" y="110" text-anchor="middle" font-size="12" fill="#6c9ecf">3.3V / 5V TTL</text>

  <!-- TX pin label -->
  <text x="185" y="142" text-anchor="end" font-size="13" fill="#89b4fa">TX</text>
  <text x="185" y="157" text-anchor="end" font-size="11" fill="#3a5a8a">(0–3.3V)</text>
  <!-- RX pin label -->
  <text x="185" y="188" text-anchor="end" font-size="13" fill="#fab387">RX</text>
  <text x="185" y="203" text-anchor="end" font-size="11" fill="#7a4a2a">(0–3.3V)</text>

  <!-- pin dots on MCU right edge -->
  <circle cx="215" cy="148" r="5" fill="#89b4fa" filter="url(#glow)">
    <animate attributeName="r"       values="5;8;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="215" cy="192" r="5" fill="#fab387" filter="url(#glow)">
    <animate attributeName="r"       values="5;8;5" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════
       MAX232 BOX  x=340 y=50 w=180 h=180
       ══════════════════════════════════════ -->
  <rect x="340" y="50" width="180" height="200" rx="8"
        fill="#1a1a0e" stroke="#f9e2af" stroke-width="2"/>
  <text x="430" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#f9e2af">MAX232</text>
  <text x="430" y="100" text-anchor="middle" font-size="12" fill="#7a6a3a">"translator" chip</text>

  <!-- step up label (TX path) -->
  <rect x="355" y="118" width="170" height="36" rx="4" fill="#2a2a0e" stroke="#f9e2af" stroke-width="0.5"/>
  <text x="440" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9e2af">step up</text>
  <text x="440" y="147" text-anchor="middle" font-size="11" fill="#7a6a3a">3.3V → +12V / −12V</text>

  <!-- step down label (RX path) -->
  <rect x="355" y="174" width="170" height="36" rx="4" fill="#2a2a0e" stroke="#f9e2af" stroke-width="0.5"/>
  <text x="440" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9e2af">step down</text>
  <text x="440" y="203" text-anchor="middle" font-size="11" fill="#7a6a3a">+12V / −12V → 3.3V</text>

  <!-- MAX232 left edge pin dots -->
  <circle cx="340" cy="136" r="5" fill="#89b4fa" filter="url(#glow)">
    <animate attributeName="r"       values="5;8;5" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="192" r="5" fill="#fab387" filter="url(#glow)">
    <animate attributeName="r"       values="5;8;5" dur="2s" begin="1.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1.3s" repeatCount="indefinite"/>
  </circle>

  <!-- MAX232 right edge pin dots -->
  <circle cx="520" cy="136" r="5" fill="#89b4fa" filter="url(#glow)">
    <animate attributeName="r"       values="5;8;5" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="192" r="5" fill="#fab387" filter="url(#glow)">
    <animate attributeName="r"       values="5;8;5" dur="2s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════
       RS-232 CABLE BOX  x=640 y=60 w=190 h=160
       ══════════════════════════════════════ -->
  <rect x="640" y="60" width="190" height="160" rx="8"
        fill="#1a0e1a" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="735" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#cba6f7">RS-232 cable</text>
  <text x="735" y="110" text-anchor="middle" font-size="12" fill="#6a4a8a">DB9 connector</text>

  <!-- TX pin label -->
  <text x="650" y="142" font-size="13" fill="#89b4fa">TX</text>
  <text x="650" y="157" font-size="11" fill="#3a3a8a">(+12V/−12V)</text>
  <!-- RX pin label -->
  <text x="650" y="188" font-size="13" fill="#fab387">RX</text>
  <text x="650" y="203" font-size="11" fill="#7a4a2a">(+12V/−12V)</text>

  <!-- RS-232 left edge pin dots -->
  <circle cx="640" cy="148" r="5" fill="#89b4fa" filter="url(#glow)">
    <animate attributeName="r"       values="5;8;5" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="192" r="5" fill="#fab387" filter="url(#glow)">
    <animate attributeName="r"       values="5;8;5" dur="2s" begin="1.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1.9s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════
       WIRE LINES
       TX path (blue): MCU→MAX232→RS232  y=148 / 136
       RX path (orange): RS232→MAX232→MCU  y=192
       ══════════════════════════════════════ -->

  <!-- TX wire MCU→MAX232  y=148 -->
  <line x1="215" y1="148" x2="338" y2="136"
        stroke="#89b4fa" stroke-width="2" marker-end="url(#arr-teal)"/>

  <!-- TX wire MAX232→RS232  y=136 -->
  <line x1="520" y1="136" x2="638" y2="148"
        stroke="#89b4fa" stroke-width="2" marker-end="url(#arr-teal)"/>

  <!-- RX wire RS232→MAX232  y=192 -->
  <line x1="640" y1="192" x2="522" y2="192"
        stroke="#fab387" stroke-width="2" marker-end="url(#arr-orange-rev)"/>

  <!-- RX wire MAX232→MCU  y=192 -->
  <line x1="340" y1="192" x2="217" y2="192"
        stroke="#fab387" stroke-width="2" marker-end="url(#arr-orange-rev)"/>

  <!-- ══════════════════════════════════════
       ANIMATED PACKETS
       TX: MCU → MAX232 → RS-232  (blue, small → large voltage)
       RX: RS-232 → MAX232 → MCU  (orange, large → small)
       ══════════════════════════════════════ -->

  <!-- TX dot: MCU→MAX232 (3.3V, small dot) -->
  <circle r="5" fill="#89b4fa" filter="url(#glow)">
    <animate attributeName="cx" values="215;340;340" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="148;136;136" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.48;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- TX dot: MAX232→RS232 (now bigger = higher voltage) -->
  <circle r="8" fill="#89b4fa" filter="url(#glow-lg)">
    <animate attributeName="cx" values="520;640;640" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="136;148;148" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.48;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- RX dot: RS232→MAX232 (big = 12V) -->
  <circle r="8" fill="#fab387" filter="url(#glow-lg)">
    <animate attributeName="cx" values="640;520;520" keyTimes="0;0.5;1" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="192;192;192" keyTimes="0;0.5;1" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.48;0.5" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- RX dot: MAX232→MCU (small = 3.3V) -->
  <circle r="5" fill="#fab387" filter="url(#glow)">
    <animate attributeName="cx" values="340;215;215" keyTimes="0;0.5;1" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="192;192;192" keyTimes="0;0.5;1" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.48;0.5" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════
       VOLTAGE LABELS on wires
       ══════════════════════════════════════ -->
  <text x="277" y="138" text-anchor="middle" font-size="11" fill="#3a5a8a">0–3.3V</text>
  <text x="580" y="126" text-anchor="middle" font-size="11" fill="#3a5a8a">±12V</text>
  <text x="580" y="205" text-anchor="middle" font-size="11" fill="#7a4a2a">±12V</text>
  <text x="277" y="205" text-anchor="middle" font-size="11" fill="#7a4a2a">0–3.3V</text>

  <!-- ══════════════════════════════════════
       WARNING PANEL
       ══════════════════════════════════════ -->
  <rect x="30" y="248" width="800" height="42" rx="6"
        fill="#2a0e0e" stroke="#f38ba8" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="430" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#f38ba8">
    ⚠  NEVER connect MCU directly to RS-232
  </text>
  <text x="430" y="282" text-anchor="middle" font-size="13" fill="#f38ba8">
    RS-232's ±12V will destroy the MCU's 3.3V GPIO pins instantly
  </text>

  <!-- ══════════════════════════════════════
       BOTTOM LEGEND
       ══════════════════════════════════════ -->
  <line x1="30"  y1="308" x2="70"  y2="308" stroke="#89b4fa" stroke-width="2.5"/>
  <circle cx="50" cy="308" r="5" fill="#89b4fa"/>
  <text x="80" y="312" font-size="12" fill="#89b4fa">TX path — small dot = 3.3V, large dot = ±12V after step-up</text>

  <line x1="30"  y1="330" x2="70"  y2="330" stroke="#fab387" stroke-width="2.5"/>
  <circle cx="50" cy="330" r="5" fill="#fab387"/>
  <text x="80" y="334" font-size="12" fill="#fab387">RX path — large dot = ±12V, small dot = 3.3V after step-down</text>

</svg>
