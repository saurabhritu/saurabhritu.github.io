<svg width="100%" viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
  </defs>
  <rect class="bg" width="700" height="420"/>
  <rect class="noiseLayer" width="700" height="420" filter="url(#paperNoise)"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">Node A (0x100) and Node B (0x050) transmit simultaneously</text>

  <!-- Bit position headers -->
  <text x="86" y="46" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Bit</text>
  <text x="156" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">10</text>
  <text x="206" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">9</text>
  <text x="256" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">8</text>
  <text x="306" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">7</text>
  <text x="356" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">6</text>
  <text x="406" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">5</text>
  <text x="456" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">4</text>
  <text x="506" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">3</text>
  <text x="556" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">2</text>
  <text x="606" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">1</text>
  <text x="656" y="46" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">0</text>

  <!-- Grid lines -->
  <line x1="130" y1="52" x2="130" y2="230" class="ink hair" opacity="0.15"/>
  <line x1="680" y1="52" x2="680" y2="230" class="ink hair" opacity="0.15"/>

  <!-- ══ ROW LABELS ══ -->
  <text x="86" y="82" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">Node A</text>
  <text x="86" y="96" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">0x100</text>

  <text x="86" y="136" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">Node B</text>
  <text x="86" y="150" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">0x050</text>

  <text x="86" y="192" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">Bus</text>
  <text x="86" y="206" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">dominant</text>
  <text x="86" y="218" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">wins</text>

  <!-- ══ NODE A: bit 10=1 (recessive, CONFLICT) ══ -->
  <rect x="131" y="62" width="48" height="28" rx="3" class="fill-blue ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.04;0.08;0.10;1" values="0.3;1;1;1;0.3;0.3"/>
  </rect>
  <text x="155" y="80" text-anchor="middle" font-family="PT Mono" font-size="13" font-weight="600" class="dot">1</text>

  <!-- Node A bit 9=0, then dims (loses) -->
  <rect x="181" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.2"/>
  <text x="205" y="80" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot soft">0</text>
  <!-- remaining dim cells -->
  <rect x="231" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.12"/>
  <text x="255" y="80" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot" opacity="0.2">0</text>
  <rect x="281" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.12"/>
  <text x="305" y="80" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot" opacity="0.2">0</text>
  <rect x="331" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.12"/>
  <rect x="381" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.12"/>
  <rect x="431" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.12"/>
  <rect x="481" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.12"/>
  <rect x="531" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.12"/>
  <rect x="581" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.12"/>
  <rect x="631" y="62" width="48" height="28" rx="3" class="fill-gray ink hair" opacity="0.12"/>

  <!-- "STOPS" label -->
  <text x="406" y="78" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot" opacity="0">
    — stops —
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.10;0.12;0.85;0.88;1" values="0;0;0.7;0.7;0;0"/>
  </text>

  <!-- ══ NODE B: bit 10=0 (dominant, WINS) ══ -->
  <rect x="131" y="118" width="48" height="28" rx="3" class="fill-green ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.04;0.08;0.10;1" values="0.3;1;1;1;0.3;0.3"/>
  </rect>
  <text x="155" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" font-weight="600" class="dot">0</text>

  <!-- Node B continues (all bits animate) -->
  <rect x="181" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.09;0.13;0.22;0.26;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="205" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">1</text>

  <rect x="231" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.22;0.26;0.31;0.35;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="255" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">0</text>

  <rect x="281" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.31;0.35;0.40;0.44;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="305" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">1</text>

  <rect x="331" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.40;0.44;0.49;0.53;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="355" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">0</text>

  <rect x="381" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.49;0.53;0.58;0.62;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="405" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">0</text>

  <rect x="431" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.58;0.62;0.67;0.71;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="455" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">0</text>

  <rect x="481" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.67;0.71;0.76;0.80;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="505" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">0</text>

  <rect x="531" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.76;0.80;0.85;0.89;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="555" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">0</text>

  <rect x="581" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.85;0.89;0.94;0.98;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="605" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">0</text>

  <rect x="631" y="118" width="48" height="28" rx="3" class="fill-green ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.94;0.98;1" values="0.3;0.3;1"/>
  </rect>
  <text x="655" y="136" text-anchor="middle" font-family="PT Mono" font-size="13" class="dot">0</text>

  <!-- ══ BUS ROW — shows dominant (Node B wins) ══ -->
  <rect x="131" y="176" width="48" height="34" rx="3" class="fill-amber ink fine">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.04;0.08;0.12;1" values="0.3;1;1;1;0.3;0.3"/>
  </rect>
  <text x="155" y="198" text-anchor="middle" font-family="PT Mono" font-size="14" font-weight="600" class="dot">0</text>

  <!-- Bus mirrors Node B bits -->
  <rect x="181" y="176" width="48" height="34" rx="3" class="fill-amber ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.09;0.13;0.22;0.26;1" values="0.3;0.3;0.8;0.8;0.3;0.3"/>
  </rect>
  <text x="205" y="198" text-anchor="middle" font-family="PT Mono" font-size="14" class="dot">1</text>

  <rect x="231" y="176" width="48" height="34" rx="3" class="fill-amber ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.22;0.26;0.31;0.35;1" values="0.3;0.3;0.8;0.8;0.3;0.3"/>
  </rect>
  <text x="255" y="198" text-anchor="middle" font-family="PT Mono" font-size="14" class="dot">0</text>

  <rect x="281" y="176" width="48" height="34" rx="3" class="fill-amber ink hair" opacity="0.3">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.31;0.35;0.40;0.44;1" values="0.3;0.3;0.8;0.8;0.3;0.3"/>
  </rect>
  <text x="305" y="198" text-anchor="middle" font-family="PT Mono" font-size="14" class="dot">1</text>

  <!-- Conflict arrow -->
  <line x1="155" y1="230" x2="155" y2="214" class="ink hair" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.06;0.08;0.88;0.90;1" values="0;0;0.7;0.7;0;0"/>
  </line>
  <polygon points="149,214 161,214 155,208" fill="var(--ink)" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.06;0.08;0.88;0.90;1" values="0;0;0.6;0.6;0;0"/>
  </polygon>

  <!-- ══ ANNOTATION PANEL ══ -->
  <rect x="24" y="244" width="652" height="140" rx="6" class="fill-gray ink hair"/>

  <rect x="36" y="256" width="8" height="8" rx="1" class="fill-red ink hair"/>
  <text x="50" y="262" font-family="PT Mono" font-size="11" font-weight="500" class="dot">Bit 10 differs</text>
  <text x="152" y="262" font-family="PT Mono" font-size="11" class="dot soft">— A sends 1, B sends 0</text>

  <rect x="36" y="276" width="8" height="8" rx="1" class="fill-amber ink hair"/>
  <text x="50" y="282" font-family="PT Mono" font-size="11" font-weight="500" class="dot">Dominant wins</text>
  <text x="168" y="282" font-family="PT Mono" font-size="11" class="dot soft">— 0 always overrides 1 on bus</text>

  <rect x="36" y="296" width="8" height="8" rx="1" class="fill-blue ink hair"/>
  <text x="50" y="302" font-family="PT Mono" font-size="11" font-weight="500" class="dot">Node A detects loss</text>
  <text x="210" y="302" font-family="PT Mono" font-size="11" class="dot soft">— reads 0 instead of its 1, stops</text>

  <rect x="36" y="316" width="8" height="8" rx="1" class="fill-green ink hair"/>
  <text x="50" y="322" font-family="PT Mono" font-size="11" font-weight="500" class="dot">Node B wins</text>
  <text x="146" y="322" font-family="PT Mono" font-size="11" class="dot soft">— lower ID = higher priority</text>

  <line x1="36" y1="336" x2="664" y2="336" class="ink hair soft" stroke-dasharray="5 3"/>
  <text x="350" y="352" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">no data corrupted · no retransmission needed · Node A waits</text>
  <text x="350" y="370" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">CAN arbitration — collision-free, non-destructive, priority-based</text>

  <!-- Bottom note -->
  <text x="350" y="404" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">lower ID = more dominant = higher priority · always</text>
</svg>
