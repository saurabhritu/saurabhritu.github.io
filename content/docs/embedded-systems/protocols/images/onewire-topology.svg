<svg width="100%" viewBox="0 0 700 370" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
  </defs>
  <rect class="bg" width="700" height="370"/>
  <rect class="noiseLayer" width="700" height="370" filter="url(#paperNoise)"/>

  <!-- ══ VCC RAIL ══ -->
  <line x1="140" y1="20" x2="220" y2="20" class="ink hair soft"/>
  <text x="112" y="24" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">VCC</text>

  <!-- ══ MASTER BOX ══ -->
  <rect x="24" y="36" width="120" height="80" rx="8" class="fill-blue ink fine"/>
  <text x="84" y="58" text-anchor="middle" font-family="PT Mono" font-size="13" font-weight="600" class="dot">Master</text>
  <text x="84" y="76" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">MCU</text>
  <text x="130" y="98" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">GPIO</text>

  <!-- ══ PULL-UP ══ -->
  <line x1="180" y1="20" x2="180" y2="34" class="ink hair soft"/>
  <polyline points="180,34 174,40 186,48 174,56 186,64 180,70" fill="none" class="ink hair soft"/>
  <line x1="180" y1="70" x2="180" y2="86" class="ink hair soft"/>
  <text x="196" y="54" font-family="PT Mono" font-size="9" class="dot soft">4.7kΩ</text>
  <circle cx="180" cy="86" r="3" fill="var(--ink)" opacity="0.4"/>

  <!-- ══ DATA WIRE ══ -->
  <line x1="144" y1="86" x2="660" y2="86" class="ink fine"/>
  <text x="670" y="90" font-family="PT Mono" font-size="10" class="dot">DATA</text>
  <text x="670" y="104" font-family="PT Mono" font-size="9" class="dot soft">+ VCC</text>
  <text x="420" y="76" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">single data wire — power + data on same line</text>

  <!-- ══ SENSOR TAPS ══ -->
  <line x1="240" y1="86" x2="240" y2="140" class="ink hair soft"/>
  <circle cx="240" cy="86" r="3" fill="var(--ink)" opacity="0.3"/>
  <line x1="370" y1="86" x2="370" y2="140" class="ink hair soft"/>
  <circle cx="370" cy="86" r="3" fill="var(--ink)" opacity="0.3"/>
  <line x1="500" y1="86" x2="500" y2="140" class="ink hair soft"/>
  <circle cx="500" cy="86" r="3" fill="var(--ink)" opacity="0.3"/>
  <line x1="620" y1="86" x2="620" y2="140" class="ink hair soft"/>
  <circle cx="620" cy="86" r="3" fill="var(--ink)" opacity="0.3"/>

  <!-- ══ SENSOR BOXES ══ -->
  <rect x="202" y="140" width="76" height="80" rx="6" class="fill-green ink hair"/>
  <text x="240" y="160" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot">DS18B20</text>
  <text x="240" y="176" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">A3F2…</text>
  <rect x="210" y="190" width="60" height="18" rx="3" class="fill-amber ink hair">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.05;0.10;0.22;0.25;1" values="0.4;0.4;1;1;0.4;0.4"/>
  </rect>
  <text x="240" y="202" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot">24.3°C</text>

  <rect x="332" y="140" width="76" height="80" rx="6" class="fill-green ink hair"/>
  <text x="370" y="160" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot">DS18B20</text>
  <text x="370" y="176" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">9B1C…</text>
  <rect x="340" y="190" width="60" height="18" rx="3" class="fill-amber ink hair">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.30;0.35;0.47;0.50;1" values="0.4;0.4;1;1;0.4;0.4"/>
  </rect>
  <text x="370" y="202" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot">31.7°C</text>

  <rect x="462" y="140" width="76" height="80" rx="6" class="fill-green ink hair"/>
  <text x="500" y="160" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot">DS18B20</text>
  <text x="500" y="176" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">E72A…</text>
  <rect x="470" y="190" width="60" height="18" rx="3" class="fill-amber ink hair">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.55;0.60;0.72;0.75;1" values="0.4;0.4;1;1;0.4;0.4"/>
  </rect>
  <text x="500" y="202" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot">19.1°C</text>

  <rect x="582" y="140" width="76" height="80" rx="6" class="fill-green ink hair"/>
  <text x="620" y="160" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot">DS18B20</text>
  <text x="620" y="176" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">0048…</text>
  <rect x="590" y="190" width="60" height="18" rx="3" class="fill-amber ink hair">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.80;0.85;0.97;1" values="0.4;0.4;1;1"/>
  </rect>
  <text x="620" y="202" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot">28.9°C</text>

  <!-- Sensor glow rings when polled -->
  <rect x="202" y="140" width="76" height="80" rx="6" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.05;0.10;0.22;0.25;1" values="0;0;0.5;0.5;0;0"/>
  </rect>
  <rect x="332" y="140" width="76" height="80" rx="6" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.30;0.35;0.47;0.50;1" values="0;0;0.5;0.5;0;0"/>
  </rect>
  <rect x="462" y="140" width="76" height="80" rx="6" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.55;0.60;0.72;0.75;1" values="0;0;0.5;0.5;0;0"/>
  </rect>
  <rect x="582" y="140" width="76" height="80" rx="6" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.80;0.85;0.97;1" values="0;0;0.5;0.5"/>
  </rect>

  <!-- ══ ANIMATED QUERY/RESPONSE PACKETS ══ -->
  <!-- Sensor 1 query + response -->
  <circle cy="86" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="144;240;240" keyTimes="0;0.5;1" dur="1.1s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.1s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cy="86" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="240;144;144" keyTimes="0;0.5;1" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.06;0.88;1" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <!-- Sensor 2 -->
  <circle cy="86" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="144;370;370" keyTimes="0;0.5;1" dur="1.1s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.1s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cy="86" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="370;144;144" keyTimes="0;0.5;1" dur="1.1s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.06;0.88;1" dur="1.1s" begin="1.4s" repeatCount="indefinite"/>
  </circle>
  <!-- Sensor 3 -->
  <circle cy="86" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="144;500;500" keyTimes="0;0.5;1" dur="1.1s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.1s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cy="86" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="500;144;144" keyTimes="0;0.5;1" dur="1.1s" begin="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.06;0.88;1" dur="1.1s" begin="2.4s" repeatCount="indefinite"/>
  </circle>
  <!-- Sensor 4 -->
  <circle cy="86" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="144;620;620" keyTimes="0;0.5;1" dur="1.1s" begin="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.1s" begin="3s" repeatCount="indefinite"/>
  </circle>
  <circle cy="86" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="620;144;144" keyTimes="0;0.5;1" dur="1.1s" begin="3.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.06;0.88;1" dur="1.1s" begin="3.4s" repeatCount="indefinite"/>
  </circle>

  <!-- ══ BOTTOM PANEL ══ -->
  <rect x="24" y="240" width="652" height="50" rx="6" class="fill-gray ink hair"/>
  <text x="350" y="258" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">all 4 sensors share the same single wire — power + data combined</text>
  <text x="350" y="276" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Master queries each by 64-bit ROM ID — no address conflicts possible</text>

  <!-- legend -->
  <text x="350" y="310" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">bold pulse = master query · faint pulse = sensor response</text>
  <text x="350" y="328" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">1-Wire protocol · half-duplex · 1 data wire + GND</text>
</svg>
