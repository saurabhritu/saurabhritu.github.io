<svg width="100%" viewBox="0 0 700 370" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/></marker>
  </defs>
  <rect class="bg" width="700" height="370"/>
  <rect class="noiseLayer" width="700" height="370" filter="url(#paperNoise)"/>

  <!-- ══ VCC RAIL ══ -->
  <line x1="80" y1="20" x2="620" y2="20" class="ink hair soft"/>
  <text x="46" y="24" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">VCC</text>

  <!-- ══ PULL-UP RESISTORS ══ -->
  <!-- Left pull-up (SDA) -->
  <line x1="160" y1="20" x2="160" y2="36" class="ink hair soft"/>
  <polyline points="160,36 154,42 166,50 154,58 166,66 160,72" fill="none" class="ink hair soft"/>
  <line x1="160" y1="72" x2="160" y2="86" class="ink hair soft"/>
  <text x="176" y="55" font-family="PT Mono" font-size="9" class="dot soft">R↑</text>

  <!-- Right pull-up (SCL) -->
  <line x1="280" y1="20" x2="280" y2="36" class="ink hair soft"/>
  <polyline points="280,36 274,42 286,50 274,58 286,66 280,72" fill="none" class="ink hair soft"/>
  <line x1="280" y1="72" x2="280" y2="100" class="ink hair soft"/>
  <text x="296" y="55" font-family="PT Mono" font-size="9" class="dot soft">R↑</text>

  <text x="350" y="48" font-family="PT Mono" font-size="9" class="dot soft">← pull-ups hold lines HIGH when idle</text>

  <!-- ══ BUS LINES ══ -->
  <!-- SDA bus -->
  <line x1="80" y1="86" x2="620" y2="86" class="ink fine"/>
  <text x="636" y="90" font-family="PT Mono" font-size="10" font-weight="500" class="dot">SDA</text>
  <text x="660" y="88" font-family="PT Mono" font-size="9" class="dot soft">(data)</text>

  <!-- SCL bus -->
  <line x1="80" y1="100" x2="620" y2="100" class="ink fine"/>
  <text x="636" y="104" font-family="PT Mono" font-size="10" font-weight="500" class="dot">SCL</text>
  <text x="660" y="104" font-family="PT Mono" font-size="9" class="dot soft">(clock)</text>

  <!-- ══ DEVICE TAPS ══ -->
  <!-- Master taps -->
  <line x1="120" y1="86" x2="120" y2="150" class="ink hair soft"/>
  <line x1="134" y1="100" x2="134" y2="150" class="ink hair soft"/>
  <circle cx="120" cy="86" r="3" fill="var(--ink)" opacity="0.4"/>
  <circle cx="134" cy="100" r="3" fill="var(--ink)" opacity="0.4"/>

  <!-- Slave 0x48 taps -->
  <line x1="350" y1="86" x2="350" y2="150" class="ink hair soft"/>
  <line x1="364" y1="100" x2="364" y2="150" class="ink hair soft"/>
  <circle cx="350" cy="86" r="3" fill="var(--ink)" opacity="0.4"/>
  <circle cx="364" cy="100" r="3" fill="var(--ink)" opacity="0.4"/>

  <!-- Slave 0x3C taps -->
  <line x1="520" y1="86" x2="520" y2="150" class="ink hair soft"/>
  <line x1="534" y1="100" x2="534" y2="150" class="ink hair soft"/>
  <circle cx="520" cy="86" r="3" fill="var(--ink)" opacity="0.4"/>
  <circle cx="534" cy="100" r="3" fill="var(--ink)" opacity="0.4"/>

  <!-- ══ DEVICE BOXES ══ -->
  <!-- Master -->
  <rect x="60" y="150" width="130" height="90" rx="8" class="fill-blue ink fine"/>
  <text x="125" y="176" text-anchor="middle" font-family="PT Mono" font-size="13" font-weight="600" class="dot">Master</text>
  <text x="125" y="196" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">(MCU)</text>
  <text x="125" y="220" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">initiates all txns</text>

  <!-- Slave 0x48 (target) -->
  <rect x="300" y="150" width="140" height="90" rx="8" class="fill-green ink fine"/>
  <text x="370" y="176" text-anchor="middle" font-family="PT Mono" font-size="13" font-weight="600" class="dot">Slave</text>
  <text x="370" y="196" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Addr = 0x48</text>
  <text x="370" y="216" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">temp sensor</text>
  <!-- glow when addressed -->
  <rect x="300" y="150" width="140" height="90" rx="8" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.38;0.42;0.70;0.74;1" values="0;0;0.6;0.6;0;0"/>
  </rect>

  <!-- Slave 0x3C -->
  <rect x="480" y="150" width="140" height="90" rx="8" class="fill-purple ink fine"/>
  <text x="550" y="176" text-anchor="middle" font-family="PT Mono" font-size="13" font-weight="600" class="dot">Slave</text>
  <text x="550" y="196" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Addr = 0x3C</text>
  <text x="550" y="216" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">OLED display</text>

  <!-- "up to 127 devices" -->
  <text x="640" y="190" font-family="PT Mono" font-size="10" class="dot soft">…up to</text>
  <text x="640" y="202" font-family="PT Mono" font-size="10" class="dot soft">127 devs</text>
  <text x="640" y="214" font-family="PT Mono" font-size="10" class="dot soft">on same</text>
  <text x="640" y="226" font-family="PT Mono" font-size="10" class="dot soft">2 wires</text>

  <!-- ══ ANIMATED DATA FLOW ══ -->

  <!-- SCL clock ticks continuously -->
  <circle cy="100" r="5" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="80;620" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.06;0.88;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cy="100" r="5" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="80;620" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.06;0.88;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cy="100" r="5" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="80;620" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.06;0.88;1" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- SDA continuous flow dots (bidirectional — data travels both ways) -->
  <!-- Forward: Master → Slaves -->
  <circle cy="86" r="5" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="120;620" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.06;0.88;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cy="86" r="5" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="120;620" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.06;0.88;1" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Return: Slave → Master (ACK direction) -->
  <circle cy="86" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="520;120" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.35;0.35;0" keyTimes="0;0.06;0.88;1" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Phase 1: Master sends address 0x48 packet → travels along SDA to all slaves -->
  <rect rx="4" y="76" width="40" height="20" class="fill-amber ink hair" opacity="0">
    <animate attributeName="x" values="120;350;350" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.36;0.40" dur="5s" repeatCount="indefinite"/>
  </rect>
  <text y="90" text-anchor="middle" font-family="PT Mono" font-size="9" font-weight="600" class="dot" opacity="0">
    0x48
    <animate attributeName="x" values="140;370;370" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.36;0.40" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Phase 2: Slave 0x48 sends ACK back → green packet travels back on SDA -->
  <rect rx="4" y="76" width="36" height="20" class="fill-green ink hair" opacity="0">
    <animate attributeName="x" values="350;120;120" keyTimes="0;0.5;1" dur="5s" begin="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.36;0.40" dur="5s" begin="2.2s" repeatCount="indefinite"/>
  </rect>
  <text y="90" text-anchor="middle" font-family="PT Mono" font-size="9" font-weight="600" class="dot" opacity="0">
    ACK
    <animate attributeName="x" values="368;138;138" keyTimes="0;0.5;1" dur="5s" begin="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.36;0.40" dur="5s" begin="2.2s" repeatCount="indefinite"/>
  </text>

  <!-- ══ BOTTOM NOTE ══ -->
  <rect x="40" y="260" width="620" height="44" rx="6" class="fill-gray ink hair"/>
  <text x="350" y="278" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">half-duplex — only ONE direction at a time (walkie-talkie)</text>
  <text x="350" y="296" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Master broadcasts 7-bit address → only the matching slave responds with ACK</text>

  <!-- legend -->
  <text x="350" y="328" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">open-drain lines · devices can only PULL LOW · pull-ups float back to HIGH</text>
  <text x="350" y="348" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">SDA = data · SCL = clock · 2 wires for up to 127 devices</text>
</svg>
