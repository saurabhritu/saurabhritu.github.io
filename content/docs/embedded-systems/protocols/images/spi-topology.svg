<svg width="100%" viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root { --bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5; }
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633;}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/></marker>
  </defs>
  <rect class="bg" width="700" height="440"/>
  <rect class="noiseLayer" width="700" height="440" filter="url(#paperNoise)"/>

  <!-- ══ MASTER ══ -->
  <rect x="260" y="18" width="180" height="56" rx="8" class="fill-blue ink fine"/>
  <text x="350" y="38" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="13" font-weight="600" class="dot">Master (MCU)</text>
  <text x="350" y="58" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">controller</text>

  <!-- pin labels -->
  <text x="290" y="86" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">SCLK</text>
  <text x="350" y="86" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">MOSI</text>
  <text x="410" y="86" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">MISO</text>

  <!-- ══ SHARED BUS RAILS ══ -->
  <line x1="40" y1="128" x2="660" y2="128" class="ink hair" stroke-dasharray="5 3"/>
  <line x1="40" y1="142" x2="660" y2="142" class="ink hair" stroke-dasharray="5 3"/>
  <line x1="40" y1="156" x2="660" y2="156" class="ink hair" stroke-dasharray="5 3"/>

  <text x="668" y="130" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">SCLK</text>
  <text x="668" y="144" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">MOSI</text>
  <text x="668" y="158" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">MISO</text>
  <text x="30" y="142" text-anchor="end" font-family="PT Mono" font-size="9" class="dot soft">shared</text>

  <!-- Master → bus drops -->
  <line x1="290" y1="74" x2="290" y2="128" class="ink hair soft"/>
  <line x1="350" y1="74" x2="350" y2="142" class="ink hair soft"/>
  <line x1="410" y1="74" x2="410" y2="156" class="ink hair soft"/>

  <!-- ══ SLAVES ══ -->
  <!-- Slave 1 -->
  <rect x="60" y="204" width="130" height="86" rx="8" class="fill-gray ink fine"/>
  <text x="125" y="228" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" font-weight="500" class="dot">Slave 1</text>
  <text x="125" y="246" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">peripheral</text>
  <text x="78" y="270" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">CS — active LOW</text>

  <!-- Slave 2 (active target) -->
  <rect x="280" y="204" width="140" height="86" rx="8" class="fill-amber ink fine"/>
  <text x="350" y="228" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" font-weight="600" class="dot">Slave 2</text>
  <text x="350" y="246" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">active target</text>
  <text x="298" y="270" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">CS — active LOW</text>
  <!-- glow ring on Slave 2 when selected -->
  <rect x="280" y="204" width="140" height="86" rx="8" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.08;0.12;0.70;0.74;1" values="0;0;0.6;0.6;0;0"/>
  </rect>

  <!-- Slave 3 -->
  <rect x="510" y="204" width="130" height="86" rx="8" class="fill-gray ink fine"/>
  <text x="575" y="228" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="12" font-weight="500" class="dot">Slave 3</text>
  <text x="575" y="246" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">peripheral</text>
  <text x="528" y="270" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">CS — active LOW</text>

  <!-- Bus → Slave drops -->
  <line x1="125" y1="128" x2="125" y2="204" class="ink hair soft"/>
  <line x1="125" y1="142" x2="125" y2="204" class="ink hair soft"/>
  <line x1="125" y1="156" x2="125" y2="204" class="ink hair soft"/>

  <line x1="350" y1="142" x2="350" y2="204" class="ink hair soft"/>
  <line x1="350" y1="156" x2="350" y2="204" class="ink hair soft"/>

  <line x1="575" y1="128" x2="575" y2="204" class="ink hair soft"/>
  <line x1="575" y1="142" x2="575" y2="204" class="ink hair soft"/>
  <line x1="575" y1="156" x2="575" y2="204" class="ink hair soft"/>

  <!-- ══ CS LINES — Master to each slave ══ -->
  <!-- CS1 -->
  <polyline points="270,74 270,186 100,186 100,204" fill="none" class="ink hair soft"/>
  <text x="184" y="182" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">CS1</text>
  <!-- CS2 (active) -->
  <polyline points="310,74 310,194 310,204" fill="none" class="ink hair"/>
  <text x="324" y="194" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot">CS2 ↓</text>
  <!-- CS3 -->
  <polyline points="330,74 330,186 540,186 540,204" fill="none" class="ink hair soft"/>
  <text x="436" y="182" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="9" class="dot soft">CS3</text>

  <!-- ══ ANIMATED TRANSACTION: Master → Slave 2 ══ -->

  <!-- Phase 1: CS2 asserts LOW (dot travels down CS2 line) -->
  <circle r="4" class="ink" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="310;310" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="74;204" dur="5s" keyTimes="0;0.10" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.02;0.09;0.11" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Phase 2: MOSI packet (cmd) travels Master→Slave2 on bus y=142 -->
  <rect rx="4" y="134" width="30" height="16" class="fill-green ink hair" opacity="0">
    <animate attributeName="x" values="350;350;350" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.14;0.16;0.36;0.38;1" values="0;0;0.9;0.9;0;0"/>
  </rect>
  <text y="146" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="8" font-weight="600" class="dot" opacity="0">
    cmd
    <animate attributeName="x" values="365;365;365" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.14;0.16;0.36;0.38;1" values="0;0;0.9;0.9;0;0"/>
  </text>

  <!-- MOSI dot travelling Master → Slave2 -->
  <circle cy="142" r="4" class="ink" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="290;350" keyTimes="0;1" dur="1s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.1;0.8;1" dur="1s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- MISO dot travelling Slave2 → Master -->
  <circle cy="156" r="4" class="ink" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="350;410" keyTimes="0;1" dur="1s" begin="1.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.1;0.8;1" dur="1s" begin="1.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Phase 2: MISO response packet travels Slave2→Master on bus y=156 -->
  <rect rx="4" y="148" width="30" height="16" class="fill-purple ink hair" opacity="0">
    <animate attributeName="x" values="350;350;350" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.38;0.40;0.60;0.62;1" values="0;0;0.9;0.9;0;0"/>
  </rect>
  <text y="160" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="8" font-weight="600" class="dot" opacity="0">
    data
    <animate attributeName="x" values="365;365;365" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.38;0.40;0.60;0.62;1" values="0;0;0.9;0.9;0;0"/>
  </text>

  <!-- SCLK ticks (small dots moving along bus) -->
  <circle cy="128" r="3" class="ink" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="290;660" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.08;0.88;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cy="128" r="3" class="ink" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="290;660" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.08;0.88;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cy="128" r="3" class="ink" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="290;660" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.08;0.88;1" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ══ LEGEND ══ -->
  <line x1="40" y1="314" x2="660" y2="314" class="ink hair soft" stroke-dasharray="5 3"/>

  <line x1="50" y1="340" x2="80" y2="340" class="ink hair"/>
  <text x="88" y="342" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">SCLK — clock (Master drives)</text>

  <line x1="50" y1="360" x2="80" y2="360" class="ink hair"/>
  <text x="88" y="362" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">MOSI — Master Out Slave In</text>

  <line x1="350" y1="340" x2="380" y2="340" class="ink hair"/>
  <text x="388" y="342" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">MISO — Master In Slave Out</text>

  <line x1="350" y1="360" x2="380" y2="360" class="ink hair" stroke-dasharray="4 2"/>
  <text x="388" y="362" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">CS — Chip Select (1 per slave)</text>

  <!-- bottom note -->
  <text x="350" y="394" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">CS = unique per slave — "tap on the shoulder"</text>
  <text x="350" y="412" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">only Slave 2 is active · others stay dormant</text>
</svg>
