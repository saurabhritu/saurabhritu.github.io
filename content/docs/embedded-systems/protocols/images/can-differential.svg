<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="100%" height="100%"
     style="background-color:#0b0c10; font-family:'Courier New', Courier, monospace;">

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════
       ROW LABELS
       ══════════════════════════════════════ -->
  <text x="78" y="65"  font-size="14" font-weight="bold" fill="#fab387" text-anchor="middle">CAN-H</text>
  <text x="78" y="165" font-size="14" font-weight="bold" fill="#f9e2af" text-anchor="middle">CAN-L</text>
  <text x="78" y="265" font-size="14" font-weight="bold" fill="#94e2d5" text-anchor="middle">Result</text>
  <text x="78" y="281" font-size="11" fill="#45475a" text-anchor="middle">H − L</text>

  <!-- voltage guides -->
  <line x1="120" y1="50"  x2="820" y2="50"  stroke="#2a1a0e" stroke-width="1" stroke-dasharray="2 5"/>
  <line x1="120" y1="82"  x2="820" y2="82"  stroke="#2a1a0e" stroke-width="1" stroke-dasharray="2 5"/>
  <line x1="120" y1="150" x2="820" y2="150" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="2 5"/>
  <line x1="120" y1="182" x2="820" y2="182" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="2 5"/>
  <line x1="120" y1="250" x2="820" y2="250" stroke="#0e2a2a" stroke-width="1" stroke-dasharray="2 5"/>
  <line x1="120" y1="282" x2="820" y2="282" stroke="#0e2a2a" stroke-width="1" stroke-dasharray="2 5"/>

  <text x="116" y="53"  font-size="10" fill="#4a2a0e" text-anchor="end">3.5V</text>
  <text x="116" y="85"  font-size="10" fill="#4a2a0e" text-anchor="end">2.5V</text>
  <text x="116" y="153" font-size="10" fill="#4a3a0e" text-anchor="end">2.5V</text>
  <text x="116" y="185" font-size="10" fill="#4a3a0e" text-anchor="end">1.5V</text>
  <text x="116" y="253" font-size="10" fill="#0e4a4a" text-anchor="end">+2V</text>
  <text x="116" y="285" font-size="10" fill="#0e4a4a" text-anchor="end"> 0V</text>

  <!-- ══════════════════════════════════════
       STATIC DIM BASE WAVEFORMS
       Bit pattern 1 0 1 0 1 0 (6 bits, w=110 each)
       x: 130,240,350,460,570,680,790
       CAN-H: 1=y50, 0=y82
       CAN-L: 1=y182,0=y150  (inverted)
       Result: 1=y250,0=y282
       ══════════════════════════════════════ -->

  <polyline points="130,50 240,50 240,82 350,82 350,50 460,50 460,82 570,82 570,50 680,50 680,82 790,82"
    fill="none" stroke="#fab387" stroke-width="2" opacity="0.18"/>

  <polyline points="130,182 240,182 240,150 350,150 350,182 460,182 460,150 570,150 570,182 680,182 680,150 790,150"
    fill="none" stroke="#f9e2af" stroke-width="2" opacity="0.18"/>

  <polyline points="130,250 240,250 240,282 350,282 350,250 460,250 460,282 570,282 570,250 680,250 680,282 790,282"
    fill="none" stroke="#94e2d5" stroke-width="2" opacity="0.18"/>

  <!-- ══════════════════════════════════════
       ANIMATED BRIGHT SEGMENTS
       6 bits × 3 rows, each bit = 1/6 of 3s = 0.5s = 16.67%
       keyTimes per bit: start, +0.03 ramp, end-0.03 dim, end
       Bit windows:
         b1: 0.00–0.167   b2: 0.167–0.333
         b3: 0.333–0.500  b4: 0.500–0.667
         b5: 0.667–0.833  b6: 0.833–1.000
       ══════════════════════════════════════ -->

  <!-- ── CAN-H animated ── -->
  <!-- b1: HIGH y=50, x=130→240 -->
  <line x1="130" y1="50" x2="240" y2="50" stroke="#fab387" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.03;0.14;0.20;1" values="0.18;1;1;1;0.18;0.18"/>
  </line>
  <!-- b1→b2 transition drop x=240 -->
  <line x1="240" y1="50" x2="240" y2="82" stroke="#fab387" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.14;0.167;0.20;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <!-- b2: LOW y=82, x=240→350 -->
  <line x1="240" y1="82" x2="350" y2="82" stroke="#fab387" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.20;0.31;0.37;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="350" y1="82" x2="350" y2="50" stroke="#fab387" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.31;0.333;0.37;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <!-- b3: HIGH y=50, x=350→460 -->
  <line x1="350" y1="50" x2="460" y2="50" stroke="#fab387" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.333;0.37;0.47;0.53;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="460" y1="50" x2="460" y2="82" stroke="#fab387" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.47;0.500;0.54;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <!-- b4: LOW y=82, x=460→570 -->
  <line x1="460" y1="82" x2="570" y2="82" stroke="#fab387" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.500;0.54;0.63;0.70;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="570" y1="82" x2="570" y2="50" stroke="#fab387" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.63;0.667;0.70;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <!-- b5: HIGH y=50, x=570→680 -->
  <line x1="570" y1="50" x2="680" y2="50" stroke="#fab387" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.667;0.70;0.80;0.87;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="680" y1="50" x2="680" y2="82" stroke="#fab387" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.80;0.833;0.87;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <!-- b6: LOW y=82, x=680→790 -->
  <line x1="680" y1="82" x2="790" y2="82" stroke="#fab387" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.833;0.87;0.99;1" values="0.18;0.18;1;1"/>
  </line>

  <!-- ── CAN-L animated (inverted) ── -->
  <line x1="130" y1="182" x2="240" y2="182" stroke="#f9e2af" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.03;0.14;0.20;1" values="0.18;1;1;1;0.18;0.18"/>
  </line>
  <line x1="240" y1="182" x2="240" y2="150" stroke="#f9e2af" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.14;0.167;0.20;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="240" y1="150" x2="350" y2="150" stroke="#f9e2af" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.20;0.31;0.37;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="350" y1="150" x2="350" y2="182" stroke="#f9e2af" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.31;0.333;0.37;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="350" y1="182" x2="460" y2="182" stroke="#f9e2af" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.333;0.37;0.47;0.53;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="460" y1="182" x2="460" y2="150" stroke="#f9e2af" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.47;0.500;0.54;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="460" y1="150" x2="570" y2="150" stroke="#f9e2af" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.500;0.54;0.63;0.70;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="570" y1="150" x2="570" y2="182" stroke="#f9e2af" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.63;0.667;0.70;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="570" y1="182" x2="680" y2="182" stroke="#f9e2af" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.667;0.70;0.80;0.87;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="680" y1="182" x2="680" y2="150" stroke="#f9e2af" stroke-width="3" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.80;0.833;0.87;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="680" y1="150" x2="790" y2="150" stroke="#f9e2af" stroke-width="3" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.833;0.87;0.99;1" values="0.18;0.18;1;1"/>
  </line>

  <!-- ── Result animated (same pattern as CAN-H) ── -->
  <line x1="130" y1="250" x2="240" y2="250" stroke="#94e2d5" stroke-width="4" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.03;0.14;0.20;1" values="0.18;1;1;1;0.18;0.18"/>
  </line>
  <line x1="240" y1="250" x2="240" y2="282" stroke="#94e2d5" stroke-width="4" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.14;0.167;0.20;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="240" y1="282" x2="350" y2="282" stroke="#94e2d5" stroke-width="4" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.20;0.31;0.37;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="350" y1="282" x2="350" y2="250" stroke="#94e2d5" stroke-width="4" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.31;0.333;0.37;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="350" y1="250" x2="460" y2="250" stroke="#94e2d5" stroke-width="4" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.333;0.37;0.47;0.53;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="460" y1="250" x2="460" y2="282" stroke="#94e2d5" stroke-width="4" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.47;0.500;0.54;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="460" y1="282" x2="570" y2="282" stroke="#94e2d5" stroke-width="4" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.500;0.54;0.63;0.70;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="570" y1="282" x2="570" y2="250" stroke="#94e2d5" stroke-width="4" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.63;0.667;0.70;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="570" y1="250" x2="680" y2="250" stroke="#94e2d5" stroke-width="4" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.667;0.70;0.80;0.87;1" values="0.18;0.18;1;1;0.18;0.18"/>
  </line>
  <line x1="680" y1="250" x2="680" y2="282" stroke="#94e2d5" stroke-width="4" filter="url(#glow)" opacity="0.18">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.80;0.833;0.87;1" values="0.18;0.18;1;0.18;0.18"/>
  </line>
  <line x1="680" y1="282" x2="790" y2="282" stroke="#94e2d5" stroke-width="4" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.833;0.87;0.99;1" values="0.18;0.18;1;1"/>
  </line>

  <!-- ══════════════════════════════════════
       NOISE SPIKE — appears on b4 window (x≈510)
       Hits CAN-H and CAN-L identically
       Result stays clean (no spike)
       ══════════════════════════════════════ -->

  <!-- Spike on CAN-H (upward from y=82 since b4 is LOW) -->
  <polyline points="505,82 505,50 525,50 525,82"
    fill="none" stroke="#f38ba8" stroke-width="2.5" opacity="0" filter="url(#glow-lg)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.55;0.57;0.62;0.64;1" values="0;0;1;1;0;0"/>
  </polyline>

  <!-- Spike on CAN-L (upward from y=150 since b4 L is HIGH) -->
  <polyline points="505,150 505,118 525,118 525,150"
    fill="none" stroke="#f38ba8" stroke-width="2.5" opacity="0" filter="url(#glow-lg)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.55;0.57;0.62;0.64;1" values="0;0;1;1;0;0"/>
  </polyline>

  <!-- Noise labels -->
  <text x="515" y="38" text-anchor="middle" font-size="12" fill="#f38ba8" opacity="0">
    noise
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.55;0.57;0.62;0.64;1" values="0;0;1;1;0;0"/>
  </text>
  <text x="515" y="106" text-anchor="middle" font-size="12" fill="#f38ba8" opacity="0">
    same noise
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.55;0.57;0.62;0.64;1" values="0;0;1;1;0;0"/>
  </text>

  <!-- "cancelled" on result row -->
  <text x="515" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#a6e3a1" opacity="0" filter="url(#glow)">
    ✓ cancelled
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.57;0.59;0.65;0.67;1" values="0;0;1;1;0;0"/>
  </text>

  <!-- divider -->
  <line x1="120" y1="212" x2="820" y2="212" stroke="#313244" stroke-width="1" stroke-dasharray="4 6"/>
  <text x="760" y="210" font-size="11" fill="#313244">H − L =</text>

  <!-- ══════════════════════════════════════
       BOTTOM PANEL
       ══════════════════════════════════════ -->
  <rect x="120" y="308" width="700" height="88" rx="8"
        fill="#0d0d18" stroke="#313244" stroke-width="1"/>

  <text x="470" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#94e2d5">
    Receiver reads:  CAN_High − CAN_Low = clean signal
  </text>
  <line x1="140" y1="338" x2="800" y2="338" stroke="#313244" stroke-width="1"/>
  <text x="470" y="357" text-anchor="middle" font-size="13" fill="#a6adc8">
    Noise spike hits BOTH wires equally  →  subtraction cancels it out
  </text>
  <text x="470" y="376" text-anchor="middle" font-size="13" fill="#a6adc8">
    →  data intact regardless of electrical interference
  </text>
  <text x="470" y="392" text-anchor="middle" font-size="12" fill="#585b70">
    This is why CAN works reliably in noisy cars, factories and machines
  </text>

</svg>
