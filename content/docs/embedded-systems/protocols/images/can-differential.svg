  <text x="66" y="150" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">CAN-L</text>
  <text x="66" y="235" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">Result</text>
  <text x="66" y="250" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">H − L</text>

