<svg width="100%" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/></marker>
    <marker id="arrow-rev" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M8 1L2 5L8 9" class="ink hair soft" fill="none"/></marker>
  </defs>
  <rect class="bg" width="680" height="370"/>
  <rect class="noiseLayer" width="680" height="370" filter="url(#paperNoise)"/>

  <!-- ══ MASTER BOX ══ -->
  <rect x="30" y="40" width="120" height="210" rx="8" class="fill-blue ink fine"/>
  <text x="90" y="72" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="13" font-weight="600" class="dot">Master</text>
  <text x="90" y="90" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">MCU</text>
  <text x="136" y="130" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">SCLK</text>
  <text x="136" y="168" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">MOSI</text>
  <text x="136" y="206" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">MISO</text>
  <text x="136" y="232" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">CS</text>

  <!-- ══ SLAVE BOX ══ -->
  <rect x="530" y="40" width="120" height="210" rx="8" class="fill-green ink fine"/>
  <text x="590" y="72" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="13" font-weight="600" class="dot">Slave</text>
  <text x="590" y="90" text-anchor="middle" dominant-baseline="central" font-family="PT Mono" font-size="10" class="dot soft">peripheral</text>
  <text x="544" y="130" font-family="PT Mono" font-size="10" class="dot soft">SCLK</text>
  <text x="544" y="168" font-family="PT Mono" font-size="10" class="dot soft">MOSI</text>
  <text x="544" y="206" font-family="PT Mono" font-size="10" class="dot soft">MISO</text>
  <text x="544" y="232" font-family="PT Mono" font-size="10" class="dot soft">CS</text>

  <!-- ══ WIRE LINES ══ -->
  <!-- SCLK: Master → Slave -->
  <line x1="150" y1="128" x2="528" y2="128" class="ink hair" marker-end="url(#arrow)"/>
  <text x="340" y="118" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">clock ticks on every bit</text>

  <!-- MOSI: Master → Slave -->
  <line x1="150" y1="166" x2="528" y2="166" class="ink hair" marker-end="url(#arrow)"/>
  <text x="340" y="156" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Master → Slave ("instructions")</text>

  <!-- MISO: Slave → Master -->
  <line x1="530" y1="204" x2="152" y2="204" class="ink hair" marker-end="url(#arrow-rev)"/>
  <text x="340" y="194" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Slave → Master ("response")</text>

  <!-- CS: Master → Slave (dashed) -->
  <line x1="150" y1="230" x2="528" y2="230" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- ══ FULL DUPLEX CALLOUT ══ -->
  <rect x="200" y="214" width="280" height="32" rx="5" fill="none" class="ink hair" stroke-dasharray="5 3"/>
  <text x="340" y="224" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">↑ both directions simultaneously</text>
  <text x="340" y="240" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">= FULL DUPLEX — like a two-way road</text>

  <!-- ══ ANIMATED PACKETS — synchronized full-duplex ══ -->

  <!-- SCLK pulses (3 fast dots) -->
  <circle cy="128" r="3" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="150;528" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.08;0.88;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cy="128" r="3" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="150;528" dur="1s" begin="0.33s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.08;0.88;1" dur="1s" begin="0.33s" repeatCount="indefinite"/>
  </circle>
  <circle cy="128" r="3" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="150;528" dur="1s" begin="0.66s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.08;0.88;1" dur="1s" begin="0.66s" repeatCount="indefinite"/>
  </circle>

  <!-- MOSI data packet Master→Slave (two dots staggered) -->
  <circle cy="166" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="150;528" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cy="166" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="150;528" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>

  <!-- MISO data packet Slave→Master (simultaneous) -->
  <circle cy="204" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="530;152" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cy="204" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="530;152" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>

  <!-- ══ CS PANEL ══ -->
  <rect x="30" y="270" width="620" height="50" rx="6" class="fill-gray ink hair"/>
  <text x="90" y="290" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">CS LOW</text>
  <text x="190" y="290" font-family="PT Mono" font-size="11" class="dot soft">= "I'm talking to YOU"</text>
  <text x="90" y="308" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">CS HIGH</text>
  <text x="190" y="308" font-family="PT Mono" font-size="11" class="dot soft">= "You're dismissed"</text>

  <!-- CS state indicator (toggles LOW/HIGH) -->
  <rect x="440" y="278" width="190" height="18" rx="4" class="fill-green ink hair">
    <animate attributeName="opacity" values="0.9;0.9;0.3;0.3;0.9" keyTimes="0;0.4;0.41;0.8;0.81" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="535" y="290" text-anchor="middle" font-family="PT Mono" font-size="9" font-weight="500" class="dot">
    CS: LOW → active
    <animate attributeName="opacity" values="1;1;0.3;0.3;1" keyTimes="0;0.4;0.41;0.8;0.81" dur="3s" repeatCount="indefinite"/>
  </text>

  <rect x="440" y="298" width="190" height="18" rx="4" class="fill-gray ink hair">
    <animate attributeName="opacity" values="0.3;0.3;0.9;0.9;0.3" keyTimes="0;0.4;0.41;0.8;0.81" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="535" y="310" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">
    CS: HIGH → idle
    <animate attributeName="opacity" values="0.3;0.3;0.8;0.8;0.3" keyTimes="0;0.4;0.41;0.8;0.81" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- bottom summary -->
  <text x="340" y="346" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">MOSI + MISO carry data simultaneously — full duplex on every clock edge</text>
</svg>
