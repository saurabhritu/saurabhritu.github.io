<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="100%" height="100%"
     style="background-color:#0b0c10; font-family:'Courier New', Courier, monospace;">

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════
       NODE BOXES  y=30 h=90
       x positions: 80, 260, 440, 620
       each w=140
       ══════════════════════════════════════ -->

  <!-- Node 1 — Engine -->
  <rect x="80" y="30" width="140" height="90" rx="8"
        fill="#1a1a2e" stroke="#fab387" stroke-width="1.5"/>
  <text x="150" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#fab387">Node 1</text>
  <text x="150" y="76" text-anchor="middle" font-size="13" fill="#a6adc8">Engine</text>
  <text x="150" y="96" text-anchor="middle" font-size="11" fill="#45475a">CAN ctrl</text>
  <!-- node blink when transmitting -->
  <rect x="80" y="30" width="140" height="90" rx="8"
        fill="none" stroke="#fab387" stroke-width="3" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.05;0.10;0.20;0.25;1"
      values="0;0.9;0.9;0;0;0"/>
  </rect>

  <!-- Node 2 — Brakes -->
  <rect x="260" y="30" width="140" height="90" rx="8"
        fill="#1a1a2e" stroke="#fab387" stroke-width="1.5"/>
  <text x="330" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#fab387">Node 2</text>
  <text x="330" y="76" text-anchor="middle" font-size="13" fill="#a6adc8">Brakes</text>
  <text x="330" y="96" text-anchor="middle" font-size="11" fill="#45475a">CAN ctrl</text>
  <rect x="260" y="30" width="140" height="90" rx="8"
        fill="none" stroke="#fab387" stroke-width="3" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.25;0.30;0.40;0.45;1"
      values="0;0;0.9;0.9;0;0"/>
  </rect>

  <!-- Node 3 — Airbag -->
  <rect x="440" y="30" width="140" height="90" rx="8"
        fill="#1a1a2e" stroke="#fab387" stroke-width="1.5"/>
  <text x="510" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#fab387">Node 3</text>
  <text x="510" y="76" text-anchor="middle" font-size="13" fill="#a6adc8">Airbag</text>
  <text x="510" y="96" text-anchor="middle" font-size="11" fill="#45475a">CAN ctrl</text>
  <rect x="440" y="30" width="140" height="90" rx="8"
        fill="none" stroke="#fab387" stroke-width="3" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.45;0.50;0.60;0.65;1"
      values="0;0;0.9;0.9;0;0"/>
  </rect>

  <!-- Node 4 — Dashboard -->
  <rect x="620" y="30" width="140" height="90" rx="8"
        fill="#1a1a2e" stroke="#fab387" stroke-width="1.5"/>
  <text x="690" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#fab387">Node 4</text>
  <text x="690" y="76" text-anchor="middle" font-size="13" fill="#a6adc8">Dashboard</text>
  <text x="690" y="96" text-anchor="middle" font-size="11" fill="#45475a">CAN ctrl</text>
  <rect x="620" y="30" width="140" height="90" rx="8"
        fill="none" stroke="#fab387" stroke-width="3" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.65;0.70;0.80;0.85;1"
      values="0;0;0.9;0.9;0;0"/>
  </rect>

  <!-- ══════════════════════════════════════
       VERTICAL STUB LINES  node bottom→bus
       Node centres: 150, 330, 510, 690
       node bottom y=120, CAN-H y=160, CAN-L y=185
       ══════════════════════════════════════ -->

  <!-- Node 1 stubs -->
  <line x1="145" y1="120" x2="145" y2="160" stroke="#fab387" stroke-width="2"/>
  <line x1="155" y1="120" x2="155" y2="185" stroke="#f9e2af" stroke-width="2"/>

  <!-- Node 2 stubs -->
  <line x1="325" y1="120" x2="325" y2="160" stroke="#fab387" stroke-width="2"/>
  <line x1="335" y1="120" x2="335" y2="185" stroke="#f9e2af" stroke-width="2"/>

  <!-- Node 3 stubs -->
  <line x1="505" y1="120" x2="505" y2="160" stroke="#fab387" stroke-width="2"/>
  <line x1="515" y1="120" x2="515" y2="185" stroke="#f9e2af" stroke-width="2"/>

  <!-- Node 4 stubs -->
  <line x1="685" y1="120" x2="685" y2="160" stroke="#fab387" stroke-width="2"/>
  <line x1="695" y1="120" x2="695" y2="185" stroke="#f9e2af" stroke-width="2"/>

  <!-- junction dots on CAN-H -->
  <circle cx="145" cy="160" r="5" fill="#fab387"/>
  <circle cx="325" cy="160" r="5" fill="#fab387"/>
  <circle cx="505" cy="160" r="5" fill="#fab387"/>
  <circle cx="685" cy="160" r="5" fill="#fab387"/>

  <!-- junction dots on CAN-L -->
  <circle cx="155" cy="185" r="5" fill="#f9e2af"/>
  <circle cx="335" cy="185" r="5" fill="#f9e2af"/>
  <circle cx="515" cy="185" r="5" fill="#f9e2af"/>
  <circle cx="695" cy="185" r="5" fill="#f9e2af"/>

  <!-- ══════════════════════════════════════
       CAN-H BUS  y=160  full width 60→800
       CAN-L BUS  y=185  full width 60→800
       ══════════════════════════════════════ -->

  <line x1="60" y1="160" x2="800" y2="160" stroke="#fab387" stroke-width="3.5"/>
  <line x1="60" y1="185" x2="800" y2="185" stroke="#f9e2af" stroke-width="3.5"/>

  <!-- bus rail labels -->
  <text x="815" y="165" font-size="13" font-weight="bold" fill="#fab387">CAN-H</text>
  <text x="815" y="190" font-size="13" font-weight="bold" fill="#f9e2af">CAN-L</text>

  <!-- ══════════════════════════════════════
       TERMINATORS  x=60 and x=800
       vertical resistor symbol between H and L
       ══════════════════════════════════════ -->

  <!-- Left terminator x=60 -->
  <line x1="60" y1="160" x2="60" y2="167" stroke="#94e2d5" stroke-width="2"/>
  <rect x="52" y="167" width="16" height="11" rx="2" fill="#0b0c10" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="60" y1="178" x2="60" y2="185" stroke="#94e2d5" stroke-width="2"/>
  <text x="60" y="208" text-anchor="middle" font-size="11" fill="#94e2d5">120Ω</text>
  <text x="60" y="222" text-anchor="middle" font-size="10" fill="#45475a">terminator</text>
  <text x="60" y="236" text-anchor="middle" font-size="10" fill="#45475a">no reflections</text>

  <!-- Right terminator x=800 -->
  <line x1="800" y1="160" x2="800" y2="167" stroke="#94e2d5" stroke-width="2"/>
  <rect x="792" y="167" width="16" height="11" rx="2" fill="#0b0c10" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="800" y1="178" x2="800" y2="185" stroke="#94e2d5" stroke-width="2"/>
  <text x="800" y="208" text-anchor="middle" font-size="11" fill="#94e2d5">120Ω</text>
  <text x="800" y="222" text-anchor="middle" font-size="10" fill="#45475a">terminator</text>
  <text x="800" y="236" text-anchor="middle" font-size="10" fill="#45475a">no reflections</text>

  <!-- ══════════════════════════════════════
       ANIMATED BROADCAST PACKETS on CAN-H
       Node 1 transmits: packet travels right
       then bounces back (differential pair)
       Each node transmits in sequence
       ══════════════════════════════════════ -->

  <!-- Broadcast 1: Node1 → all (right) on CAN-H y=160 -->
  <circle cy="160" r="6" fill="#fab387" filter="url(#glow)">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.07;0.22;1"
      values="145;145;800;800"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.05;0.07;0.21;0.23;1"
      values="0;0;1;1;0;0"/>
  </circle>

  <!-- Broadcast 2: Node2 → all (right from 325) -->
  <circle cy="160" r="6" fill="#fab387" filter="url(#glow)">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.27;0.28;0.43;1"
      values="325;325;325;800;800"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.26;0.28;0.42;0.44;1"
      values="0;0;1;1;0;0"/>
  </circle>
  <!-- also travels left from Node2 -->
  <circle cy="160" r="6" fill="#fab387" filter="url(#glow)">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.27;0.28;0.43;1"
      values="325;325;325;60;60"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.26;0.28;0.42;0.44;1"
      values="0;0;1;1;0;0"/>
  </circle>

  <!-- Broadcast 3: Node3 → all -->
  <circle cy="160" r="6" fill="#fab387" filter="url(#glow)">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.47;0.48;0.63;1"
      values="505;505;505;800;800"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.46;0.48;0.62;0.64;1"
      values="0;0;1;1;0;0"/>
  </circle>
  <circle cy="160" r="6" fill="#fab387" filter="url(#glow)">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.47;0.48;0.63;1"
      values="505;505;505;60;60"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.46;0.48;0.62;0.64;1"
      values="0;0;1;1;0;0"/>
  </circle>

  <!-- CAN-L mirror packet (opposite polarity, same timing, offset wire) -->
  <circle cy="185" r="5" fill="#f9e2af" filter="url(#glow)">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.07;0.22;1"
      values="155;155;800;800"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.05;0.07;0.21;0.23;1"
      values="0;0;0.6;0.6;0;0"/>
  </circle>
  <circle cy="185" r="5" fill="#f9e2af" filter="url(#glow)">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.27;0.28;0.43;1"
      values="335;335;335;60;60"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.26;0.28;0.42;0.44;1"
      values="0;0;0.6;0.6;0;0"/>
  </circle>

  <!-- ══════════════════════════════════════
       DIFFERENTIAL LABEL & NOISE CANCEL
       ══════════════════════════════════════ -->
  <rect x="160" y="248" width="540" height="46" rx="6"
        fill="#0d1020" stroke="#313244" stroke-width="1"/>
  <text x="430" y="268" text-anchor="middle" font-size="13" fill="#a6adc8">
    Differential pair: CAN-H and CAN-L carry opposite signals
  </text>
  <text x="430" y="286" text-anchor="middle" font-size="12" fill="#585b70">
    Noise hits both wires equally → receiver cancels it out → clean data
  </text>

  <!-- ══════════════════════════════════════
       NODE RECEIVE GLOW on CAN-H junction
       All nodes light up when packet arrives
       ══════════════════════════════════════ -->

  <!-- Node2 receives Node1 broadcast -->
  <circle cx="325" cy="160" r="8" fill="#fab387" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.12;0.14;0.18;0.20;1"
      values="0;0;0.8;0.8;0;0"/>
  </circle>
  <circle cx="505" cy="160" r="8" fill="#fab387" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.15;0.17;0.20;0.22;1"
      values="0;0;0.8;0.8;0;0"/>
  </circle>
  <circle cx="685" cy="160" r="8" fill="#fab387" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.18;0.20;0.22;0.24;1"
      values="0;0;0.8;0.8;0;0"/>
  </circle>

  <!-- ══════════════════════════════════════
       LEGEND
       ══════════════════════════════════════ -->
  <line x1="160" y1="318" x2="200" y2="318" stroke="#fab387" stroke-width="3"/>
  <text x="210" y="322" font-size="12" fill="#fab387">CAN-H  (dominant HIGH)</text>

  <line x1="160" y1="338" x2="200" y2="338" stroke="#f9e2af" stroke-width="3"/>
  <text x="210" y="342" font-size="12" fill="#f9e2af">CAN-L  (dominant LOW)</text>

  <rect x="440" y="310" width="14" height="14" rx="2" fill="#94e2d5"/>
  <text x="462" y="322" font-size="12" fill="#94e2d5">120Ω terminator  (prevents reflections)</text>

  <rect x="440" y="330" width="14" height="14" rx="2" fill="#fab387" opacity="0.4"/>
  <text x="462" y="342" font-size="12" fill="#a6adc8">Broadcast — ALL nodes receive every message</text>

</svg>
