<svg width="100%" viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
  </defs>
  <rect class="bg" width="700" height="360"/>
  <rect class="noiseLayer" width="700" height="360" filter="url(#paperNoise)"/>

  <!-- ══ NODE BOXES ══ -->
  <rect x="60" y="20" width="120" height="72" rx="8" class="fill-amber ink fine"/>
  <text x="120" y="44" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">Node 1</text>
  <text x="120" y="60" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Engine</text>
  <text x="120" y="78" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">CAN ctrl</text>
  <!-- Node 1 glow -->
  <rect x="60" y="20" width="120" height="72" rx="8" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.02;0.06;0.18;0.22;1" values="0;0.6;0.6;0.6;0;0"/>
  </rect>

  <rect x="220" y="20" width="120" height="72" rx="8" class="fill-gray ink fine"/>
  <text x="280" y="44" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">Node 2</text>
  <text x="280" y="60" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Brakes</text>
  <text x="280" y="78" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">CAN ctrl</text>
  <!-- Node 2 receive glow -->
  <rect x="220" y="20" width="120" height="72" rx="8" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.12;0.14;0.20;0.22;1" values="0;0;0.5;0.5;0;0"/>
  </rect>

  <rect x="380" y="20" width="120" height="72" rx="8" class="fill-gray ink fine"/>
  <text x="440" y="44" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">Node 3</text>
  <text x="440" y="60" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Airbag</text>
  <text x="440" y="78" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">CAN ctrl</text>
  <rect x="380" y="20" width="120" height="72" rx="8" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.15;0.17;0.22;0.24;1" values="0;0;0.5;0.5;0;0"/>
  </rect>

  <rect x="540" y="20" width="120" height="72" rx="8" class="fill-gray ink fine"/>
  <text x="600" y="44" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">Node 4</text>
  <text x="600" y="60" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Dashboard</text>
  <text x="600" y="78" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">CAN ctrl</text>
  <rect x="540" y="20" width="120" height="72" rx="8" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.18;0.20;0.24;0.26;1" values="0;0;0.5;0.5;0;0"/>
  </rect>

  <!-- ══ STUBS: nodes → bus ══ -->
  <line x1="115" y1="92" x2="115" y2="134" class="ink hair soft"/>
  <line x1="125" y1="92" x2="125" y2="148" class="ink hair soft"/>
  <line x1="275" y1="92" x2="275" y2="134" class="ink hair soft"/>
  <line x1="285" y1="92" x2="285" y2="148" class="ink hair soft"/>
  <line x1="435" y1="92" x2="435" y2="134" class="ink hair soft"/>
  <line x1="445" y1="92" x2="445" y2="148" class="ink hair soft"/>
  <line x1="595" y1="92" x2="595" y2="134" class="ink hair soft"/>
  <line x1="605" y1="92" x2="605" y2="148" class="ink hair soft"/>

  <!-- junction dots -->
  <circle cx="115" cy="134" r="3" fill="var(--ink)" opacity="0.3"/>
  <circle cx="275" cy="134" r="3" fill="var(--ink)" opacity="0.3"/>
  <circle cx="435" cy="134" r="3" fill="var(--ink)" opacity="0.3"/>
  <circle cx="595" cy="134" r="3" fill="var(--ink)" opacity="0.3"/>
  <circle cx="125" cy="148" r="3" fill="var(--ink)" opacity="0.3"/>
  <circle cx="285" cy="148" r="3" fill="var(--ink)" opacity="0.3"/>
  <circle cx="445" cy="148" r="3" fill="var(--ink)" opacity="0.3"/>
  <circle cx="605" cy="148" r="3" fill="var(--ink)" opacity="0.3"/>

  <!-- ══ CAN-H / CAN-L BUS LINES ══ -->
  <line x1="40" y1="134" x2="650" y2="134" class="ink fine"/>
  <line x1="40" y1="148" x2="650" y2="148" class="ink fine"/>
  <text x="665" y="138" font-family="PT Mono" font-size="10" font-weight="500" class="dot">CAN-H</text>
  <text x="665" y="152" font-family="PT Mono" font-size="10" font-weight="500" class="dot">CAN-L</text>

  <!-- ══ TERMINATORS ══ -->
  <rect x="34" y="132" width="12" height="18" rx="2" fill="none" class="ink hair"/>
  <text x="40" y="162" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">120Ω</text>
  <rect x="645" y="132" width="12" height="18" rx="2" fill="none" class="ink hair"/>
  <text x="650" y="162" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">120Ω</text>

  <!-- ══ ANIMATED BROADCAST ══ -->
  <!-- Node 1 transmits → packet travels right on CAN-H -->
  <circle cy="134" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.04;0.06;0.20;1" values="115;115;115;660;660"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.04;0.06;0.19;0.21;1" values="0;0;0.6;0.6;0;0"/>
  </circle>
  <!-- Mirror on CAN-L -->
  <circle cy="148" r="3" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.04;0.06;0.20;1" values="125;125;125;660;660"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.04;0.06;0.19;0.21;1" values="0;0;0.3;0.3;0;0"/>
  </circle>

  <!-- Node 1 also transmits left -->
  <circle cy="134" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.04;0.06;0.12;1" values="115;115;115;40;40"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.04;0.06;0.11;0.13;1" values="0;0;0.6;0.6;0;0"/>
  </circle>

  <!-- receive glow dots on junction when packet passes -->
  <circle cx="275" cy="134" r="6" fill="var(--ink)" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.11;0.13;0.17;0.19;1" values="0;0;0.5;0.5;0;0"/>
  </circle>
  <circle cx="435" cy="134" r="6" fill="var(--ink)" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.14;0.16;0.20;0.22;1" values="0;0;0.5;0.5;0;0"/>
  </circle>
  <circle cx="595" cy="134" r="6" fill="var(--ink)" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.17;0.19;0.23;0.25;1" values="0;0;0.5;0.5;0;0"/>
  </circle>

  <!-- ══ DIFFERENTIAL LABEL ══ -->
  <rect x="120" y="180" width="460" height="38" rx="6" class="fill-gray ink hair"/>
  <text x="350" y="194" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Differential pair: CAN-H and CAN-L carry opposite signals</text>
  <text x="350" y="210" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">noise hits both → receiver cancels it → clean data</text>

  <!-- ══ LEGEND ══ -->
  <line x1="40" y1="240" x2="660" y2="240" class="ink hair soft" stroke-dasharray="5 3"/>

  <line x1="50" y1="260" x2="80" y2="260" class="ink fine"/>
  <text x="88" y="262" font-family="PT Mono" font-size="10" class="dot soft">CAN-H (dominant HIGH)</text>

  <line x1="50" y1="278" x2="80" y2="278" class="ink fine"/>
  <text x="88" y="280" font-family="PT Mono" font-size="10" class="dot soft">CAN-L (dominant LOW)</text>

  <rect x="350" y="254" width="10" height="10" rx="2" fill="none" class="ink hair"/>
  <text x="368" y="262" font-family="PT Mono" font-size="10" class="dot soft">120Ω terminator (no reflections)</text>

  <text x="350" y="310" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">broadcast — ALL nodes receive every message · no master/slave</text>
  <text x="350" y="328" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">nodes filter by message ID · no addressing needed</text>
</svg>
