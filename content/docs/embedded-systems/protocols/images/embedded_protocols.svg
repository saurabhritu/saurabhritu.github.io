<svg width="100%" viewBox="0 0 720 1100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/></marker>
    <marker id="arrow-rev" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M8 1L2 5L8 9" class="ink hair soft" fill="none"/></marker>
  </defs>
  <rect class="bg" width="720" height="1100"/>
  <rect class="noiseLayer" width="720" height="1100" filter="url(#paperNoise)"/>

  <!-- ══ TITLE ══ -->
  <text x="40" y="46" font-family="PT Mono" font-size="22" font-weight="700" class="dot">Embedded Protocols</text>
  <text x="40" y="68" font-family="PT Mono" font-size="12" class="dot soft">wiring topology &amp; data flow overview</text>
  <line x1="40" y1="86" x2="680" y2="86" class="ink hair soft"/>

  <!-- ══════════════════════════════════════ -->
  <!-- UART SECTION -->
  <!-- ══════════════════════════════════════ -->
  <g transform="translate(40,110)">
    <text x="0" y="0" font-family="PT Mono" font-size="16" font-weight="600" class="dot">UART</text>
    <text x="0" y="18" font-family="PT Mono" font-size="10" class="dot soft">Async · Point-to-Point · 2 Wires</text>

    <rect x="0" y="32" width="120" height="60" rx="8" class="fill-green ink fine"/>
    <text x="60" y="66" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="500" class="dot">Device A</text>

    <rect x="520" y="32" width="120" height="60" rx="8" class="fill-purple ink fine"/>
    <text x="580" y="66" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="500" class="dot">Device B</text>

    <line x1="120" y1="52" x2="518" y2="52" class="ink hair" marker-end="url(#arrow)"/>
    <text x="320" y="46" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">TX → RX</text>
    <line x1="520" y1="72" x2="122" y2="72" class="ink hair" marker-end="url(#arrow-rev)"/>
    <text x="320" y="86" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">RX ← TX</text>

    <!-- animated dots -->
    <circle r="3" cy="52" fill="var(--ink)" opacity="0">
      <animate attributeName="cx" values="120;518" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.08;0.88;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" cy="72" fill="var(--ink)" opacity="0">
      <animate attributeName="cx" values="518;122" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.08;0.88;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <line x1="40" y1="222" x2="680" y2="222" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- ══════════════════════════════════════ -->
  <!-- SPI SECTION -->
  <!-- ══════════════════════════════════════ -->
  <g transform="translate(40,240)">
    <text x="0" y="0" font-family="PT Mono" font-size="16" font-weight="600" class="dot">SPI</text>
    <text x="0" y="18" font-family="PT Mono" font-size="10" class="dot soft">Sync · 1 Master / Multi-Slave · 4+ Wires</text>

    <rect x="0" y="32" width="120" height="120" rx="8" class="fill-blue ink fine"/>
    <text x="60" y="96" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="500" class="dot">Master</text>

    <rect x="520" y="32" width="120" height="48" rx="8" class="fill-gray ink fine"/>
    <text x="580" y="60" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Slave 1</text>
    <rect x="520" y="100" width="120" height="48" rx="8" class="fill-gray ink fine"/>
    <text x="580" y="128" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Slave 2</text>

    <line x1="120" y1="48" x2="518" y2="40" class="ink hair" stroke-dasharray="4 3"/>
    <text x="320" y="38" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">SCLK</text>

    <line x1="120" y1="72" x2="518" y2="56" class="ink hair" marker-end="url(#arrow)"/>
    <text x="320" y="60" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">MOSI</text>

    <line x1="518" y1="72" x2="122" y2="96" class="ink hair" marker-end="url(#arrow-rev)"/>
    <text x="320" y="84" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">MISO</text>

    <line x1="120" y1="120" x2="518" y2="40" class="ink hair soft" stroke-dasharray="3 3"/>
    <text x="180" y="118" font-family="PT Mono" font-size="9" class="dot soft">CS1</text>
    <line x1="120" y1="140" x2="518" y2="108" class="ink hair soft" stroke-dasharray="3 3"/>
    <text x="180" y="142" font-family="PT Mono" font-size="9" class="dot soft">CS2</text>

    <circle r="3" cy="72" fill="var(--ink)" opacity="0">
      <animate attributeName="cx" values="120;518" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.08;0.88;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <line x1="40" y1="412" x2="680" y2="412" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- ══════════════════════════════════════ -->
  <!-- I2C SECTION -->
  <!-- ══════════════════════════════════════ -->
  <g transform="translate(40,430)">
    <text x="0" y="0" font-family="PT Mono" font-size="16" font-weight="600" class="dot">I²C</text>
    <text x="0" y="18" font-family="PT Mono" font-size="10" class="dot soft">Sync · Multi-Master / Multi-Slave · 2 Wires</text>

    <rect x="0" y="32" width="100" height="48" rx="8" class="fill-blue ink fine"/>
    <text x="50" y="60" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">Master</text>

    <rect x="240" y="32" width="100" height="48" rx="8" class="fill-green ink fine"/>
    <text x="290" y="60" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Slave 1</text>

    <rect x="480" y="32" width="100" height="48" rx="8" class="fill-purple ink fine"/>
    <text x="530" y="60" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Slave 2</text>

    <line x1="50" y1="100" x2="600" y2="100" class="ink fine"/>
    <text x="612" y="104" font-family="PT Mono" font-size="9" class="dot soft">SCL</text>
    <line x1="50" y1="114" x2="600" y2="114" class="ink fine"/>
    <text x="612" y="118" font-family="PT Mono" font-size="9" class="dot soft">SDA</text>

    <line x1="50" y1="80" x2="50" y2="100" class="ink hair soft"/>
    <line x1="70" y1="80" x2="70" y2="114" class="ink hair soft"/>
    <line x1="280" y1="80" x2="280" y2="100" class="ink hair soft"/>
    <line x1="300" y1="80" x2="300" y2="114" class="ink hair soft"/>
    <line x1="520" y1="80" x2="520" y2="100" class="ink hair soft"/>
    <line x1="540" y1="80" x2="540" y2="114" class="ink hair soft"/>

    <circle r="4" cy="114" fill="var(--ink)" opacity="0">
      <animate attributeName="cx" values="70;540;70" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.06;0.88;1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <line x1="40" y1="580" x2="680" y2="580" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- ══════════════════════════════════════ -->
  <!-- CAN BUS SECTION -->
  <!-- ══════════════════════════════════════ -->
  <g transform="translate(40,598)">
    <text x="0" y="0" font-family="PT Mono" font-size="16" font-weight="600" class="dot">CAN Bus</text>
    <text x="0" y="18" font-family="PT Mono" font-size="10" class="dot soft">Async · Differential · Multi-Master Broadcast</text>

    <rect x="40" y="32" width="86" height="42" rx="8" class="fill-amber ink fine"/>
    <text x="83" y="58" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Node 1</text>
    <rect x="260" y="32" width="86" height="42" rx="8" class="fill-gray ink fine"/>
    <text x="303" y="58" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Node 2</text>
    <rect x="480" y="32" width="86" height="42" rx="8" class="fill-gray ink fine"/>
    <text x="523" y="58" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Node 3</text>

    <line x1="70" y1="74" x2="70" y2="96" class="ink hair soft"/>
    <line x1="95" y1="74" x2="95" y2="110" class="ink hair soft"/>
    <line x1="290" y1="74" x2="290" y2="96" class="ink hair soft"/>
    <line x1="315" y1="74" x2="315" y2="110" class="ink hair soft"/>
    <line x1="510" y1="74" x2="510" y2="96" class="ink hair soft"/>
    <line x1="535" y1="74" x2="535" y2="110" class="ink hair soft"/>

    <line x1="10" y1="96" x2="600" y2="96" class="ink fine"/>
    <text x="612" y="100" font-family="PT Mono" font-size="9" class="dot soft">CAN-H</text>
    <line x1="10" y1="110" x2="600" y2="110" class="ink fine"/>
    <text x="612" y="114" font-family="PT Mono" font-size="9" class="dot soft">CAN-L</text>

    <rect x="4" y="94" width="10" height="18" rx="2" fill="none" class="ink hair"/>
    <rect x="596" y="94" width="10" height="18" rx="2" fill="none" class="ink hair"/>
    <text x="9" y="124" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">120Ω</text>
    <text x="601" y="124" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">120Ω</text>

    <!-- broadcast ripple -->
    <circle cx="83" cy="103" r="0" fill="none" class="ink hair" opacity="0.5">
      <animate attributeName="r" values="0;220" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <line x1="40" y1="740" x2="680" y2="740" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- ══════════════════════════════════════ -->
  <!-- 1-WIRE SECTION -->
  <!-- ══════════════════════════════════════ -->
  <g transform="translate(40,758)">
    <text x="0" y="0" font-family="PT Mono" font-size="16" font-weight="600" class="dot">1-Wire</text>
    <text x="0" y="18" font-family="PT Mono" font-size="10" class="dot soft">Async · Master/Slave · 1 Data/Power Wire + GND</text>

    <rect x="0" y="32" width="100" height="42" rx="8" class="fill-blue ink fine"/>
    <text x="50" y="58" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">Master</text>

    <rect x="240" y="32" width="100" height="42" rx="8" class="fill-green ink fine"/>
    <text x="290" y="58" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Sensor 1</text>

    <rect x="480" y="32" width="100" height="42" rx="8" class="fill-green ink fine"/>
    <text x="530" y="58" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">Sensor 2</text>

    <line x1="50" y1="90" x2="560" y2="90" class="ink fine"/>
    <text x="572" y="94" font-family="PT Mono" font-size="9" class="dot soft">DATA + VCC</text>

    <line x1="50" y1="74" x2="50" y2="90" class="ink hair soft"/>
    <line x1="290" y1="74" x2="290" y2="90" class="ink hair soft"/>
    <line x1="530" y1="74" x2="530" y2="90" class="ink hair soft"/>

    <rect rx="3" y="86" width="16" height="8" fill="var(--ink)" opacity="0">
      <animate attributeName="x" values="50;530;50" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.06;0.88;1" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <line x1="40" y1="872" x2="680" y2="872" class="ink hair soft" stroke-dasharray="5 3"/>

  <!-- ══════════════════════════════════════ -->
  <!-- RS-232 SECTION -->
  <!-- ══════════════════════════════════════ -->
  <g transform="translate(40,890)">
    <text x="0" y="0" font-family="PT Mono" font-size="16" font-weight="600" class="dot">RS-232</text>
    <text x="0" y="18" font-family="PT Mono" font-size="10" class="dot soft">Async · Point-to-Point · ±12V Signaling</text>

    <rect x="0" y="32" width="100" height="48" rx="8" class="fill-blue ink fine"/>
    <text x="50" y="58" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">MCU</text>

    <rect x="240" y="32" width="120" height="48" rx="8" class="fill-amber ink fine"/>
    <text x="300" y="58" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">MAX232</text>

    <rect x="500" y="32" width="100" height="48" rx="8" class="fill-purple ink fine"/>
    <text x="550" y="58" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot">RS-232</text>

    <line x1="100" y1="50" x2="238" y2="50" class="ink hair" marker-end="url(#arrow)"/>
    <text x="170" y="44" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">3.3V</text>
    <line x1="360" y1="50" x2="498" y2="50" class="ink hair" marker-end="url(#arrow)"/>
    <text x="430" y="44" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">±12V</text>

    <line x1="500" y1="68" x2="362" y2="68" class="ink hair" marker-end="url(#arrow-rev)"/>
    <text x="430" y="82" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">±12V</text>
    <line x1="240" y1="68" x2="102" y2="68" class="ink hair" marker-end="url(#arrow-rev)"/>
    <text x="170" y="82" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">3.3V</text>

    <!-- small→big dots -->
    <circle r="3" cy="50" fill="var(--ink)" opacity="0">
      <animate attributeName="cx" values="100;238" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.08;0.88;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" cy="50" fill="var(--ink)" opacity="0">
      <animate attributeName="cx" values="360;498" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.08;0.88;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ══ FOOTER ══ -->
  <text x="360" y="1060" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">each protocol has unique trade-offs in speed, wire count, noise immunity &amp; complexity</text>
  <text x="360" y="1078" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">choose the right tool for the job</text>
</svg>
