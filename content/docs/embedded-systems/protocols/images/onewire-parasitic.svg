<svg width="100%" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
  </defs>
  <rect class="bg" width="700" height="380"/>
  <rect class="noiseLayer" width="700" height="380" filter="url(#paperNoise)"/>

  <!-- ══ SCENE 1: IDLE — wire HIGH, capacitor charging ══ -->
  <text x="24" y="18" font-family="PT Mono" font-size="11" font-weight="600" class="dot">Idle — parasitic charging</text>
  <text x="44" y="50" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Wire</text>

  <!-- Static HIGH wire -->
  <line x1="70" y1="46" x2="480" y2="46" class="ink fine"/>
  <text x="275" y="36" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">HIGH (VCC via pull-up)</text>

  <!-- energy dots on wire -->
  <circle cy="46" r="3" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="70;480;70" keyTimes="0;0.5;1" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.06;0.88;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cy="46" r="3" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" values="70;480;70" keyTimes="0;0.5;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.06;0.88;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Cap drop -->
  <line x1="380" y1="46" x2="380" y2="60" class="ink hair soft"/>
  <text x="400" y="58" font-family="PT Mono" font-size="9" class="dot soft">↓ cap charges</text>
  <!-- Capacitor symbol -->
  <line x1="366" y1="66" x2="394" y2="66" class="ink fine"/>
  <line x1="366" y1="74" x2="394" y2="74" class="ink fine"/>
  <line x1="380" y1="64" x2="380" y2="66" class="ink hair soft"/>
  <line x1="380" y1="74" x2="380" y2="84" class="ink hair soft"/>
  <!-- GND -->
  <line x1="372" y1="84" x2="388" y2="84" class="ink hair soft"/>
  <line x1="374" y1="88" x2="386" y2="88" class="ink hair soft" opacity="0.5"/>
  <line x1="376" y1="92" x2="384" y2="92" class="ink hair soft" opacity="0.3"/>

  <text x="404" y="72" font-family="PT Mono" font-size="10" font-weight="500" class="dot">[C]</text>
  <text x="424" y="72" font-family="PT Mono" font-size="9" class="dot soft">stored energy</text>
  <circle cx="380" cy="46" r="3" fill="var(--ink)" opacity="0.4"/>

  <!-- cap charge glow -->
  <ellipse cx="380" cy="70" rx="18" ry="8" fill="none" class="ink hair" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="18;24;18" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ══ SCENE 2: TRANSMITTING — wire LOW pulse ══ -->
  <text x="24" y="124" font-family="PT Mono" font-size="11" font-weight="600" class="dot">Transmitting — wire pulled LOW</text>
  <text x="44" y="154" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Wire</text>

  <!-- Waveform: HIGH—LOW—HIGH -->
  <line x1="70" y1="150" x2="168" y2="150" class="ink fine"/>
  <line x1="168" y1="150" x2="168" y2="174" class="ink fine"/>
  <line x1="168" y1="174" x2="300" y2="174" class="ink fine"/>
  <line x1="300" y1="174" x2="300" y2="150" class="ink fine"/>
  <line x1="300" y1="150" x2="480" y2="150" class="ink fine"/>

  <text x="120" y="142" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">HIGH</text>
  <text x="234" y="190" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">LOW</text>
  <text x="390" y="142" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">HIGH</text>

  <!-- signal dot -->
  <circle r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" dur="2.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.17;0.21;0.30;0.38;0.42;1"
      values="70;168;168;300;300;480;480"/>
    <animate attributeName="cy" dur="2.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.17;0.21;0.30;0.38;0.42;1"
      values="150;150;174;174;150;150;150"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.88;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Cap during LOW -->
  <line x1="380" y1="150" x2="380" y2="162" class="ink hair soft"/>
  <line x1="368" y1="162" x2="392" y2="162" class="ink fine"/>
  <line x1="368" y1="168" x2="392" y2="168" class="ink fine"/>
  <line x1="380" y1="168" x2="380" y2="178" class="ink hair soft"/>
  <line x1="372" y1="178" x2="388" y2="178" class="ink hair soft"/>
  <circle cx="380" cy="150" r="3" fill="var(--ink)" opacity="0.4"/>
  <text x="400" y="166" font-family="PT Mono" font-size="10" font-weight="500" class="dot">[C]</text>

  <!-- discharge glow during LOW -->
  <ellipse cx="380" cy="165" rx="18" ry="8" fill="none" class="ink hair" opacity="0">
    <animate attributeName="opacity" dur="2.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.21;0.22;0.37;0.38;1" values="0;0;0.4;0.4;0;0"/>
  </ellipse>
  <text x="420" y="162" font-family="PT Mono" font-size="9" class="dot soft">← slave runs on [C]</text>
  <text x="420" y="174" font-family="PT Mono" font-size="9" class="dot soft">   during LOW pulse</text>

  <!-- pulse duration -->
  <line x1="168" y1="198" x2="300" y2="198" class="ink hair soft"/>
  <polygon points="168,194 168,202 162,198" fill="var(--ink)" opacity="0.4"/>
  <polygon points="300,194 300,202 306,198" fill="var(--ink)" opacity="0.4"/>
  <text x="234" y="212" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">pulse duration = bit value</text>

  <!-- ══ DIVIDER ══ -->
  <line x1="24" y1="230" x2="676" y2="230" class="ink hair soft" stroke-dasharray="4 6"/>
  <text x="350" y="246" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="600" class="dot">64-bit ROM ID — burned at factory, unique forever</text>

  <!-- ══ ROM ID ROW ══ -->
  <!-- Family -->
  <rect x="24" y="260" width="96" height="42" rx="5" class="fill-purple ink hair">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.04;0.20;0.24;1" values="0.4;1;1;1;0.4;0.4"/>
  </rect>
  <text x="72" y="278" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot">8-bit</text>
  <text x="72" y="294" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">family code</text>

  <!-- Serial -->
  <rect x="124" y="260" width="400" height="42" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.24;0.28;0.68;0.72;1" values="0.4;0.4;1;1;0.4;0.4"/>
  </rect>
  <text x="324" y="278" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">48-bit serial number</text>
  <text x="324" y="294" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">unique per device, ever</text>
  <!-- scan bar -->
  <rect x="125" y="261" width="0" height="40" rx="3" fill="var(--ink)" opacity="0">
    <animate attributeName="width" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.24;0.68;0.72;1" values="0;0;400;400;0"/>
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.28;0.50;0.68;0.72;1" values="0;0.08;0.04;0.08;0"/>
  </rect>

  <!-- CRC -->
  <rect x="528" y="260" width="96" height="42" rx="5" class="fill-red ink hair">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.72;0.76;0.96;1" values="0.4;0.4;1;1;0.4"/>
  </rect>
  <text x="576" y="278" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot">8-bit</text>
  <text x="576" y="294" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">CRC check</text>

  <!-- bit counts -->
  <line x1="24" y1="310" x2="120" y2="310" class="ink hair soft" stroke-dasharray="3 2"/>
  <text x="72" y="322" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">8 bits</text>
  <line x1="124" y1="310" x2="524" y2="310" class="ink hair soft" stroke-dasharray="3 2"/>
  <text x="324" y="322" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">48 bits</text>
  <line x1="528" y1="310" x2="624" y2="310" class="ink hair soft" stroke-dasharray="3 2"/>
  <text x="576" y="322" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">8 bits</text>

  <line x1="24" y1="330" x2="624" y2="330" class="ink hair soft"/>
  <text x="324" y="346" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">= 64 bits total · 2⁴⁸ serial numbers · 281 trillion unique IDs</text>
  <text x="324" y="364" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">Master runs SEARCH ROM to discover every device automatically</text>
</svg>
