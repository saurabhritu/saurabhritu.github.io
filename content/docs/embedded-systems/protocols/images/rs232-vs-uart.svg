<svg width="100%" viewBox="0 0 700 390" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
  </defs>
  <rect class="bg" width="700" height="390"/>
  <rect class="noiseLayer" width="700" height="390" filter="url(#paperNoise)"/>

  <!-- ══ COLUMN HEADERS ══ -->
  <text x="180" y="22" text-anchor="middle" font-family="PT Mono" font-size="14" font-weight="600" class="dot">UART / TTL</text>
  <text x="180" y="38" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">3.3V logic</text>
  <line x1="20" y1="46" x2="340" y2="46" class="ink hair soft"/>

  <text x="530" y="22" text-anchor="middle" font-family="PT Mono" font-size="14" font-weight="600" class="dot">RS-232</text>
  <text x="530" y="38" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">the tough older brother</text>
  <line x1="360" y1="46" x2="690" y2="46" class="ink hair soft"/>

  <!-- centre divider -->
  <line x1="350" y1="46" x2="350" y2="346" class="ink hair soft" stroke-dasharray="4 4"/>

  <!-- ══ LEFT: UART/TTL ══ -->
  <line x1="40" y1="80" x2="326" y2="80" class="ink hair soft" stroke-dasharray="3 3"/>
  <text x="36" y="84" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">3.3V</text>
  <text x="330" y="84" font-family="PT Mono" font-size="10" class="dot soft">Logic 1</text>

  <line x1="40" y1="200" x2="326" y2="200" class="ink hair soft" stroke-dasharray="3 3"/>
  <text x="36" y="204" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">0V</text>
  <text x="330" y="204" font-family="PT Mono" font-size="10" class="dot soft">Logic 0</text>

  <!-- threshold -->
  <line x1="40" y1="140" x2="326" y2="140" class="ink hair" stroke-dasharray="2 4" opacity="0.3"/>
  <text x="36" y="143" text-anchor="end" font-family="PT Mono" font-size="9" class="dot soft">1.65V</text>

  <!-- voltage bar -->
  <rect x="55" y="80" width="30" height="120" rx="3" class="fill-red ink hair" opacity="0.6"/>
  <text x="70" y="144" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">3.3V</text>
  <text x="70" y="156" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">swing</text>

  <!-- waveform -->
  <polyline points="100,80 150,80 150,200 200,200 200,80 250,80 250,200 300,200"
    fill="none" class="ink fine"/>

  <!-- signal dot -->
  <circle r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.25;0.333;0.417;0.5;0.583;0.667;0.75;1"
      values="100;150;150;200;200;250;250;300;300;300"/>
    <animate attributeName="cy" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.25;0.333;0.417;0.5;0.583;0.667;0.75;1"
      values="80;80;200;200;80;80;200;200;80;80"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.06;0.88;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- NOISE SPIKE -->
  <polyline points="180,200 180,130 196,130 196,200"
    fill="none" class="ink fine" opacity="0">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.34;0.36;0.44;0.46;1" values="0;0;0.8;0.8;0;0"/>
  </polyline>
  <text x="188" y="120" text-anchor="middle" font-family="PT Mono" font-size="10" font-weight="500" class="dot" opacity="0">
    BIT FLIP!
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.36;0.38;0.44;0.46;1" values="0;0;0.8;0.8;0;0"/>
  </text>

  <!-- BAD verdict -->
  <rect x="100" y="220" width="140" height="30" rx="5" class="fill-red ink hair"/>
  <text x="170" y="232" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">← BAD</text>
  <text x="170" y="244" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">noise &gt; 1.65V flips bit</text>

  <!-- ══ RIGHT: RS-232 ══ -->
  <line x1="370" y1="80" x2="676" y2="80" class="ink hair soft" stroke-dasharray="3 3"/>
  <text x="366" y="84" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">+12V</text>
  <text x="680" y="84" font-family="PT Mono" font-size="10" class="dot soft">Logic 1</text>

  <line x1="370" y1="150" x2="676" y2="150" class="ink hair" stroke-dasharray="2 4" opacity="0.3"/>
  <text x="366" y="153" text-anchor="end" font-family="PT Mono" font-size="9" class="dot soft">+3V</text>

  <line x1="370" y1="186" x2="676" y2="186" class="ink hair" stroke-dasharray="2 6" opacity="0.2"/>
  <text x="366" y="189" text-anchor="end" font-family="PT Mono" font-size="9" class="dot soft">0V</text>

  <line x1="370" y1="222" x2="676" y2="222" class="ink hair" stroke-dasharray="2 4" opacity="0.3"/>
  <text x="366" y="225" text-anchor="end" font-family="PT Mono" font-size="9" class="dot soft">−3V</text>

  <line x1="370" y1="292" x2="676" y2="292" class="ink hair soft" stroke-dasharray="3 3"/>
  <text x="366" y="296" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">−12V</text>
  <text x="680" y="296" font-family="PT Mono" font-size="10" class="dot soft">Logic 0</text>

  <!-- voltage bar -->
  <rect x="385" y="80" width="30" height="212" rx="3" class="fill-green ink hair" opacity="0.6"/>
  <text x="400" y="190" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">27V</text>
  <text x="400" y="202" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">swing</text>

  <!-- waveform -->
  <polyline points="430,80 480,80 480,292 530,292 530,80 580,80 580,292 630,292"
    fill="none" class="ink fine"/>

  <!-- signal dot -->
  <circle r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.25;0.333;0.417;0.5;0.583;0.667;0.75;1"
      values="430;480;480;530;530;580;580;630;630;630"/>
    <animate attributeName="cy" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.25;0.333;0.417;0.5;0.583;0.667;0.75;1"
      values="80;80;292;292;80;80;292;292;80;80"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.06;0.88;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- noise spike (small, below threshold) -->
  <polyline points="508,292 508,260 520,260 520,292"
    fill="none" class="ink fine" opacity="0">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.34;0.36;0.44;0.46;1" values="0;0;0.6;0.6;0;0"/>
  </polyline>
  <text x="514" y="252" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot" opacity="0">
    no flip
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.36;0.38;0.44;0.46;1" values="0;0;0.7;0.7;0;0"/>
  </text>

  <!-- GOOD verdict -->
  <rect x="460" y="308" width="150" height="30" rx="5" class="fill-green ink hair"/>
  <text x="535" y="320" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">← GOOD</text>
  <text x="535" y="332" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">need 15V+ noise to flip</text>

  <!-- ══ BOTTOM ══ -->
  <rect x="20" y="354" width="660" height="24" rx="5" class="fill-gray ink hair"/>
  <text x="350" y="370" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">27V swing vs 3.3V = 8× tougher to corrupt — RS-232 built for noisy factories &amp; long cables</text>
</svg>
