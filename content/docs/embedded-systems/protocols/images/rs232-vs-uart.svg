<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="100%" height="100%"
     style="background-color:#0b0c10; font-family:'Courier New', Courier, monospace;">

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════
       COLUMN HEADERS
       ══════════════════════════════════════ -->
  <text x="215" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#f38ba8">UART / TTL</text>
  <text x="215" y="46" text-anchor="middle" font-size="12" fill="#585b70">3.3V logic</text>
  <line x1="30" y1="54" x2="400" y2="54" stroke="#3a2020" stroke-width="1"/>

  <text x="645" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#a6e3a1">RS-232</text>
  <text x="645" y="46" text-anchor="middle" font-size="12" fill="#585b70">the tough older brother</text>
  <line x1="430" y1="54" x2="860" y2="54" stroke="#1a3a1a" stroke-width="1"/>

  <!-- centre divider -->
  <line x1="415" y1="54" x2="415" y2="400" stroke="#313244" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ══════════════════════════════════════
       LEFT SIDE — UART/TTL voltage diagram
       Signal bar: Logic1 rail y=90, Logic0 rail y=230
       Total span = 140px for 3.3V
       ══════════════════════════════════════ -->

  <!-- Logic 1 rail  y=90 -->
  <line x1="50" y1="90" x2="390" y2="90" stroke="#f38ba8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="46" y="94" font-size="12" fill="#f38ba8" text-anchor="end">3.3V</text>
  <text x="392" y="94" font-size="12" fill="#a6adc8">Logic 1</text>

  <!-- Logic 0 rail  y=230 -->
  <line x1="50" y1="230" x2="390" y2="230" stroke="#f38ba8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="46" y="234" font-size="12" fill="#f38ba8" text-anchor="end">0V</text>
  <text x="392" y="234" font-size="12" fill="#a6adc8">Logic 0</text>

  <!-- noise threshold line y=160 (midpoint = 1.65V) -->
  <line x1="50" y1="160" x2="390" y2="160" stroke="#f38ba8" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>
  <text x="46" y="163" font-size="10" fill="#f38ba8" text-anchor="end" opacity="0.6">1.65V</text>

  <!-- voltage bar (solid fill between rails) -->
  <rect x="70" y="90" width="40" height="140" rx="3"
        fill="#2a1020" stroke="#f38ba8" stroke-width="1.5" opacity="0.8"/>
  <text x="90" y="165" text-anchor="middle" font-size="11" fill="#f38ba8" opacity="0.6">3.3V</text>
  <text x="90" y="178" text-anchor="middle" font-size="10" fill="#585b70">swing</text>

  <!-- waveform signal line showing a bit pattern  y=90→230 -->
  <polyline points="130,90 190,90 190,230 250,230 250,90 310,90 310,230 370,230"
    fill="none" stroke="#f38ba8" stroke-width="2.5"/>

  <!-- animated signal dot travelling the waveform -->
  <circle r="5" fill="#f38ba8" filter="url(#glow)">
    <animate attributeName="cx" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.25;0.333;0.417;0.5;0.583;0.667;0.75;1"
      values="130;190;190;250;250;310;310;370;370;370"/>
    <animate attributeName="cy" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.25;0.333;0.417;0.5;0.583;0.667;0.75;1"
      values="90;90;230;230;90;90;230;230;90;90"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.96;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- NOISE SPIKE — crosses threshold → bit flip! -->
  <!-- noise spike fires from logic 0 line upward, crosses 1.65V midpoint -->
  <polyline points="220,230 220,148 240,148 240,230"
    fill="none" stroke="#f38ba8" stroke-width="2.5" opacity="0" filter="url(#glow-lg)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.34;0.36;0.44;0.46;1" values="0;0;0.95;0.95;0;0"/>
  </polyline>

  <!-- red "BIT FLIP!" label -->
  <text x="230" y="136" text-anchor="middle" font-size="12" font-weight="bold" fill="#f38ba8" opacity="0" filter="url(#glow)">
    BIT FLIP!
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.36;0.38;0.44;0.46;1" values="0;0;1;1;0;0"/>
  </text>
  <text x="230" y="150" text-anchor="middle" font-size="11" fill="#f38ba8" opacity="0">
    ← noise &gt; 1.65V
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.36;0.38;0.44;0.46;1" values="0;0;0.8;0.8;0;0"/>
  </text>

  <!-- "BAD" verdict -->
  <rect x="120" y="250" width="160" height="36" rx="5" fill="#2a0e0e" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="200" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#f38ba8">← BAD</text>
  <text x="200" y="279" text-anchor="middle" font-size="11" fill="#7a3a3a">noise &gt; 1.65V flips bit</text>

  <!-- ══════════════════════════════════════
       RIGHT SIDE — RS-232 voltage diagram
       Logic1 = +12V   y=90
       Logic0 = −12V   y=340
       Total span = 250px for 27V
       ══════════════════════════════════════ -->

  <!-- Logic 1 rail  y=90  (+12V) -->
  <line x1="430" y1="90" x2="830" y2="90" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="426" y="94" font-size="12" fill="#a6e3a1" text-anchor="end">+12V</text>
  <text x="832" y="94" font-size="12" fill="#a6adc8">Logic 1</text>

  <!-- +3V threshold line  y=173 -->
  <line x1="430" y1="173" x2="830" y2="173" stroke="#a6e3a1" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>
  <text x="426" y="176" font-size="10" fill="#a6e3a1" text-anchor="end" opacity="0.5">+3V</text>

  <!-- 0V centre line  y=215 -->
  <line x1="430" y1="215" x2="830" y2="215" stroke="#45475a" stroke-width="1" stroke-dasharray="2 6" opacity="0.4"/>
  <text x="426" y="218" font-size="10" fill="#45475a" text-anchor="end">0V</text>

  <!-- -3V threshold  y=257 -->
  <line x1="430" y1="257" x2="830" y2="257" stroke="#a6e3a1" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>
  <text x="426" y="260" font-size="10" fill="#a6e3a1" text-anchor="end" opacity="0.5">−3V</text>

  <!-- Logic 0 rail  y=340  (-12V) -->
  <line x1="430" y1="340" x2="830" y2="340" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="426" y="344" font-size="12" fill="#a6e3a1" text-anchor="end">−12V</text>
  <text x="832" y="344" font-size="12" fill="#a6adc8">Logic 0</text>

  <!-- voltage bar showing 27V span -->
  <rect x="450" y="90" width="40" height="250" rx="3"
        fill="#0a2a18" stroke="#a6e3a1" stroke-width="1.5" opacity="0.8"/>
  <text x="470" y="220" text-anchor="middle" font-size="11" fill="#a6e3a1" opacity="0.7">27V</text>
  <text x="470" y="233" text-anchor="middle" font-size="10" fill="#585b70">swing</text>

  <!-- RS-232 waveform signal  y=90↔340 -->
  <polyline points="510,90 570,90 570,340 630,340 630,90 690,90 690,340 750,340"
    fill="none" stroke="#a6e3a1" stroke-width="2.5"/>

  <!-- animated signal dot -->
  <circle r="5" fill="#a6e3a1" filter="url(#glow)">
    <animate attributeName="cx" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.25;0.333;0.417;0.5;0.583;0.667;0.75;1"
      values="510;570;570;630;630;690;690;750;750;750"/>
    <animate attributeName="cy" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.167;0.25;0.333;0.417;0.5;0.583;0.667;0.75;1"
      values="90;90;340;340;90;90;340;340;90;90"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.96;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- NOISE SPIKE on RS-232 — barely moves, nowhere near threshold -->
  <polyline points="600,340 600,300 616,300 616,340"
    fill="none" stroke="#fab387" stroke-width="2" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.34;0.36;0.44;0.46;1" values="0;0;0.9;0.9;0;0"/>
  </polyline>

  <!-- "no flip" label -->
  <text x="608" y="288" text-anchor="middle" font-size="12" fill="#a6e3a1" opacity="0" filter="url(#glow)">
    no flip
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.36;0.38;0.44;0.46;1" values="0;0;1;1;0;0"/>
  </text>
  <text x="608" y="302" text-anchor="middle" font-size="11" fill="#a6e3a1" opacity="0">
    need 15V+
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.36;0.38;0.44;0.46;1" values="0;0;0.8;0.8;0;0"/>
  </text>

  <!-- "GOOD" verdict -->
  <rect x="540" y="358" width="190" height="36" rx="5" fill="#0a2a18" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="635" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6e3a1">← GOOD</text>
  <text x="635" y="387" text-anchor="middle" font-size="11" fill="#3a7a5a">noise must exceed 15V swing</text>

  <!-- ══════════════════════════════════════
       BOTTOM COMPARISON PANEL
       ══════════════════════════════════════ -->
  <rect x="30" y="404" width="800" height="30" rx="5"
        fill="#0d0d18" stroke="#313244" stroke-width="1"/>
  <text x="430" y="424" text-anchor="middle" font-size="13" fill="#a6adc8">
    27V total swing vs 3.3V  =  8× tougher to corrupt  —  RS-232 built for noisy factories and long cables
  </text>

</svg>
