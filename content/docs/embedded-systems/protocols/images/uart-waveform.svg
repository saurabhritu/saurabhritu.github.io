<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="100%" height="100%"
     style="background-color:#0b0c10; font-family:'Courier New', Courier, monospace;">

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── bit data for 0x55 = 0101 0101 (LSB first) ──
       bit values: D0=1 D1=0 D2=1 D3=0 D4=1 D5=0 D6=1 D7=0
       START=LOW(0)  STOP=HIGH(1)  PARITY=HIGH(1) IDLE=HIGH(1)
       Signal: HIGH=top rail(y=80) LOW=bottom rail(y=140) -->

  <!-- ── layout ──
       total slots: idle-L | START | D0 | D1 | D2 | D3 | D4 | D5 | D6 | D7 | PAR | STOP | idle-R
       slot width = 58px, starting x=40
       x positions: 40 98 156 214 272 330 388 446 504 562 620 678 736
       rail HIGH y=80, rail LOW y=140, step height=60 -->

  <!-- ════════════════════════════════════════
       STATIC WAVEFORM OUTLINE (dim base)
       ════════════════════════════════════════ -->

  <!-- idle left: HIGH from x=40 down to START -->
  <polyline points="40,80 98,80" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- idle left drop to LOW for START -->
  <polyline points="98,80 98,140" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- START: LOW x=98→156 -->
  <polyline points="98,140 156,140" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- D0=1 (HIGH): rise then flat x=156→214 -->
  <polyline points="156,140 156,80 214,80" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- D1=0 (LOW): drop x=214→272 -->
  <polyline points="214,80 214,140 272,140" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- D2=1 (HIGH) x=272→330 -->
  <polyline points="272,140 272,80 330,80" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- D3=0 (LOW) x=330→388 -->
  <polyline points="330,80 330,140 388,140" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- D4=1 (HIGH) x=388→446 -->
  <polyline points="388,140 388,80 446,80" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- D5=0 (LOW) x=446→504 -->
  <polyline points="446,80 446,140 504,140" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- D6=1 (HIGH) x=504→562 -->
  <polyline points="504,140 504,80 562,80" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- D7=0 (LOW) x=562→620 -->
  <polyline points="562,80 562,140 620,140" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- PARITY=1 (HIGH) x=620→678 -->
  <polyline points="620,140 620,80 678,80" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- STOP=1 (HIGH) x=678→736, already at HIGH -->
  <polyline points="678,80 736,80" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
  <!-- STOP rise at 678 (already HIGH from parity) -->
  <!-- idle right: HIGH x=736→820 -->
  <polyline points="736,80 820,80" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>

  <!-- ════════════════════════════════════════
       ANIMATED WAVEFORM (bright travelling line)
       One circle sweeps cx from 40→820 along the waveform.
       To simulate the waveform, we draw separate animated
       bright segments that light up in sequence using
       animate attributeName="opacity" on each polyline.
       Each segment: 1 slot = 1/13 of total = ~7.7% of 4s cycle
       ════════════════════════════════════════ -->

  <!-- Cycle = 4s, 13 slots, each slot = 4/13 ≈ 0.308s = 7.69% -->
  <!-- Slot windows (start% : end%):
       idle-L : 0.00–0.077
       START  : 0.077–0.154
       D0     : 0.154–0.231
       D1     : 0.231–0.308
       D2     : 0.308–0.385
       D3     : 0.385–0.462
       D4     : 0.462–0.539
       D5     : 0.539–0.616
       D6     : 0.616–0.693
       D7     : 0.693–0.770
       PAR    : 0.770–0.847
       STOP   : 0.847–0.924
       idle-R : 0.924–1.000 -->

  <!-- idle left segment -->
  <polyline points="40,80 98,80" fill="none" stroke="#a6e3a1" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.04;0.077;0.117;1"
      values="0.15;1;1;1;0.15;0.15"/>
  </polyline>
  <!-- idle-L drop + START LOW -->
  <polyline points="98,80 98,140 156,140" fill="none" stroke="#f38ba8" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.077;0.117;0.154;0.194;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- D0=1: rise + HIGH -->
  <polyline points="156,140 156,80 214,80" fill="none" stroke="#a6e3a1" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.154;0.194;0.231;0.271;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- D1=0: drop + LOW -->
  <polyline points="214,80 214,140 272,140" fill="none" stroke="#a6e3a1" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.231;0.271;0.308;0.348;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- D2=1: rise + HIGH -->
  <polyline points="272,140 272,80 330,80" fill="none" stroke="#a6e3a1" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.308;0.348;0.385;0.425;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- D3=0: drop + LOW -->
  <polyline points="330,80 330,140 388,140" fill="none" stroke="#a6e3a1" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.385;0.425;0.462;0.502;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- D4=1: rise + HIGH -->
  <polyline points="388,140 388,80 446,80" fill="none" stroke="#a6e3a1" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.462;0.502;0.539;0.579;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- D5=0: drop + LOW -->
  <polyline points="446,80 446,140 504,140" fill="none" stroke="#a6e3a1" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.539;0.579;0.616;0.656;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- D6=1: rise + HIGH -->
  <polyline points="504,140 504,80 562,80" fill="none" stroke="#a6e3a1" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.616;0.656;0.693;0.733;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- D7=0: drop + LOW -->
  <polyline points="562,80 562,140 620,140" fill="none" stroke="#a6e3a1" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.693;0.733;0.770;0.810;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- PARITY=1: rise + HIGH -->
  <polyline points="620,140 620,80 678,80" fill="none" stroke="#cba6f7" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.770;0.810;0.847;0.887;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>
  <!-- STOP=1 + idle right -->
  <polyline points="678,80 820,80" fill="none" stroke="#f38ba8" stroke-width="3" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.847;0.887;0.924;0.964;1"
      values="0.15;0.15;1;1;0.15;0.15"/>
  </polyline>

  <!-- ════════════════════════════════════════
       TRAVELLING DOT on the waveform
       cx animates along the waveform x-centers,
       cy flips between 80 (HIGH) and 140 (LOW)
       ════════════════════════════════════════ -->

  <!-- dot cx sweeps left→right continuously -->
  <circle r="5" fill="#a6e3a1" filter="url(#glow)">
    <!-- x: sweep each slot midpoint -->
    <animate attributeName="cx" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.038;0.115;0.192;0.269;0.346;0.423;0.500;0.577;0.654;0.731;0.808;0.885;0.962;1"
      values="40;69;127;185;243;301;359;417;475;533;591;649;707;778;820"/>
    <!-- y: follow signal level at each slot -->
    <animate attributeName="cy" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.038;0.077;0.115;0.154;0.192;0.231;0.269;0.308;0.346;0.385;0.423;0.462;0.500;0.539;0.577;0.616;0.654;0.693;0.731;0.770;0.808;0.847;0.885;0.924;0.962;1"
      values="80;80;80;140;140;80;80;140;140;80;80;140;140;80;80;140;140;80;80;140;140;80;80;80;80;80;80"/>
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.02;0.96;1"
      values="0;1;1;0"/>
  </circle>

  <!-- ════════════════════════════════════════
       RAIL LABELS (top + bottom)
       ════════════════════════════════════════ -->
  <text x="22" y="84"  fill="#5F5E5A" font-size="10" text-anchor="middle">HIGH</text>
  <text x="22" y="144" fill="#5F5E5A" font-size="10" text-anchor="middle">LOW</text>

  <!-- ════════════════════════════════════════
       BIT SLOT LABELS (top row)
       ════════════════════════════════════════ -->
  <text x="69"  y="60" fill="#5F5E5A" font-size="10" text-anchor="middle">Idle</text>
  <text x="127" y="60" fill="#f38ba8" font-size="10" text-anchor="middle">START</text>
  <text x="185" y="60" fill="#a6e3a1" font-size="10" text-anchor="middle">D0</text>
  <text x="243" y="60" fill="#a6e3a1" font-size="10" text-anchor="middle">D1</text>
  <text x="301" y="60" fill="#a6e3a1" font-size="10" text-anchor="middle">D2</text>
  <text x="359" y="60" fill="#a6e3a1" font-size="10" text-anchor="middle">D3</text>
  <text x="417" y="60" fill="#a6e3a1" font-size="10" text-anchor="middle">D4</text>
  <text x="475" y="60" fill="#a6e3a1" font-size="10" text-anchor="middle">D5</text>
  <text x="533" y="60" fill="#a6e3a1" font-size="10" text-anchor="middle">D6</text>
  <text x="591" y="60" fill="#a6e3a1" font-size="10" text-anchor="middle">D7</text>
  <text x="649" y="60" fill="#cba6f7" font-size="10" text-anchor="middle">PAR</text>
  <text x="707" y="60" fill="#f38ba8" font-size="10" text-anchor="middle">STOP</text>
  <text x="778" y="60" fill="#5F5E5A" font-size="10" text-anchor="middle">Idle</text>

  <!-- slot divider ticks -->
  <line x1="98"  y1="55" x2="98"  y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="156" y1="55" x2="156" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="214" y1="55" x2="214" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="272" y1="55" x2="272" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="330" y1="55" x2="330" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="388" y1="55" x2="388" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="446" y1="55" x2="446" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="504" y1="55" x2="504" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="562" y1="55" x2="562" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="620" y1="55" x2="620" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="678" y1="55" x2="678" y2="68" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="736" y1="55" x2="736" y2="68" stroke="#2a2a3a" stroke-width="1"/>

  <!-- bit value labels (below waveform) -->
  <text x="127" y="165" fill="#f38ba8" font-size="10" text-anchor="middle">0</text>
  <text x="185" y="165" fill="#a6e3a1" font-size="10" text-anchor="middle">1</text>
  <text x="243" y="165" fill="#a6e3a1" font-size="10" text-anchor="middle">0</text>
  <text x="301" y="165" fill="#a6e3a1" font-size="10" text-anchor="middle">1</text>
  <text x="359" y="165" fill="#a6e3a1" font-size="10" text-anchor="middle">0</text>
  <text x="417" y="165" fill="#a6e3a1" font-size="10" text-anchor="middle">1</text>
  <text x="475" y="165" fill="#a6e3a1" font-size="10" text-anchor="middle">0</text>
  <text x="533" y="165" fill="#a6e3a1" font-size="10" text-anchor="middle">1</text>
  <text x="591" y="165" fill="#a6e3a1" font-size="10" text-anchor="middle">0</text>
  <text x="649" y="165" fill="#cba6f7" font-size="10" text-anchor="middle">1</text>
  <text x="707" y="165" fill="#f38ba8" font-size="10" text-anchor="middle">1</text>

  <!-- ════════════════════════════════════════
       ANNOTATIONS
       ════════════════════════════════════════ -->

  <!-- data bits brace -->
  <line x1="156" y1="175" x2="620" y2="175" stroke="#3a3a4a" stroke-width="1"/>
  <line x1="156" y1="172" x2="156" y2="178" stroke="#3a3a4a" stroke-width="1"/>
  <line x1="620" y1="172" x2="620" y2="178" stroke="#3a3a4a" stroke-width="1"/>
  <text x="388" y="188" fill="#6c7086" font-size="10" text-anchor="middle">8 data bits — 0x55 = 0101 0101  (LSB first)</text>

  <!-- START annotation -->
  <line x1="127" y1="148" x2="127" y2="210" stroke="#f38ba856" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="50"  y="220" fill="#f38ba8" font-size="10" text-anchor="middle">Line LOW</text>
  <text x="50"  y="232" fill="#6c7086" font-size="10" text-anchor="middle">"get ready"</text>

  <!-- PARITY annotation -->
  <line x1="649" y1="148" x2="649" y2="210" stroke="#cba6f756" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="649" y="220" fill="#cba6f7" font-size="10" text-anchor="middle">parity check</text>

  <!-- STOP annotation -->
  <line x1="707" y1="86" x2="707" y2="210" stroke="#f38ba856" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="778" y="220" fill="#f38ba8" font-size="10" text-anchor="middle">Line HIGH</text>
  <text x="778" y="232" fill="#6c7086" font-size="10" text-anchor="middle">"done"</text>

  <!-- baud rate note -->
  <text x="430" y="260" fill="#45475a" font-size="10" text-anchor="middle">Both sides MUST pre-agree on baud rate (e.g. 9600, 115200 bps)</text>
  <text x="430" y="275" fill="#45475a" font-size="10" text-anchor="middle">No clock — any mismatch → garbled data ("framing error")</text>

</svg>
