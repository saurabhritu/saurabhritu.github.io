<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/></marker>
  </defs>
  <rect class="bg" width="680" height="260"/>
  <rect class="noiseLayer" width="680" height="260" filter="url(#paperNoise)"/>

  <!-- voltage labels -->
  <text x="30" y="62" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">3.3V</text>
  <text x="30" y="128" text-anchor="end" font-family="PT Mono" font-size="10" class="dot soft">0V</text>
  <line x1="34" y1="58" x2="660" y2="58" class="ink hair soft" stroke-dasharray="3 3" opacity="0.3"/>
  <line x1="34" y1="124" x2="660" y2="124" class="ink hair soft" stroke-dasharray="3 3" opacity="0.3"/>
  <text x="668" y="62" font-family="PT Mono" font-size="10" class="dot soft">HIGH</text>
  <text x="668" y="128" font-family="PT Mono" font-size="10" class="dot soft">LOW</text>

  <!-- ══ WAVEFORM for byte 0x55 = 01010101 (8N1) ══ -->
  <!-- idle(H) → START(L) → D0(1) → D1(0) → D2(1) → D3(0) → D4(1) → D5(0) → D6(1) → D7(0) → STOP(H) → idle(H) -->
  <polyline points="40,58 80,58 80,124 130,124 130,58 180,58 180,124 230,124 230,58 280,58 280,124 330,124 330,58 380,58 380,124 430,124 430,58 480,58 480,58 530,58 530,58 580,58"
    fill="none" class="ink" stroke-width="2.5" opacity="0.2"/>

  <!-- DIM waveform is background. Animated bright segments overlay it. -->
  <!-- idle HIGH (x=40→80) -->
  <line x1="40" y1="58" x2="80" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.02;0.08;0.10;1" values="0.2;0.7;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- START bit LOW (80→130) -->
  <line x1="80" y1="58" x2="80" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.08;0.09;0.10;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="80" y1="124" x2="130" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.09;0.11;0.17;0.19;1" values="0.2;0.2;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- D0=1 HIGH (130→180) -->
  <line x1="130" y1="124" x2="130" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.17;0.18;0.19;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="130" y1="58" x2="180" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.18;0.20;0.26;0.28;1" values="0.2;0.2;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- D1=0 LOW (180→230) -->
  <line x1="180" y1="58" x2="180" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.26;0.27;0.28;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="180" y1="124" x2="230" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.27;0.29;0.35;0.37;1" values="0.2;0.2;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- D2=1 HIGH (230→280) -->
  <line x1="230" y1="124" x2="230" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.35;0.36;0.37;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="230" y1="58" x2="280" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.36;0.38;0.44;0.46;1" values="0.2;0.2;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- D3=0 LOW (280→330) -->
  <line x1="280" y1="58" x2="280" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.44;0.45;0.46;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="280" y1="124" x2="330" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.45;0.47;0.53;0.55;1" values="0.2;0.2;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- D4=1 HIGH (330→380) -->
  <line x1="330" y1="124" x2="330" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.53;0.54;0.55;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="330" y1="58" x2="380" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.54;0.56;0.62;0.64;1" values="0.2;0.2;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- D5=0 LOW (380→430) -->
  <line x1="380" y1="58" x2="380" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.62;0.63;0.64;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="380" y1="124" x2="430" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.63;0.65;0.71;0.73;1" values="0.2;0.2;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- D6=1 HIGH (430→480) -->
  <line x1="430" y1="124" x2="430" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.71;0.72;0.73;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="430" y1="58" x2="480" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.72;0.74;0.80;0.82;1" values="0.2;0.2;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- D7=0 LOW (480→530) — wait, 0x55 D7=0 -->
  <line x1="480" y1="58" x2="480" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.80;0.81;0.82;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="480" y1="124" x2="530" y2="124" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.81;0.83;0.89;0.91;1" values="0.2;0.2;0.7;0.7;0.2;0.2"/>
  </line>
  <!-- STOP HIGH (530→580) -->
  <line x1="530" y1="124" x2="530" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.89;0.90;0.91;1" values="0.2;0.2;0.7;0.2;0.2"/>
  </line>
  <line x1="530" y1="58" x2="580" y2="58" class="ink fine" opacity="0.2">
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.90;0.92;0.99;1" values="0.2;0.2;0.7;0.7"/>
  </line>

  <!-- Travelling dot -->
  <circle r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.06;0.09;0.11;0.18;0.20;0.27;0.29;0.36;0.38;0.45;0.47;0.54;0.56;0.63;0.65;0.72;0.74;0.81;0.83;0.90;0.92;1"
      values="40;80;80;130;130;180;180;230;230;280;280;330;330;380;380;430;430;480;480;530;530;580;580"/>
    <animate attributeName="cy" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.06;0.09;0.11;0.18;0.20;0.27;0.29;0.36;0.38;0.45;0.47;0.54;0.56;0.63;0.65;0.72;0.74;0.81;0.83;0.90;0.92;1"
      values="58;58;124;124;58;58;124;124;58;58;124;124;58;58;124;124;58;58;124;124;58;58;58"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.04;0.92;1" dur="4.4s" repeatCount="indefinite"/>
  </circle>

  <!-- ══ BIT LABELS ══ -->
  <text x="60" y="144" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">idle</text>
  <text x="105" y="144" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot">START</text>
  <text x="155" y="44" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">D0=1</text>
  <text x="205" y="144" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">D1=0</text>
  <text x="255" y="44" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">D2=1</text>
  <text x="305" y="144" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">D3=0</text>
  <text x="355" y="44" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">D4=1</text>
  <text x="405" y="144" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">D5=0</text>
  <text x="455" y="44" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">D6=1</text>
  <text x="505" y="144" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">D7=0</text>
  <text x="555" y="44" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot">STOP</text>

  <!-- decoded value -->
  <text x="600" y="90" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot" opacity="0">
    → 0x55
    <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.85;0.88;0.98;1" values="0;0;0.7;0.7;0"/>
  </text>

  <!-- ══ BOTTOM ══ -->
  <line x1="34" y1="166" x2="580" y2="166" class="ink hair soft" marker-end="url(#arrow)"/>
  <text x="307" y="180" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">time → bits sent LSB first at agreed baud rate</text>

  <line x1="34" y1="198" x2="660" y2="198" class="ink hair soft" stroke-dasharray="5 3"/>

  <text x="340" y="218" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">byte 0x55 (01010101) — perfect for testing: alternating HIGH/LOW</text>
  <text x="340" y="236" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">8N1 = 8 data bits · no parity · 1 stop bit · most common format</text>
</svg>
