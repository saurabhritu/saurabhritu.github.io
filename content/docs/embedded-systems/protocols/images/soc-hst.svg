<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <pattern id="iso-grid" width="60" height="34.64" patternUnits="userSpaceOnUse" patternTransform="translate(0, 17.32)">
      <path d="M 0 17.32 L 30 0 L 60 17.32 L 30 34.64 Z" fill="none" stroke="#232635" stroke-width="0.5" />
    </pattern>

    <style>
      .bg { fill: #1a1a2e; }
      .text-label { font-family: 'Courier New', monospace; font-size: 14px; fill: #e0e6ed; font-weight: bold; text-anchor: middle; }
      .text-sub { font-family: 'Courier New', monospace; font-size: 11px; fill: #8a9bb4; text-anchor: middle; }
      
      /* Block Materials */
      .top-cyan { fill: #252840; stroke: #00e5ff; stroke-width: 1.5; stroke-linejoin: round; }
      .left-cyan { fill: #181a29; stroke: #00e5ff; stroke-width: 1.5; stroke-linejoin: round; }
      .right-cyan { fill: #1e2133; stroke: #00e5ff; stroke-width: 1.5; stroke-linejoin: round; }
      
      .top-orange { fill: #332222; stroke: #d95a00; stroke-width: 2; stroke-linejoin: round; }
      .left-orange { fill: #221515; stroke: #d95a00; stroke-width: 2; stroke-linejoin: round; }
      .right-orange { fill: #2a1a1a; stroke: #d95a00; stroke-width: 2; stroke-linejoin: round; }

      /* Paths */
      .bus-cyan { fill: none; stroke: #00e5ff; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; opacity: 0.6; }
      .bus-orange { fill: none; stroke: #d95a00; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; filter: drop-shadow(0 0 4px #d95a00); }
      
      /* Animations for the SVG */
      .flow-active { stroke-dasharray: 10; animation: flow 1s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -20; } }
      .pulse { animation: glow 2s ease-in-out infinite alternate; }
      @keyframes glow { from { filter: drop-shadow(0 0 2px #d95a00); } to { filter: drop-shadow(0 0 10px #d95a00); } }
    </style>

    <g id="cpu-block-cyan">
      <polygon class="left-cyan" points="-60,30 0,65 0,85 -60,50" />
      <polygon class="right-cyan" points="0,65 60,30 60,50 0,85" />
      <polygon class="top-cyan" points="0,-5 60,30 0,65 -60,30" />
      <polygon fill="none" stroke="#00e5ff" stroke-width="0.5" points="0,5 50,30 0,55 -50,30" opacity="0.5"/>
    </g>

    <g id="hst-block-orange">
      <polygon class="left-orange" points="-80,40 0,86 0,116 -80,70" />
      <polygon class="right-orange" points="0,86 80,40 80,70 0,116" />
      <polygon class="top-orange pulse" points="0,-6 80,40 0,86 -80,40" />
      <path d="M -40,17 L 40,63 M 40,17 L -40,63 M -60,28 L 0,63 L 60,28" stroke="#d95a00" stroke-width="1" fill="none" opacity="0.5"/>
    </g>
  </defs>

  <rect class="bg" width="100%" height="100%" />
  <rect fill="url(#iso-grid)" width="100%" height="100%" opacity="0.5" />

  <path class="bus-orange flow-active" d="M 300,320 L 500,435" />
  <polygon points="400,378 410,383 400,388 390,383" fill="#d95a00" /> <path class="bus-cyan" d="M 700,320 L 500,435" />
  
  <path class="bus-cyan" d="M 300,550 L 500,435" />

  <path class="bus-cyan" d="M 700,550 L 500,435" />

  <path class="bus-orange flow-active" d="M 500,435 L 500,200" />

  <g transform="translate(300, 320)">
    <use href="#cpu-block-cyan" />
    <text x="0" y="-20" class="text-label">CPU_CORE_0</text>
    <text x="0" y="-5" class="text-sub" fill="#d95a00">STATE: LR_ACTIVE</text>
  </g>

  <g transform="translate(700, 320)">
    <use href="#cpu-block-cyan" />
    <text x="0" y="-20" class="text-label">CPU_CORE_1</text>
    <text x="0" y="-5" class="text-sub">STATE: IDLE</text>
  </g>

  <g transform="translate(300, 550)">
    <use href="#cpu-block-cyan" />
    <text x="0" y="-20" class="text-label">CPU_CORE_2</text>
    <text x="0" y="-5" class="text-sub">STATE: IDLE</text>
  </g>

  <g transform="translate(700, 550)">
    <use href="#cpu-block-cyan" />
    <text x="0" y="-20" class="text-label">CPU_CORE_3</text>
    <text x="0" y="-5" class="text-sub">STATE: IDLE</text>
  </g>

  <g transform="translate(500, 150)">
    <polygon class="left-cyan" points="-80,40 0,86 0,116 -80,70" />
    <polygon class="right-cyan" points="0,86 80,40 80,70 0,116" />
    <polygon class="top-cyan" transform="translate(0, -30)" points="0,-6 80,40 0,86 -80,40" />
    <polygon class="top-cyan" transform="translate(0, -15)" points="0,-6 80,40 0,86 -80,40" opacity="0.8"/>
    <polygon class="top-orange" transform="translate(0, 0)" points="0,-6 80,40 0,86 -80,40" /> <text x="0" y="-50" class="text-label">L3 SHARED MEMORY</text>
    <text x="0" y="-35" class="text-sub">ADDR: 0x1A4 [LOCKED]</text>
  </g>

  <g transform="translate(500, 435)">
    <use href="#hst-block-orange" />
    <text x="0" y="-25" class="text-label" fill="#d95a00">HST_ARBITER</text>
    <text x="0" y="-10" class="text-sub">LOCK: CPU_0</text>
    
    <polygon points="0,-6 20,5 0,16 -20,5" fill="#d95a00" class="pulse" transform="translate(0, 35) scale(0.8)"/>
  </g>

</svg>
