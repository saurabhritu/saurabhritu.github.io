<svg width="100%" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise"><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      :root{--bg:#F7F4EE;--ink:#161616;--noise-opacity:0.85;--green:#E2EFED;--purple:#EBE6F5;--gray:#F0EFEC;--amber:#F5E9D0;--red:#F5E0E0;--blue:#E0EAF5}
      @media(prefers-color-scheme:dark){:root{--bg:#131313;--ink:#F3EFE7;--noise-opacity:0.18;--green:#1A2E28;--purple:#221E33;--gray:#1A1A19;--amber:#2E2619;--red:#2E1919;--blue:#192633}}
      .ink{stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}.fine{stroke-width:2}.hair{stroke-width:1.4}.dot{fill:var(--ink)}.bg{fill:var(--bg)}.soft{opacity:.5}.noiseLayer{opacity:var(--noise-opacity)}
      .fill-green{fill:var(--green)}.fill-purple{fill:var(--purple)}.fill-gray{fill:var(--gray)}.fill-amber{fill:var(--amber)}.fill-red{fill:var(--red)}.fill-blue{fill:var(--blue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" class="ink hair soft" fill="none"/></marker>
  </defs>
  <rect class="bg" width="700" height="380"/>
  <rect class="noiseLayer" width="700" height="380" filter="url(#paperNoise)"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-family="PT Mono" font-size="11" class="dot soft">Master writes to Slave 0x48</text>

  <!-- SDA label -->
  <text x="22" y="68" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="600" class="dot">SDA</text>

  <!-- idle before START -->
  <line x1="40" y1="64" x2="64" y2="64" class="ink hair soft"/>

  <!-- ══ FRAME CELLS ══ -->
  <!-- START -->
  <rect x="64" y="44" width="68" height="40" rx="5" class="fill-red ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.00;0.04;0.12;0.16;1" values="0.3;1;1;1;0.3;0.3"/>
  </rect>
  <text x="98" y="60" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">START</text>
  <text x="98" y="76" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">SDA↓ SCL HIGH</text>

  <!-- 0x48 ADDRESS -->
  <rect x="134" y="44" width="84" height="40" rx="5" class="fill-blue ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.12;0.16;0.28;0.32;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="176" y="60" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">0x48</text>
  <text x="176" y="76" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">7-bit address</text>

  <!-- W flag -->
  <rect x="220" y="44" width="56" height="40" rx="5" class="fill-amber ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.28;0.32;0.42;0.46;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="248" y="60" text-anchor="middle" font-family="PT Mono" font-size="12" font-weight="600" class="dot">W</text>
  <text x="248" y="76" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">0=W 1=R</text>

  <!-- ACK 1 -->
  <rect x="278" y="44" width="68" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.42;0.46;0.56;0.60;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="312" y="60" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">ACK</text>
  <text x="312" y="76" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">slave replies</text>
  <!-- ACK glow ring -->
  <rect x="278" y="44" width="68" height="40" rx="5" fill="none" class="ink" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.48;0.52;0.58;0.62;1" values="0;0;0.7;0.7;0;0"/>
  </rect>

  <!-- DATA -->
  <rect x="348" y="44" width="90" height="40" rx="5" class="fill-purple ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.56;0.60;0.72;0.76;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="393" y="60" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">data…</text>
  <text x="393" y="76" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">8-bit payload</text>

  <!-- ACK 2 -->
  <rect x="440" y="44" width="68" height="40" rx="5" class="fill-green ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.72;0.76;0.86;0.90;1" values="0.3;0.3;1;1;0.3;0.3"/>
  </rect>
  <text x="474" y="60" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">ACK</text>
  <text x="474" y="76" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">confirmed</text>

  <!-- STOP -->
  <rect x="510" y="44" width="68" height="40" rx="5" class="fill-red ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.86;0.90;0.98;1" values="0.3;0.3;1;1;0.3"/>
  </rect>
  <text x="544" y="60" text-anchor="middle" font-family="PT Mono" font-size="11" font-weight="500" class="dot">STOP</text>
  <text x="544" y="76" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">SDA↑ SCL HIGH</text>

  <!-- idle after STOP -->
  <line x1="578" y1="64" x2="620" y2="64" class="ink hair soft"/>

  <!-- ══ TRAVELLING PACKET ══ -->
  <circle cy="64" r="4" fill="var(--ink)" opacity="0">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.06;0.19;0.35;0.49;0.63;0.79;0.92;1"
      values="40;98;176;248;312;393;474;544;620"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.04;0.94;1" values="0;0.7;0.7;0"/>
  </circle>

  <!-- ══ WHO'S TALKING labels (above cells) ══ -->
  <text x="176" y="34" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft" opacity="0">
    ← Master
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.14;0.16;0.42;0.44;1" values="0;0;0.7;0.7;0;0"/>
  </text>
  <text x="312" y="34" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft" opacity="0">
    ← Slave 0x48
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.44;0.46;0.58;0.60;1" values="0;0;0.7;0.7;0;0"/>
  </text>

  <!-- ══ ANNOTATION LINES ══ -->
  <!-- 0x48 drop -->
  <line x1="176" y1="84" x2="176" y2="136" class="ink hair soft" stroke-dasharray="3 2"/>
  <line x1="176" y1="136" x2="450" y2="136" class="ink hair soft" stroke-dasharray="3 2"/>
  <text x="455" y="138" font-family="PT Mono" font-size="10" class="dot soft">7-bit address → ALL devices</text>
  <text x="455" y="152" font-family="PT Mono" font-size="10" class="dot soft">only 0x48 responds</text>

  <!-- W drop -->
  <line x1="248" y1="84" x2="248" y2="162" class="ink hair soft" stroke-dasharray="3 2"/>
  <line x1="248" y1="162" x2="450" y2="168" class="ink hair soft" stroke-dasharray="3 2"/>
  <text x="455" y="170" font-family="PT Mono" font-size="10" class="dot soft">Write(0) or Read(1)</text>

  <!-- ACK drop -->
  <line x1="312" y1="84" x2="312" y2="188" class="ink hair soft" stroke-dasharray="3 2"/>
  <line x1="312" y1="188" x2="450" y2="194" class="ink hair soft" stroke-dasharray="3 2"/>
  <text x="455" y="196" font-family="PT Mono" font-size="10" class="dot soft">Slave pulls SDA low:</text>
  <text x="455" y="210" font-family="PT Mono" font-size="10" class="dot soft">"I'm here! Go ahead."</text>

  <!-- ══ SLAVE RESPONSE BOXES ══ -->
  <rect x="40" y="100" width="76" height="28" rx="4" class="fill-gray ink hair" opacity="0.5"/>
  <text x="78" y="110" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">Slave 0x3C</text>
  <text x="78" y="124" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">silent</text>

  <rect x="122" y="100" width="76" height="28" rx="4" class="fill-gray ink hair" opacity="0.5"/>
  <text x="160" y="110" text-anchor="middle" font-family="PT Mono" font-size="9" class="dot soft">Slave 0x72</text>
  <text x="160" y="124" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot soft">silent</text>

  <rect x="204" y="100" width="86" height="28" rx="4" class="fill-green ink hair">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.44;0.48;0.58;0.62;1" values="0.5;0.5;1;1;0.5;0.5"/>
  </rect>
  <text x="247" y="110" text-anchor="middle" font-family="PT Mono" font-size="9" font-weight="500" class="dot">Slave 0x48</text>
  <text x="247" y="124" text-anchor="middle" font-family="PT Mono" font-size="8" class="dot">ACK ← match!</text>

  <text x="310" y="114" font-family="PT Mono" font-size="9" class="dot soft">…others stay silent</text>

  <!-- ══ BOTTOM PANEL ══ -->
  <rect x="30" y="232" width="640" height="110" rx="6" class="fill-gray ink hair"/>

  <rect x="42" y="244" width="10" height="10" rx="2" class="fill-amber ink hair"/>
  <text x="58" y="252" font-family="PT Mono" font-size="11" font-weight="500" class="dot">Half-duplex</text>
  <text x="156" y="252" font-family="PT Mono" font-size="11" class="dot soft">— one direction at a time</text>

  <rect x="42" y="264" width="10" height="10" rx="2" class="fill-blue ink hair"/>
  <text x="58" y="272" font-family="PT Mono" font-size="11" font-weight="500" class="dot">Open-drain</text>
  <text x="148" y="272" font-family="PT Mono" font-size="11" class="dot soft">— devices only PULL LOW</text>

  <rect x="42" y="284" width="10" height="10" rx="2" class="fill-green ink hair"/>
  <text x="58" y="292" font-family="PT Mono" font-size="11" font-weight="500" class="dot">Pull-up R</text>
  <text x="138" y="292" font-family="PT Mono" font-size="11" class="dot soft">— float back HIGH when released</text>

  <line x1="42" y1="304" x2="658" y2="304" class="ink hair soft" stroke-dasharray="5 3"/>
  <text x="350" y="322" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">ACK = slave pulls SDA LOW for 1 bit  ·  NACK = SDA stays HIGH (absent/busy)</text>

  <!-- bottom text -->
  <text x="350" y="358" text-anchor="middle" font-family="PT Mono" font-size="10" class="dot soft">I2C group-chat protocol · 7-bit address · up to 127 devices on 2 wires</text>
</svg>
