<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      /* Soft, low-attention motion */
      .entropyA { animation: driftA 14s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .entropyB { animation: driftB 18s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .entropyC { animation: driftC 16s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .dividerFlow { animation: dividerBreath 12s ease-in-out infinite; }
      .gridBreath { animation: gridBreath 10s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .gridGlow { animation: gridGlow 11s ease-in-out infinite; }
      .accentFloat { animation: accentFloat 13s ease-in-out infinite; }

      @keyframes driftA {
        0%, 100% { transform: translate(0px, 0px); opacity: 1; }
        50% { transform: translate(5px, -4px); opacity: 0.88; }
      }
      @keyframes driftB {
        0%, 100% { transform: translate(0px, 0px); opacity: 1; }
        50% { transform: translate(-6px, 5px); opacity: 0.84; }
      }
      @keyframes driftC {
        0%, 100% { transform: translate(0px, 0px); opacity: 1; }
        50% { transform: translate(3px, 6px); opacity: 0.9; }
      }
      @keyframes dividerBreath {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.7; }
      }
      @keyframes gridBreath {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.006); opacity: 0.96; }
      }
      @keyframes gridGlow {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 0.72; }
      }
      @keyframes accentFloat {
        0%, 100% { transform: translateY(0px); opacity: 0.55; }
        50% { transform: translateY(-3px); opacity: 0.75; }
      }

      /* Respect reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .entropyA, .entropyB, .entropyC, .dividerFlow, .gridBreath, .gridGlow, .accentFloat {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <path class="ink hair soft dividerFlow" d="M798 190 C804 315, 794 470, 801 710"/>

  <!-- left: entropy / scattered dots -->
  <g>
    <circle class="dot fade entropyA" cx="254" cy="222" r="4.4"/>
    <circle class="dot entropyB" cx="318" cy="268" r="3.2"/>
    <circle class="dot soft entropyC" cx="182" cy="310" r="5.1"/>
    <circle class="dot entropyA" cx="388" cy="206" r="2.8"/>
    <circle class="dot fade entropyB" cx="454" cy="286" r="4.9"/>
    <circle class="dot soft entropyC" cx="530" cy="236" r="3.3"/>
    <circle class="dot entropyA" cx="598" cy="322" r="5.4"/>
    <circle class="dot fade entropyB" cx="246" cy="392" r="3.7"/>
    <circle class="dot soft entropyC" cx="342" cy="360" r="2.9"/>
    <circle class="dot entropyA" cx="425" cy="420" r="5.3"/>
    <circle class="dot fade entropyB" cx="516" cy="374" r="3.1"/>
    <circle class="dot soft entropyC" cx="620" cy="432" r="4.6"/>
    <circle class="dot entropyA" cx="210" cy="514" r="5.0"/>
    <circle class="dot fade entropyB" cx="290" cy="474" r="3.3"/>
    <circle class="dot soft entropyC" cx="372" cy="548" r="4.2"/>
    <circle class="dot entropyA" cx="470" cy="496" r="2.8"/>
    <circle class="dot fade entropyB" cx="562" cy="560" r="5.2"/>
    <circle class="dot soft entropyC" cx="650" cy="508" r="3.4"/>
    <circle class="dot entropyA" cx="244" cy="654" r="4.1"/>
    <circle class="dot fade entropyB" cx="336" cy="610" r="5.0"/>
    <circle class="dot soft entropyC" cx="430" cy="674" r="3.1"/>
    <circle class="dot entropyA" cx="518" cy="626" r="4.7"/>
    <circle class="dot fade entropyB" cx="612" cy="692" r="3.0"/>

    <path class="ink hair soft accentFloat" d="M150 260 q 9 -6 16 2"/>
    <path class="ink hair soft accentFloat" d="M530 466 q 8 7 16 -1"/>
    <path class="ink hair soft accentFloat" d="M348 186 q 7 -7 13 1"/>
    <path class="ink hair soft accentFloat" d="M640 246 q 9 5 15 -3"/>
    <path class="ink hair soft accentFloat" d="M214 592 q 8 -5 12 2"/>
  </g>

  <!-- transition marks near divider -->
  <g class="soft">
    <circle class="dot entropyA" cx="726" cy="292" r="2.8"/>
    <circle class="dot entropyB" cx="742" cy="350" r="2.1"/>
    <circle class="dot entropyC" cx="754" cy="408" r="2.5"/>
    <circle class="dot entropyA" cx="736" cy="480" r="2.3"/>
    <circle class="dot entropyB" cx="752" cy="548" r="2.0"/>
    <circle class="dot entropyC" cx="728" cy="620" r="2.7"/>
  </g>

  <!-- right: structured grid -->
  <g transform="translate(910 215)" class="gridBreath">
    <path class="ink fine soft gridGlow" d="M0 0 C132 6, 273 -4, 408 2 C414 118, 412 242, 408 366 C276 371, 134 370, 2 364 C-4 244, -3 124, 0 0 Z"/>

    <path class="ink hair" d="M68 22 C66 130, 70 238, 67 343"/>
    <path class="ink hair" d="M136 18 C133 128, 139 236, 135 344"/>
    <path class="ink hair" d="M204 22 C202 130, 206 238, 203 346"/>
    <path class="ink hair" d="M272 17 C269 127, 274 236, 271 344"/>
    <path class="ink hair" d="M340 22 C337 130, 342 238, 339 345"/>

    <path class="ink hair" d="M18 60 C142 57, 270 62, 391 59"/>
    <path class="ink hair" d="M17 118 C142 114, 270 120, 392 117"/>
    <path class="ink hair" d="M18 176 C143 172, 270 179, 392 175"/>
    <path class="ink hair" d="M18 234 C143 230, 270 236, 392 233"/>
    <path class="ink hair" d="M17 292 C142 288, 270 294, 392 291"/>

    <circle class="dot soft gridGlow" cx="67" cy="59" r="1.9"/>
    <circle class="dot soft gridGlow" cx="203" cy="175" r="1.9"/>
    <circle class="dot soft gridGlow" cx="339" cy="291" r="1.9"/>
    <circle class="dot soft gridGlow" cx="271" cy="117" r="1.9"/>
  </g>

  <path class="ink hair soft accentFloat" d="M884 170 q 10 4 18 -2"/>
  <path class="ink hair soft accentFloat" d="M1324 655 q 11 -6 19 2"/>
</svg>
