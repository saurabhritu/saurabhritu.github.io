<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="55" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      .sway { animation: sway 12s ease-in-out infinite; transform-box: fill-box; transform-origin: bottom; }

      @keyframes sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(1deg); }
      }

      @media (prefers-reduced-motion: reduce) {
        .sway { animation: none !important; }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <!-- Pillars -->
  <g transform="translate(400 650)">
    <!-- Pillar 1: Confidentiality -->
    <g class="sway">
      <path class="ink fine" d="M-100 0 v-300 h200 v300" />
      <text x="0" y="-330" font-family="PT Mono" font-size="24" text-anchor="middle" class="dot">Confidentiality</text>
      <path class="ink hair soft" d="M-80 -280 h160 M-80 -240 h160 M-80 -200 h160" />
    </g>

    <!-- Pillar 2: Integrity -->
    <g transform="translate(400 0)" class="sway" style="animation-delay: -3s">
      <path class="ink fine" d="M-100 0 v-400 h200 v400" />
      <text x="0" y="-430" font-family="PT Mono" font-size="24" text-anchor="middle" class="dot">Integrity</text>
      <circle class="ink hair soft" cx="0" cy="-200" r="50" />
    </g>

    <!-- Pillar 3: Authentication -->
    <g transform="translate(800 0)" class="sway" style="animation-delay: -6s">
      <path class="ink fine" d="M-100 0 v-350 h200 v350" />
      <text x="0" y="-380" font-family="PT Mono" font-size="24" text-anchor="middle" class="dot">Authentication</text>
      <path class="ink hair soft" d="M-50 -250 l50 -50 l50 50 l-50 50 z" />
    </g>

    <!-- Base -->
    <path class="ink fine" d="M-200 0 h1200" />
  </g>

  <text x="800" y="150" font-family="PT Mono" font-size="36" text-anchor="middle" class="dot">The Three Pillars of Cryptography</text>
</svg>
