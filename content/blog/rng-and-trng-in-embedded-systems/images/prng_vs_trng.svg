<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="22" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      .float { animation: none !important; transform-box: fill-box; transform-origin: center; }
      .sequence { animation: none !important; }
      .noise { animation: none !important; }

      @keyframes float {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(6px, -4px); }
      }
      @keyframes sequence {
        0% { transform: translateX(0); }
        100% { transform: translateX(-300px); }
      }
      @keyframes noise {
        0% { opacity: 0.4; }
        100% { opacity: 0.8; }
      }

      @media (prefers-reduced-motion: reduce) {
        .float, .sequence, .noise { animation: none !important; }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <!-- Left: PRNG (Formulaic) -->
  <!-- NOTE: keep static translate on outer <g>; animate inner <g> for mobile browser compatibility -->
  <g transform="translate(200 200)">
    <g class="float">
      <path class="ink fine" d="M0 0 h400 v500 h-400 z" />
      <text x="200" y="-30" font-family="PT Mono" font-size="30" text-anchor="middle" class="dot">PRNG (Deterministic)</text>
      
      <g transform="translate(50 100)">
        <text x="0" y="0" font-family="PT Mono" font-size="22" class="dot">Seed -> [f(x)] -> Output</text>
        <path class="ink hair soft" d="M0 30 h300" />
        
        <g transform="translate(0 100)" class="sequence">
          <text x="-30" y="0" font-family="PT Mono" font-size="18" class="dot">42, 107, 8, 215, 42, 107, 8, 215...</text>
        </g>
      </g>
      <path class="ink hair soft" d="M50 350 q 150 20 300 0" />
      <text x="200" y="424" font-family="PT Mono" font-size="18" text-anchor="middle" class="dot soft">Repeatable &amp; Predictable</text>
    </g>
  </g>

  <!-- Right: TRNG (Physical) -->
  <!-- NOTE: keep static translate on outer <g>; animate inner <g> for mobile browser compatibility -->
  <g transform="translate(1000 200)">
    <g class="float" style="animation-delay: -2s">
      <path class="ink fine" d="M0 0 h400 v500 h-400 z" />
      <text x="200" y="-30" font-family="PT Mono" font-size="30" text-anchor="middle" class="dot">TRNG (Entropy)</text>
      
      <g transform="translate(50 100)">
        <text x="0" y="0" font-family="PT Mono" font-size="22" class="dot">Physical Noise Source</text>
        
        <!-- Random dots that pulse/noise -->
        <g class="noise">
          <circle class="dot" cx="50" cy="150" r="4" />
          <circle class="dot" cx="120" cy="120" r="3" />
          <circle class="dot" cx="180" cy="180" r="5" />
          <circle class="dot" cx="250" cy="130" r="2" />
          <circle class="dot" cx="80" cy="220" r="4" />
          <circle class="dot" cx="210" cy="240" r="6" />
          <circle class="dot" cx="150" cy="280" r="3" />
          <circle class="dot" cx="280" cy="210" r="4" />
        </g>
      </g>
      <path class="ink hair soft" d="M50 350 q 150 -20 300 0" />
      <text x="200" y="424" font-family="PT Mono" font-size="18" text-anchor="middle" class="dot soft">Unpredictable Physics</text>
    </g>
  </g>

  <!-- Arrows -->
  <path class="ink hair soft" d="M700 450 l100 0" />
</svg>
