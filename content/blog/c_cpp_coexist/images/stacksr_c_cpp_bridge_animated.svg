<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      .float { animation: float 12s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .floatAlt { animation: floatAlt 15s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .pulse { animation: pulse 10s ease-in-out infinite; }

      @keyframes float {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(4px, -6px); }
      }
      @keyframes floatAlt {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-5px, 4px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.7; }
      }

      @media (prefers-reduced-motion: reduce) {
        .float, .floatAlt, .pulse { animation: none !important; }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <!-- Left Side: C (Simple, Structural) -->
  <g class="float" transform="translate(150 50)">
    <path class="ink fine" d="M100 250 h250 v250 h-250 z" />
    <path class="ink hair soft" d="M115 265 h220 v220 h-220 z" />
    <path class="ink hair" d="M100 330 h250" />
    <path class="ink hair" d="M100 410 h250" />
    <text x="225" y="560" font-family="PT Mono" font-size="42" text-anchor="middle" class="dot">struct data</text>
  </g>

  <!-- Bridge: extern "C" -->
  <g class="pulse">
    <path class="ink fine soft" d="M550 450 q 250 -50 500 0" />
    <path class="ink hair" d="M550 465 q 250 -50 500 0" />
    <text x="800" y="400" font-family="PT Mono" font-size="52" text-anchor="middle" class="dot">extern "C"</text>
  </g>

  <!-- Right Side: C++ (Complex, Layered) -->
  <g class="floatAlt" transform="translate(-100 50)">
    <circle class="ink fine" cx="1300" cy="375" r="120" />
    <circle class="ink hair soft" cx="1300" cy="375" r="90" />
    <circle class="ink hair" cx="1300" cy="375" r="50" />
    <path class="ink hair" d="M1180 375 h240" />
    <path class="ink hair" d="M1300 255 v240" />
    <text x="1300" y="560" font-family="PT Mono" font-size="42" text-anchor="middle" class="dot">class Object</text>
  </g>

  <!-- Decorative elements -->
  <circle class="dot soft" cx="800" cy="150" r="4" />
  <circle class="dot soft" cx="800" cy="750" r="4" />
</svg>
