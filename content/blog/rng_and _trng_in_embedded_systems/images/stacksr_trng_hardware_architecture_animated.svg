<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="33" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      .flow { animation: flow 10s linear infinite; }
      .pulse { animation: pulse 4s ease-in-out infinite; }
      .shake { animation: shake 0.2s linear infinite; }

      @keyframes flow {
        0% { stroke-dashoffset: 40; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      @keyframes shake {
        0% { transform: translate(0, 0); }
        50% { transform: translate(1px, -1px); }
        100% { transform: translate(-1px, 1px); }
      }

      @media (prefers-reduced-motion: reduce) {
        .flow, .pulse, .shake { animation: none !important; }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <!-- Architecture Flow -->
  <g transform="translate(100 350)">
    <!-- Stage 1: Noise Source -->
    <g transform="translate(0 0)">
      <rect class="ink fine" width="250" height="200" rx="8" />
      <text x="125" y="100" font-family="PT Mono" font-size="32" text-anchor="middle" class="dot">Noise Source</text>
      <text x="125" y="140" font-family="PT Mono" font-size="22" text-anchor="middle" class="dot soft">(Oscillator Jitter)</text>
      <path class="ink hair shake" d="M50 170 q 50 -20 150 0" />
    </g>

    <!-- Arrow 1 -->
    <path class="ink hair flow" d="M250 100 h100" stroke-dasharray="10 10" />

    <!-- Stage 2: Conditioner -->
    <g transform="translate(350 0)">
      <rect class="ink fine" width="250" height="200" rx="8" />
      <text x="125" y="100" font-family="PT Mono" font-size="32" text-anchor="middle" class="dot">Conditioner</text>
      <text x="125" y="140" font-family="PT Mono" font-size="22" text-anchor="middle" class="dot soft">(SHA-256 / AES)</text>
    </g>

    <!-- Arrow 2 -->
    <path class="ink hair flow" d="M600 100 h100" stroke-dasharray="10 10" />

    <!-- Stage 3: Health Monitor -->
    <g transform="translate(700 0)">
      <rect class="ink fine" width="250" height="200" rx="8" />
      <text x="125" y="100" font-family="PT Mono" font-size="32" text-anchor="middle" class="dot">Health Monitor</text>
      <path class="ink fine pulse" d="M50 150 l20 -40 l30 80 l30 -100 l30 120 l20 -60" />
    </g>

    <!-- Arrow 3 -->
    <path class="ink hair flow" d="M950 100 h100" stroke-dasharray="10 10" />

    <!-- Output -->
    <g transform="translate(1050 0)">
      <rect class="ink fine" width="250" height="200" rx="8" />
      <text x="125" y="100" font-family="PT Mono" font-size="32" text-anchor="middle" class="dot">Entropy Pool</text>
      <text x="125" y="140" font-family="PT Mono" font-size="22" text-anchor="middle" class="dot soft">(Pure Randomness)</text>
    </g>
  </g>

  <text x="800" y="200" font-family="PT Mono" font-size="52" text-anchor="middle" class="dot">TRNG Hardware Pipeline</text>
</svg>
