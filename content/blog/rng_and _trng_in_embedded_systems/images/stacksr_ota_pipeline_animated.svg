<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="99" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      .march { animation: march 1s linear infinite; }
      .blink { animation: blink 2s ease-in-out infinite; }
      .float { animation: float 10s ease-in-out infinite; }

      @keyframes march {
        0% { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      @media (prefers-reduced-motion: reduce) {
        .march, .blink, .float { animation: none !important; }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <!-- Pipeline Stages - Centered -->
  <g transform="translate(150 400)">
    
    <!-- Cloud / Server -->
    <g transform="translate(0, -20)" class="float">
       <path class="ink fine soft" d="M20 60 q 0 -40 40 -40 q 20 -20 50 0 q 40 -20 60 20 q 40 0 40 40 z" />
       <text x="105" y="120" font-family="PT Mono" font-size="32" text-anchor="middle" class="dot">Cloud Server</text>
    </g>

    <!-- Initial Arrow -->
    <path class="ink hair march" d="M210 50 h100" stroke-dasharray="5 5" />

    <!-- Stage 1: Download -->
    <g transform="translate(310 0)">
      <path class="ink fine" d="M0 0 h150 v100 h-150 z" />
      <path class="ink hair march" d="M75 120 v50" stroke-dasharray="5 5" />
      <text x="75" y="60" font-family="PT Mono" font-size="32" text-anchor="middle" class="dot">HTTPS DL</text>
    </g>

    <!-- Arrow 1 -->
    <path class="ink hair march" d="M460 50 h90" stroke-dasharray="5 5" />

    <!-- Stage 2: Hashing -->
    <g transform="translate(550 0)">
      <path class="ink fine" d="M0 0 h150 v100 h-150 z" />
      <text x="75" y="60" font-family="PT Mono" font-size="32" text-anchor="middle" class="dot">SHA-256</text>
    </g>

    <!-- Arrow 2 -->
    <path class="ink hair march" d="M700 50 h90" stroke-dasharray="5 5" />

    <!-- Stage 3: Verification -->
    <g transform="translate(790 0)">
      <path class="ink fine" d="M0 0 h150 v100 h-150 z" />
      <text x="75" y="60" font-family="PT Mono" font-size="32" text-anchor="middle" class="dot">Signature</text>
      <!-- Shield icon -->
      <path class="ink hair soft blink" d="M60 130 q 15 10 30 0 v30 q -15 15 -30 0 z" />
    </g>

    <!-- Arrow 3 -->
    <path class="ink hair march" d="M940 50 h90" stroke-dasharray="5 5" />

    <!-- Stage 4: Flash -->
    <g transform="translate(1030 0)">
      <path class="ink fine" d="M0 0 h150 v100 h-150 z" />
      <path class="ink hair" d="M20 20 h110 v60 h-110 z" />
      <text x="75" y="60" font-family="PT Mono" font-size="32" text-anchor="middle" class="dot">Flash</text>
    </g>

    <!-- Final Success Icon -->
    <g transform="translate(1180, 50)" class="blink">
      <path class="ink fine" d="M20 0 l20 20 l40 -40" />
    </g>
    
    <!-- Foundation Line -->
    <path class="ink hair soft" d="M0 280 h1300" />
    <text x="650" y="330" font-family="PT Mono" font-size="36" text-anchor="middle" class="dot">Secure operations seeded by TRNG</text>
  </g>

  <text x="800" y="150" font-family="PT Mono" font-size="52" text-anchor="middle" class="dot">Secure OTA Update Pipeline</text>
</svg>
