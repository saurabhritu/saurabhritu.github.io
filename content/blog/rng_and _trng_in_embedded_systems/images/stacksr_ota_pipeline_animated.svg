<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="99" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      .march { animation: march 1s linear infinite; }
      .blink { animation: blink 2s ease-in-out infinite; }

      @keyframes march {
        0% { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      @media (prefers-reduced-motion: reduce) {
        .march, .blink { animation: none !important; }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <!-- Pipeline Stages -->
  <g transform="translate(100 400)">
    <!-- Stage 1: Download -->
    <g>
      <path class="ink fine" d="M0 0 h150 v100 h-150 z" />
      <path class="ink hair march" d="M75 120 v50" stroke-dasharray="5 5" />
      <text x="75" y="55" font-family="PT Mono" font-size="18" text-anchor="middle" class="dot">HTTPS DL</text>
    </g>

    <!-- Arrow -->
    <path class="ink hair march" d="M150 50 h100" stroke-dasharray="5 5" />

    <!-- Stage 2: Hashing -->
    <g transform="translate(250 0)">
      <path class="ink fine" d="M0 0 h150 v100 h-150 z" />
      <text x="75" y="55" font-family="PT Mono" font-size="18" text-anchor="middle" class="dot">SHA-256</text>
    </g>

    <!-- Arrow -->
    <path class="ink hair march" d="M400 50 h100" stroke-dasharray="5 5" />

    <!-- Stage 3: Verification -->
    <g transform="translate(500 0)">
      <path class="ink fine" d="M0 0 h150 v100 h-150 z" />
      <text x="75" y="55" font-family="PT Mono" font-size="18" text-anchor="middle" class="dot">Signature</text>
      <circle class="ink hair blink" cx="75" cy="130" r="15" />
    </g>

    <!-- Arrow -->
    <path class="ink hair march" d="M650 50 h100" stroke-dasharray="5 5" />

    <!-- Stage 4: Flash -->
    <g transform="translate(750 0)">
      <path class="ink fine" d="M0 0 h150 v100 h-150 z" />
      <path class="ink hair" d="M20 20 h110 v60 h-110 z" />
      <text x="75" y="55" font-family="PT Mono" font-size="18" text-anchor="middle" class="dot">Flash</text>
    </g>
    
    <!-- Foundation -->
    <path class="ink hair soft" d="M0 250 h900" />
    <text x="450" y="290" font-family="PT Mono" font-size="20" text-anchor="middle" class="dot">All seeded by Hardware TRNG</text>
  </g>

  <text x="800" y="150" font-family="PT Mono" font-size="36" text-anchor="middle" class="dot">Secure OTA Update Pipeline</text>
</svg>
