<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      .attack { animation: attack 3s infinite; }
      .shield { animation: shield 6s ease-in-out infinite; }

      @keyframes attack {
        0% { transform: translateX(0); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateX(300px); opacity: 0; }
      }
      @keyframes shield {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }

      @media (prefers-reduced-motion: reduce) {
        .attack, .shield { animation: none !important; }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <!-- Shielded Device -->
  <g transform="translate(1000 450)" class="shield">
    <path class="ink fine" d="M-100 -150 q 100 -50 200 0 v200 q -100 100 -200 0 z" />
    <rect class="ink hair" x="-40" y="-40" width="80" height="80" rx="4" />
    <text x="0" y="150" font-family="PT Mono" font-size="24" text-anchor="middle" class="dot">Protected Device</text>
  </g>

  <!-- Attacks -->
  <g transform="translate(400 450)">
    <g class="attack">
      <path class="ink fine" d="M0 -100 l50 0" stroke="#f05a30" />
      <text x="0" y="-120" font-family="PT Mono" font-size="16" class="dot" fill="#f05a30">Replay Attack</text>
    </g>
    <g class="attack" style="animation-delay: 1s">
      <path class="ink fine" d="M0 0 l50 0" stroke="#f05a30" />
      <text x="0" y="-20" font-family="PT Mono" font-size="16" class="dot" fill="#f05a30">MITM</text>
    </g>
    <g class="attack" style="animation-delay: 2s">
      <path class="ink fine" d="M0 100 l50 0" stroke="#f05a30" />
      <text x="0" y="80" font-family="PT Mono" font-size="16" class="dot" fill="#f05a30">Tampering</text>
    </g>
  </g>

  <text x="800" y="150" font-family="PT Mono" font-size="36" text-anchor="middle" class="dot">The IoT Threat Landscape</text>
</svg>
