<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="77" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      .attack { animation: attackFlow 4s linear infinite; }
      .pulse { animation: shieldPulse 5s ease-in-out infinite; }
      .float { animation: float 8s ease-in-out infinite; }

      @keyframes attackFlow {
        0% { stroke-dashoffset: 40; opacity: 0.4; }
        50% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0.4; }
      }
      @keyframes shieldPulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.02); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      @media (prefers-reduced-motion: reduce) {
        .attack, .pulse, .float { animation: none !important; }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <!-- Title — reduced font size to avoid crowding -->
  <text x="800" y="70" font-family="PT Mono" font-size="30" text-anchor="middle" class="dot">The IoT Threat Landscape</text>

  <!-- Protected Ecosystem (Centered) -->
  <g transform="translate(800 470)" class="float">
    <!-- Shield Perimeter -->
    <circle class="ink fine soft pulse" cx="0" cy="0" r="280" stroke-dasharray="10 10" />

    <!-- Central Device — bigger box, bigger text -->
    <g transform="translate(-140 -90)">
      <rect class="ink fine" width="280" height="180" rx="12" />
      <text x="140" y="82" font-family="PT Mono" font-size="30" text-anchor="middle" class="dot">Edge Device</text>
      <text x="140" y="118" font-family="PT Mono" font-size="20" text-anchor="middle" class="dot soft">TRNG-Seeded</text>
    </g>

    <!-- Cloud Icon Above — bigger box + text -->
    <g transform="translate(-75 -260)">
      <path class="ink hair soft" d="M0 40 q 0 -36 36 -36 q 18 -18 50 0 q 36 -18 62 18 q 36 0 36 36 z" />
      <text x="75" y="85" font-family="PT Mono" font-size="20" text-anchor="middle" class="dot">Cloud</text>
    </g>

    <!-- Mobile App Below — bigger box + text -->
    <g transform="translate(-55 145)">
      <rect class="ink hair soft" width="110" height="150" rx="10" />
      <text x="55" y="185" font-family="PT Mono" font-size="20" text-anchor="middle" class="dot">Mobile</text>
    </g>
  </g>

  <!-- ── Attacks — all positioned in absolute coords to avoid rotation-induced text chaos ── -->

  <!-- Mid Left: Replay Attack (purely horizontal, leftward arrow) -->
  <g>
    <line class="ink fine attack" x1="170" y1="470" x2="500" y2="470" stroke="#f05a30" stroke-dasharray="8 8" />
    <text x="100" y="458" font-family="PT Mono" font-size="22" text-anchor="start" class="dot" fill="#f05a30">Replay Attack</text>
  </g>

  <!-- Top Left: MITM Attack (~-30° angle) -->
  <g>
    <line class="ink fine attack" x1="230" y1="220" x2="540" y2="360" stroke="#f05a30" stroke-dasharray="8 8" />
    <text x="110" y="215" font-family="PT Mono" font-size="22" text-anchor="start" class="dot" fill="#f05a30">MITM Attack</text>
  </g>

  <!-- Top: Physical Probe (near-vertical, slight angle to avoid heading overlap) -->
  <g>
    <line class="ink fine attack" x1="750" y1="135" x2="770" y2="200" stroke="#f05a30" stroke-dasharray="8 8" />
    <text x="540" y="130" font-family="PT Mono" font-size="22" text-anchor="start" class="dot" fill="#f05a30">Physical Probe</text>
  </g>

  <!-- Top Right: OTA Injection (~30° angle) -->
  <g>
    <line class="ink fine attack" x1="1060" y1="220" x2="1000" y2="360" stroke="#f05a30" stroke-dasharray="8 8" />
    <text x="1000" y="210" font-family="PT Mono" font-size="22" text-anchor="start" class="dot" fill="#f05a30">OTA Injection</text>
  </g>

  <!-- Mid Right: Eavesdropping (purely horizontal, rightward arrow) -->
  <g>
    <line class="ink fine attack" x1="1430" y1="470" x2="1100" y2="470" stroke="#f05a30" stroke-dasharray="8 8" />
    <text x="1150" y="458" font-family="PT Mono" font-size="22" text-anchor="start" class="dot" fill="#f05a30">Eavesdropping</text>
  </g>
</svg>
