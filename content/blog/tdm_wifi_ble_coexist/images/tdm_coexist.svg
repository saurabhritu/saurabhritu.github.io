<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <style>
      :root {
        --bg: #F7F4EE;
        --ink: #161616;
        --noise-opacity: 0.85;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131313;
          --ink: #F3EFE7;
          --noise-opacity: 0.18;
        }
      }

      .ink { stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; }
      .fine { stroke-width: 2.2; }
      .hair { stroke-width: 1.6; }
      .dot { fill: var(--ink); }
      .bg { fill: var(--bg); }
      .fade { opacity: 0.78; }
      .soft { opacity: 0.55; }
      .noiseLayer { opacity: var(--noise-opacity); }

      .wave { animation: none !important; }
      .pulse { animation: none !important; }
      .slot { animation: none !important; }

      @keyframes wave {
        0%, 100% { transform: translateY(0); opacity: 0.4; }
        50% { transform: translateY(-10px); opacity: 0.8; }
      }
      @keyframes pulse {
        0%, 100% { r: 4; opacity: 0.3; }
        50% { r: 12; opacity: 0.7; }
      }
      @keyframes slot {
        0% { transform: translateX(0); }
        100% { transform: translateX(-400px); }
      }

      @media (prefers-reduced-motion: reduce) {
        .wave, .pulse, .slot { animation: none !important; }
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="noiseLayer" width="1600" height="900" filter="url(#paperNoise)"/>

  <!-- Wi-Fi Waves -->
  <g class="wave">
    <path class="ink fine soft" d="M200 250 q 200 -100 400 0 t 400 0 t 400 0" />
    <path class="ink hair soft" d="M200 280 q 200 -80 400 0 t 400 0 t 400 0" />
    <text x="300" y="200" font-family="PT Mono" font-size="24" class="dot">Wi-Fi (2.4 GHz)</text>
  </g>

  <!-- Bluetooth Pulses -->
  <g>
    <circle class="ink fine pulse" cx="400" cy="650" r="8" />
    <circle class="ink fine pulse" cx="600" cy="650" r="8" style="animation-delay: 1.5s" />
    <circle class="ink fine pulse" cx="800" cy="650" r="8" style="animation-delay: 3s" />
    <circle class="ink fine pulse" cx="1000" cy="650" r="8" style="animation-delay: 4.5s" />
    <text x="1100" y="200" font-family="PT Mono" font-size="24" class="dot">Bluetooth (AFH)</text>
  </g>

  <!-- TDM Scheduler Timeline -->
  <g transform="translate(400 400)">
    <path class="ink hair soft" d="M0 50 h800" />
    <g class="slot">
      <!-- Slot Blocks -->
      <rect class="ink fine" x="0" y="20" width="120" height="60" rx="4" />
      <text x="60" y="55" font-family="PT Mono" font-size="14" text-anchor="middle" class="dot">WIFI</text>
      
      <rect class="ink fine" x="150" y="20" width="80" height="60" rx="4" />
      <text x="190" y="55" font-family="PT Mono" font-size="14" text-anchor="middle" class="dot">BLE</text>

      <rect class="ink fine" x="260" y="20" width="120" height="60" rx="4" />
      <text x="320" y="55" font-family="PT Mono" font-size="14" text-anchor="middle" class="dot">WIFI</text>

      <rect class="ink fine" x="410" y="20" width="80" height="60" rx="4" />
      <text x="450" y="55" font-family="PT Mono" font-size="14" text-anchor="middle" class="dot">BLE</text>
      
      <!-- Duplicate for looping effect -->
      <rect class="ink fine" x="550" y="20" width="120" height="60" rx="4" />
      <rect class="ink fine" x="700" y="20" width="80" height="60" rx="4" />
    </g>
    <text x="400" y="-20" font-family="PT Mono" font-size="28" text-anchor="middle" class="dot">TDM Coexistence</text>
  </g>
</svg>
