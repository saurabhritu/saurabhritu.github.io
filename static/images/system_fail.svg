<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0d1117" />
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    
    <g id="rocket-body">
      <polygon points="-15,0 -26,-5 -20,0 -26,5" fill="#ff7b00">
        <animate attributeName="points" 
                 values="-15,0 -26,-5 -20,0 -26,5; -15,0 -30,-2 -22,0 -30,2; -15,0 -26,-5 -20,0 -26,5" 
                 dur="0.1s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="-15,0 -20,-2 -17,0 -20,2" fill="#ffea00">
        <animate attributeName="points" 
                 values="-15,0 -20,-2 -17,0 -20,2; -15,0 -23,-1 -19,0 -23,1; -15,0 -20,-2 -17,0 -20,2" 
                 dur="0.08s" repeatCount="indefinite"/>
      </polygon>
      
      <polygon points="-12,-5 -4,-16 -2,-5" fill="#f85149" />
      <polygon points="-12,5 -4,16 -2,5" fill="#f85149" />
      
      <path d="M -15 -5 C -5 -5 12 -2 18 0 C 12 2 -5 5 -15 5 Z" fill="#c9d1d9" />
      
      <circle cx="6" cy="0" r="1.5" fill="#0d1117" />
    </g>

    <path id="trajectory" d="M 120 400 Q 400 -100 680 400" fill="none" />
  </defs>
  
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <line x1="0" y1="400" x2="800" y2="400" stroke="#30363d" stroke-width="4" />
  <rect x="0" y="402" width="800" height="98" fill="#161b22" />
  
  <use href="#trajectory" stroke="#58a6ff" stroke-width="2" stroke-dasharray="8 8" opacity="0.6" />
  
  <rect x="90" y="390" width="60" height="10" fill="#484f58" rx="2" />
  <polygon points="100,390 140,390 130,360 110,360" fill="#21262d" />
  
  <g>
    <use href="#rocket-body" />
    
    <animateMotion dur="4s" repeatCount="indefinite" rotate="auto" calcMode="linear" keyPoints="0;1;1" keyTimes="0;0.75;1">
      <mpath href="#trajectory" />
    </animateMotion>
    
    <animate attributeName="opacity" values="1; 1; 0; 0" keyTimes="0; 0.74; 0.75; 1" dur="4s" repeatCount="indefinite" />
  </g>

  <g transform="translate(680, 400)">
    <g>
      <animateTransform attributeName="transform" type="scale" 
                        values="0; 0; 0.5; 1.3; 1.5" 
                        keyTimes="0; 0.74; 0.75; 0.8; 1" 
                        dur="4s" repeatCount="indefinite" />
      
      <animate attributeName="opacity" 
               values="0; 0; 1; 1; 0" 
               keyTimes="0; 0.74; 0.75; 0.85; 1" 
               dur="4s" repeatCount="indefinite" />
               
      <polygon points="0,-45 12,-22 40,-25 22,-10 45,15 15,12 0,35 -15,12 -45,15 -22,-10 -40,-25 -12,-22" fill="#f85149" />
      <polygon points="0,-25 8,-12 25,-15 12,-5 28,8 10,6 0,22 -10,6 -28,8 -12,-5 -25,-15 -8,-12" fill="#ff7b00" />
      <polygon points="0,-12 4,-6 14,-8 6,-2 16,4 5,3 0,14 -5,3 -16,4 -6,-2 -14,-8 -4,-6" fill="#ffffff" />
    </g>
  </g>
</svg>
