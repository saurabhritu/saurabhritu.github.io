<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1350" width="100%" height="100%" style="background-color: #0b0c10; font-family: 'Courier New', Courier, monospace;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <marker id="arrow-uart-tx" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1"/></marker>
    <marker id="arrow-uart-rx" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fab387"/></marker>
    <marker id="arrow-spi-mosi" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cba6f7"/></marker>
    <marker id="arrow-spi-miso" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f38ba8"/></marker>
  </defs>

  <style>
    .title { fill: #ffffff; font-size: 28px; font-weight: bold; }
    .subtitle { fill: #a6adc8; font-size: 14px; }
    .device { fill: #1e1e2e; stroke: #45475a; stroke-width: 2; rx: 6; }
    .device-master { stroke: #89b4fa; }
    .device-text { fill: #cdd6f4; font-size: 16px; font-weight: bold; text-anchor: middle; }
    .wire-label { fill: #a6adc8; font-size: 12px; font-weight: bold; }
    .wire { fill: none; stroke-width: 2.5; }
    .packet { filter: url(#glow); }
  </style>

  <text x="50" y="60" class="title">Embedded Protocols Explorer</text>
  <text x="50" y="85" class="subtitle">Wiring topology &amp; data flow simulation</text>
  <line x1="50" y1="110" x2="850" y2="110" stroke="#313244" stroke-width="2" />

  <g transform="translate(50, 150)">
    <text x="0" y="0" class="title" style="font-size: 20px;">UART</text>
    <text x="0" y="20" class="subtitle">Async • Point-to-Point • 2 Wires</text>
    
    <rect x="0" y="40" width="140" height="80" class="device" />
    <text x="70" y="85" class="device-text">Device A</text>
    <rect x="660" y="40" width="140" height="80" class="device" />
    <text x="730" y="85" class="device-text">Device B</text>

    <path d="M 140 65 L 660 65" class="wire" stroke="#a6e3a1" marker-end="url(#arrow-uart-tx)"/>
    <text x="380" y="55" class="wire-label" fill="#a6e3a1">TX ➔ RX</text>
    
    <path d="M 660 95 L 140 95" class="wire" stroke="#fab387" marker-end="url(#arrow-uart-rx)"/>
    <text x="380" y="115" class="wire-label" fill="#fab387">RX ⬅ TX</text>

    <circle r="4" cy="65" fill="#a6e3a1" class="packet">
      <animate attributeName="cx" values="140; 660; 140" keyTimes="0; 0.5; 1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" cy="95" fill="#fab387" class="packet">
      <animate attributeName="cx" values="660; 140; 660" keyTimes="0; 0.5; 1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(50, 360)">
    <text x="0" y="0" class="title" style="font-size: 20px;">SPI</text>
    <text x="0" y="20" class="subtitle">Sync • 1 Master / Multi-Slave • 4+ Wires</text>
    
    <rect x="0" y="40" width="140" height="150" class="device device-master" />
    <text x="70" y="120" class="device-text">Master</text>

    <rect x="660" y="40" width="140" height="60" class="device" />
    <text x="730" y="75" class="device-text">Slave 1</text>
    <rect x="660" y="130" width="140" height="60" class="device" />
    <text x="730" y="165" class="device-text">Slave 2</text>

    <path d="M 140 60 L 630 60 L 630 50 L 660 50 M 630 60 L 630 140 L 660 140" class="wire" stroke="#89b4fa" stroke-dasharray="4"/>
    <text x="380" y="50" class="wire-label" fill="#89b4fa">SCLK (Clock)</text>

    <path d="M 140 90 L 600 90 L 600 70 L 660 70 M 600 90 L 600 160 L 660 160" class="wire" stroke="#cba6f7" marker-end="url(#arrow-spi-mosi)"/>
    <text x="380" y="80" class="wire-label" fill="#cba6f7">MOSI (Master Out)</text>

    <path d="M 660 90 L 570 90 L 570 120 L 140 120 M 660 180 L 570 180 L 570 120" class="wire" stroke="#f38ba8" marker-start="url(#arrow-spi-miso)"/>
    <text x="380" y="140" class="wire-label" fill="#f38ba8">MISO (Master In)</text>

    <path d="M 140 150 L 540 150 L 540 40 L 660 40" class="wire" stroke="#f9e2af" />
    <text x="250" y="140" class="wire-label" fill="#f9e2af">CS1</text>
    <path d="M 140 170 L 520 170 L 520 130 L 660 130" class="wire" stroke="#f9e2af" />
    <text x="250" y="185" class="wire-label" fill="#f9e2af">CS2</text>

    <circle r="4" cy="90" fill="#cba6f7" class="packet">
      <animate attributeName="cx" values="140; 600; 140" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(50, 630)">
    <text x="0" y="0" class="title" style="font-size: 20px;">I2C</text>
    <text x="0" y="20" class="subtitle">Sync • Multi-Master / Multi-Slave • 2 Wires</text>
    
    <rect x="0" y="40" width="120" height="60" class="device device-master" />
    <text x="60" y="75" class="device-text">Master</text>
    <rect x="300" y="40" width="120" height="60" class="device" />
    <text x="360" y="75" class="device-text">Slave 1</text>
    <rect x="600" y="40" width="120" height="60" class="device" />
    <text x="660" y="75" class="device-text">Slave 2</text>

    <line x1="60" y1="130" x2="750" y2="130" class="wire" stroke="#89b4fa" />
    <text x="760" y="135" class="wire-label" fill="#89b4fa">SCL</text>
    <line x1="60" y1="160" x2="750" y2="160" class="wire" stroke="#a6e3a1" />
    <text x="760" y="165" class="wire-label" fill="#a6e3a1">SDA</text>

    <path d="M 40 100 L 40 130 M 340 100 L 340 130 M 640 100 L 640 130" class="wire" stroke="#89b4fa" />
    <path d="M 80 100 L 80 160 M 380 100 L 380 160 M 680 100 L 680 160" class="wire" stroke="#a6e3a1" />

    <circle r="5" cy="160" fill="#a6e3a1" class="packet">
      <animate attributeName="cx" values="80; 680; 80" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(50, 880)">
    <text x="0" y="0" class="title" style="font-size: 20px;">CAN Bus</text>
    <text x="0" y="20" class="subtitle">Async • Differential • Multi-Master Broadcast</text>
    
    <line x1="20" y1="120" x2="780" y2="120" stroke="#fab387" stroke-width="6" />
    <text x="800" y="125" class="wire-label" fill="#fab387">CAN-H</text>
    <line x1="20" y1="140" x2="780" y2="140" stroke="#f9e2af" stroke-width="6" />
    <text x="800" y="145" class="wire-label" fill="#f9e2af">CAN-L</text>
    
    <rect x="20" y="115" width="10" height="30" fill="#313244" />
    <rect x="770" y="115" width="10" height="30" fill="#313244" />

    <rect x="60" y="40" width="100" height="50" class="device" />
    <text x="110" y="70" class="device-text">Node 1</text>
    <rect x="350" y="40" width="100" height="50" class="device" />
    <text x="400" y="70" class="device-text">Node 2</text>
    <rect x="640" y="40" width="100" height="50" class="device" />
    <text x="690" y="70" class="device-text">Node 3</text>

    <path d="M 90 90 L 90 120 M 380 90 L 380 120 M 670 90 L 670 120" class="wire" stroke="#fab387" />
    <path d="M 130 90 L 130 140 M 420 90 L 420 140 M 710 90 L 710 140" class="wire" stroke="#f9e2af" />

    <circle cx="400" cy="130" r="0" fill="none" stroke="#f38ba8" stroke-width="3" opacity="0.8">
      <animate attributeName="r" values="0; 300" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8; 0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(50, 1130)">
    <text x="0" y="0" class="title" style="font-size: 20px;">1-Wire</text>
    <text x="0" y="20" class="subtitle">Async • Master/Slave • 1 Data/Power Wire + GND</text>
    
    <rect x="0" y="40" width="120" height="50" class="device device-master" />
    <text x="60" y="70" class="device-text">Master</text>
    <rect x="300" y="40" width="120" height="50" class="device" />
    <text x="360" y="70" class="device-text">Sensor 1</text>
    <rect x="600" y="40" width="120" height="50" class="device" />
    <text x="660" y="70" class="device-text">Sensor 2</text>

    <line x1="60" y1="120" x2="700" y2="120" class="wire" stroke="#94e2d5" stroke-width="4" />
    <text x="720" y="125" class="wire-label" fill="#94e2d5">DATA / VCC</text>

    <path d="M 60 90 L 60 120 M 360 90 L 360 120 M 660 90 L 660 120" class="wire" stroke="#94e2d5" stroke-width="3"/>

    <rect x="60" y="116" width="20" height="8" fill="#94e2d5" rx="4" class="packet">
      <animate attributeName="x" values="60; 660; 60" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

</svg>
