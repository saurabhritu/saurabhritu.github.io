{{ define "main" }}

<section class="error-page">
  <div class="container error-inner">

    <div class="error-code" aria-hidden="true">404</div>

    <div class="error-content reveal">
      <p class="section-label">NOT FOUND</p>
      <h1 class="section-title" style="margin-top:0.5rem;">Page Not Found</h1>
      <p style="color:var(--clr-text-muted);margin-top:0.75rem;max-width:420px;font-size:1rem;line-height:1.7;">
        The page you're looking for doesn't exist or has been moved.
        Try navigating back home or searching the blog.
      </p>
      <div class="hero-cta" style="margin-top:2rem;">
        <a href="/" class="btn btn-primary">Go Home</a>
        <a href="/blog" class="btn btn-ghost">Browse Blog</a>
      </div>
    </div>

    <div class="error-grid" aria-hidden="true"></div>

  </div>
</section>

{{ end }}
