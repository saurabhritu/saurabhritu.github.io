<a href="{{ .Get "link" | relURL }}" class="shortcode-card">
  {{ with .Get "icon" }}
  <div class="card-icon">{{ . | safeHTML }}</div>
  {{ end }}
  <div class="card-text">
    <h4 class="card-title">{{ .Get "title" }}</h4>
    {{ with .Inner }}<p class="card-desc">{{ . | markdownify }}</p>{{ end }}
  </div>
</a>
