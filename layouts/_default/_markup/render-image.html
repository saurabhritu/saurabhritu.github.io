{{- /* 
  Markdown Render Hook for Images 
  Handles both global static images and local Page Bundle resources.
  Wraps each image in a .img-viewer container with a fullscreen button.
*/ -}}

{{- $src := .Destination -}}
{{- $img := .Page.Resources.GetMatch $src -}}

<div class="img-viewer">
  {{- if $img -}}
    <img src="{{ $img.RelPermalink }}" 
         alt="{{ .Text }}" 
         {{ with .Title }} title="{{ . }}" {{ end }} 
         loading="lazy">
  {{- else -}}
    <img src="{{ $src | safeURL }}" 
         alt="{{ .Text }}" 
         {{ with .Title }} title="{{ . }}" {{ end }} 
         loading="lazy">
  {{- end -}}
  <button class="img-expand-btn" aria-label="View fullscreen" title="View fullscreen">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 1 1 1 1 6"/>
      <polyline points="10 15 15 15 15 10"/>
      <line x1="1" y1="1" x2="6.5" y2="6.5"/>
      <line x1="15" y1="15" x2="9.5" y2="9.5"/>
    </svg>
  </button>
</div>
