<div id="search-modal" role="dialog" aria-modal="true" aria-labelledby="search-modal-title">
  <div class="search-modal-container">
    <div class="search-modal-header">
      <h2 id="search-modal-title">SEARCH</h2>
      <button id="search-close" class="search-close" aria-label="Close search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="search-modal-body">
      <div id="pagefind-search"></div>
    </div>
    <div class="search-modal-footer">
      <div class="search-hint">
        <kbd>/</kbd> <span>to open</span>
      </div>
      <div class="search-hint">
        <kbd>Esc</kbd> <span>to close</span>
      </div>
    </div>
  </div>
</div>
