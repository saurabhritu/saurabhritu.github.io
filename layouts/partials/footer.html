<footer class="site-footer" role="contentinfo">
  <div class="container footer-inner">

    <div class="footer-brand">
      <a href="{{ "/" | relURL }}" class="site-logo" aria-label="{{ .Site.Title }} home">
        {{- if .Site.Params.logo }}
        <img src="{{ .Site.Params.logo }}" alt="{{ .Site.Title }}" width="120" height="34" />
        {{- else }}
        <span class="logo-text"><span class="accent-slash">//</span> {{ .Site.Title }}</span>
        {{- end }}
      </a>
      <p class="footer-tagline">Be Curious</p>
    </div>


  </div><!-- /.footer-inner -->

  <div class="footer-bottom">
    <div class="container">
      <p class="footer-copy">© {{ now.Year }} &nbsp; <a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></p>
      <div class="footer-line"></div>
    </div>
  </div>
  {{ partial "scripts/katex.html" . }}
  {{ partial "scripts/mermaid.html" . }}
</footer>
