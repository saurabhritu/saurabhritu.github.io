<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  const getTheme = () => document.documentElement.classList.contains('light-mode') ? 'default' : 'dark';

  const initMermaid = () => {
    mermaid.initialize({ 
      startOnLoad: false, // We'll handle it manually
      theme: getTheme(),
      fontFamily: 'var(--font-body)',
      securityLevel: 'loose'
    });
    mermaid.run();
  };

  // Initial run
  initMermaid();

  // Watch for theme changes
  const observer = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
      if (mutation.attributeName === 'class') {
        const theme = getTheme();
        document.querySelectorAll('.mermaid').forEach(el => {
          const b64 = el.getAttribute('data-mermaid-src');
          if (b64) {
            // Decode base64 to original string
            const src = atob(b64);
            el.textContent = src;
            el.removeAttribute('data-processed');
          }
        });
        
        mermaid.initialize({ 
          theme: theme,
          fontFamily: 'var(--font-body)',
        });
        mermaid.run();
      }
    });
  });

  observer.observe(document.documentElement, { attributes: true });

  // Fallback for late-rendered content
  window.addEventListener('load', () => {
    setTimeout(initMermaid, 500);
  });
</script>
